---
# yaml-language-server: $schema=https://k8s-schemas.freckle.systems/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ${APP}-volsync
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: op-cluster-vault
  target:
    name: ${APP}-volsync
    template:
      data:
        # Single shared `volsync` user on the rest-server (private-repos
        # mode confines it to /volsync/...); per-app isolation is via
        # path nesting at /volsync/${APP}/. urlquery handles any
        # special chars in the password.
        RESTIC_REPOSITORY: '{{ .repository_prefix | replace "rest:https://" (printf "rest:https://volsync:%s@" (urlquery .volsync_password)) }}/volsync/${APP}/'
        RESTIC_PASSWORD: '{{ .restic_password }}'
  dataFrom:
    - extract:
        key: volsync
