---
# yaml-language-server: $schema=https://k8s-schemas.freckle.systems/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ${APP}-volsync
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: op-cluster-vault
  target:
    name: ${APP}-volsync
    template:
      data:
        # urlquery percent-encodes the password so it survives URL parsing
        # regardless of which special chars the password generator picked.
        # Trailing /${VOLSYNC_USER}/ scopes restic ops to the user's
        # private repo path on the rest-server (--private-repos mode).
        RESTIC_REPOSITORY: '{{ .repository_prefix | replace "rest:https://" (printf "rest:https://${VOLSYNC_USER}:%s@" (urlquery (index . "${VOLSYNC_PASSWORD_FIELD}"))) }}/${VOLSYNC_USER}/'
        RESTIC_PASSWORD: '{{ .restic_password }}'
  dataFrom:
    - extract:
        key: volsync
