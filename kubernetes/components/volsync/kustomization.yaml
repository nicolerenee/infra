---
# Volsync component — adds the four resources every restic-backed app
# needs (ExternalSecret + ReplicationSource + ReplicationDestination +
# PVC with dataSourceRef). Apps include this component and supply
# postBuild substitutions on their Flux Kustomization to fill in the
# app-specific values.
#
# All apps share a single rest-server user (`volsync`) and one shared
# password field (`volsync_password` on the 1P `volsync` item). Per-app
# isolation comes from path nesting under /volsync/${APP}/. Adding a
# new backup target requires no new htpasswd line, no new 1P field.
#
# Required substitutes (no defaults — must be set on the cluster
# overlay Flux KS):
#   APP             The app name. Drives resource naming + repo path.
#   VOLSYNC_UID     The UID the mover should run as. Should match the
#                   app's runAsUser so restic skips chown attempts
#                   (the mover container drops CAP_CHOWN).
#
# Optional substitutes (have defaults):
#   VOLSYNC_GID         Defaults to VOLSYNC_UID
#   VOLSYNC_FSGROUP     Defaults to VOLSYNC_UID
#   VOLSYNC_CAPACITY    PVC + RD destination capacity. Default 10Gi.
#   VOLSYNC_SCHEDULE    Cron schedule for the RS. Default :37 hourly.
#                       Pick a different minute per app to spread load.
#   VOLSYNC_PVC_SUFFIX  PVC name suffix. Default empty — PVC is named
#                       just `${APP}`. Apps with multiple data dirs
#                       use subPath mounts on this single PVC. A
#                       sibling PVC (e.g. `${APP}-cache`) is the
#                       signal that data is intentionally not backed
#                       up. Legacy apps still on `${APP}-config` PVCs
#                       set this to `-config` until they're migrated.
#   VOLSYNC_RUN_AS_NON_ROOT  Mover runAsNonRoot. Default true. Set to
#                       "false" only when VOLSYNC_UID is "0" — the
#                       kubelet rejects runAsNonRoot:true with
#                       runAsUser:0 (CreateContainerConfigError) so
#                       the two must move together.
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
resources:
  - ./externalsecret.yaml
  - ./replicationdestination.yaml
  - ./pvc.yaml
  - ./replicationsource.yaml
