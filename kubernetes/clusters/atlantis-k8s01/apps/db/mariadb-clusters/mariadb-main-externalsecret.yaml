---
# yaml-language-server: $schema=https://k8s-schemas.freckle.systems/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mariadb-main
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: mariadb-main-secret
    template:
      engineVersion: v2
      data:
        root-password: "{{ .mariadb_root_password }}"
  dataFrom:
    - extract:
        key: mariadb-main-${CLUSTER_NAME}
