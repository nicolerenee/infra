---
# yaml-language-server: $schema=https://k8s-schemas.freckle.systems/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app external-dns-cloudflare
  namespace: &namespace external-dns
  labels:
    infra.freckle.systems/post-build-variables: enabled
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    - name: external-secrets
      namespace: external-secrets
    - name: prometheus-operator-crds
      namespace: observability
  targetNamespace: *namespace
  path: ./kubernetes/apps/networking/external-dns/cloudflare
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  interval: 30m
  timeout: 5m
  patches:
    # atlantis-only zones — matrix lives on freckle.chat and pocket-id
    # on freckle.id. fairy doesn't have routes on either, so this gets
    # patched in here instead of inflating the shared baseline.
    - target:
        kind: HelmRelease
        name: external-dns-cloudflare
      patch: |-
        - op: add
          path: /spec/values/domainFilters/-
          value: freckle.chat
        - op: add
          path: /spec/values/domainFilters/-
          value: freckle.id
