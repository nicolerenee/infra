---
# yaml-language-server: $schema=https://k8s-schemas.freckle.systems/cilium.io/ciliumnetworkpolicy_v2.json
# Restrict qBittorrent pods to only egress to the WireGuard gateway.
# All other traffic (DNS, health checks, torrents) goes through the
# VPN tunnel and exits via tortuga.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: qbt-vpn-egress
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: qbt-ink
  egress:
    # Allow WireGuard gateway on tortuga
    - toCIDRSet:
        - cidrGroupRef: site-tortuga-public
      toPorts:
        - ports:
            - port: "57381"
              protocol: UDP
