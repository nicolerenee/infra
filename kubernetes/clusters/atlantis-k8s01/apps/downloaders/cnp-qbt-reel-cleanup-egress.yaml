---
# yaml-language-server: $schema=https://k8s-schemas.freckle.systems/cilium.io/ciliumnetworkpolicy_v2.json
# Egress allow for the qbt-reel-cleanup CronJob — only outbound traffic
# it needs is the qBittorrent webui API on qbt-reel pods. DNS is
# granted by the cluster-wide intercept-all-dns CCNP.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: qbt-reel-cleanup-egress
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: qbt-reel-cleanup
  egress:
    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/instance: qbt-reel
            k8s:io.kubernetes.pod.namespace: downloaders
      toPorts:
        - ports:
            - port: "80"
              protocol: TCP
