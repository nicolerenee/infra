---
# yaml-language-server: $schema=https://k8s-schemas.freckle.systems/cilium.io/ciliumnetworkpolicy_v2.json
# Egress allow for qBittorrent pods (qbt-reel, qbt-ink, any future
# instance). Permits public internet (trackers, peers) while blocking
# RFC1918 / CGNAT so a compromised qbt can't pivot inside the cluster
# or leak to LAN. Layered on top of the namespace's default-deny.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: qbittorrent-egress
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/controller: qbittorrent
  egress:
    # Public internet (IPv4), blocking private/internal ranges
    - toCIDRSet:
        - cidr: 0.0.0.0/0
          except:
            - 10.0.0.0/8       # RFC1918
            - 172.16.0.0/12    # RFC1918
            - 192.168.0.0/16   # RFC1918
            - 100.64.0.0/10    # CGNAT (Tailscale)
    # Public internet (IPv6)
    - toCIDRSet:
        - cidr: "::/0"
          except:
            - "fc00::/7"   # Unique local addresses
            - "fe80::/10"  # Link-local addresses
