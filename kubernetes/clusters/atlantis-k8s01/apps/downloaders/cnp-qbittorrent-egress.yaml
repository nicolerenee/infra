---
# yaml-language-server: $schema=https://k8s-schemas.freckle.systems/cilium.io/ciliumnetworkpolicy_v2.json
# Egress allow for qBittorrent pods (qbt-reel, qbt-ink, any future
# instance). Allows the world entity (everything outside the cluster:
# internet, LAN, etc.), then explicitly denies the den1 internal
# subnets so qbt can't reach on-site management/storage networks.
# Layered on top of the namespace's default-deny.
#
# egressDeny takes precedence over egress allow, so the world-entity
# allow + den1-internal deny composes to "anywhere external except
# den1 internal." Cluster-internal pods aren't in the world entity,
# so they remain blocked by the default-deny umbrella.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: qbittorrent-egress
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/controller: qbittorrent
  egress:
    - toEntities:
        - world
  egressDeny:
    - toCIDRSet:
        - cidrGroupRef: site-den1-internal
