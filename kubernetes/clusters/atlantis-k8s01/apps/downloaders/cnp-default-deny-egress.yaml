---
# yaml-language-server: $schema=https://k8s-schemas.freckle.systems/cilium.io/ciliumnetworkpolicy_v2.json
# Default-deny egress for the entire downloaders namespace. Every
# pod becomes policy-managed; only egress explicitly allowed by
# another CNP flows. enableDefaultDeny avoids the "empty egress
# rule" sentinel pattern. Cluster-wide intercept-all-dns CCNP
# keeps DNS working for all pods.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: default-deny-egress
spec:
  endpointSelector: {}
  enableDefaultDeny:
    egress: true
    ingress: false
