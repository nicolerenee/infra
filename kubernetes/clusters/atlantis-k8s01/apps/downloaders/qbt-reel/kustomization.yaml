---
# yaml-language-server: $schema=https://www.schemastore.org/kustomization.json
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../../../../apps/media/qbittorrent
patches:
  - target:
      kind: HelmRelease
    patch: |-
      - op: replace
        path: /metadata/name
        value: qbt-reel
      - op: replace
        path: /spec/values/persistence/media
        value:
          existingClaim: store01-downloads
          globalMounts:
            - path: /store01/downloads/qbt-reel
              subPath: qbt-reel

      - op: replace
        path: /spec/values/defaultPodOptions/securityContext/runAsUser
        value: 943
      - op: replace
        path: /spec/values/defaultPodOptions/securityContext/runAsGroup
        value: 943
      - op: replace
        path: /spec/values/defaultPodOptions/securityContext/fsGroup
        value: 943

      # Remove gluetun sidecar
      - op: remove
        path: /spec/values/controllers/qbittorrent/containers/gluetun

      # Remove gluetun volumes
      - op: remove
        path: /spec/values/persistence/gluetun-tmp

      # Remove dnsPolicy override
      - op: remove
        path: /spec/values/defaultPodOptions/dnsPolicy
      - op: remove
        path: /spec/values/defaultPodOptions/dnsConfig

      - op: replace
        path: /spec/values/controllers/qbittorrent/containers/app/env/QBT_TORRENTING_PORT
        value: 51847

      # Replace the single app service with explicitly named services
      - op: replace
        path: /spec/values/service
        value:
          app:
            controller: qbittorrent
            ports:
              http:
                port: 80
          transfer-port:
            controller: qbittorrent
            type: LoadBalancer
            ipFamilyPolicy: PreferDualStack
            labels:
              ipam.freckle.systems/lb-pool: internal
            ports:
              transfer-port:
                port: 51847
                protocol: TCP

      - op: replace
        path: /spec/values/persistence/config/suffix
        value: config

  # Remove the gluetun ExternalSecret
  - target:
      kind: ExternalSecret
    patch: |-
      $patch: delete
      apiVersion: external-secrets.io/v1
      kind: ExternalSecret
      metadata:
        name: gluetun-config
