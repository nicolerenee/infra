---
# yaml-language-server: $schema=https://www.schemastore.org/kustomization.json
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../../../../apps/media/qbittorrent
patches:
  - target:
      kind: HelmRelease
    patch: |-
      - op: replace
        path: /metadata/name
        value: qbt-reel
      - op: replace
        path: /spec/values/persistence/media
        value:
          existingClaim: store01-downloads
          globalMounts:
            - path: /store01/downloads/qbt-reel
              subPath: qbt-reel

      - op: replace
        path: /spec/values/defaultPodOptions/securityContext/runAsUser
        value: 943
      - op: replace
        path: /spec/values/defaultPodOptions/securityContext/runAsGroup
        value: 943
      - op: replace
        path: /spec/values/defaultPodOptions/securityContext/fsGroup
        value: 943

      - op: replace
        path: /spec/values/controllers/qbittorrent/containers/app/env/QBT_TORRENTING_PORT
        value: 51847

      - op: replace
        path: /spec/values/controllers/qbittorrent/containers/gluetun/env/FIREWALL_VPN_INPUT_PORTS
        value: "51847"
      - op: add
        path: /spec/values/controllers/qbittorrent/containers/gluetun/env/FIREWALL_OUTBOUND_SUBNETS
        value: "10.244.0.0/16,fd2b:ec21:3ff2::/48"

      - op: replace
        path: /spec/values/persistence/config/suffix
        value: config

  - target:
      kind: ExternalSecret
    patch: |-
      - op: replace
        path: /metadata/name
        value: gluetun-qbt-reel
      - op: replace
        path: /spec/target/name
        value: gluetun-qbt-reel
      - op: replace
        path: /spec/dataFrom/0/extract/key
        value: gluetun-qbt-reel
  - target:
      kind: HelmRelease
    patch: |-
      - op: replace
        path: /spec/values/controllers/qbittorrent/containers/gluetun/envFrom
        value:
          - secretRef:
              name: gluetun-qbt-reel
