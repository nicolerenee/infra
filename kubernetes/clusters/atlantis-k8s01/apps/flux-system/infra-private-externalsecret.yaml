---
# SSH deploy-key Secret for the `infra-private` GitRepository (below). Read-only
# key for freckleapps/infra; source-controller uses it to clone + poll that repo.
#
# The GSM secret holds a JSON blob { identity, known_hosts }; this renders it
# into the key shape source-controller's SSH auth expects: `identity` (the
# private key) and `known_hosts` (host-key pin, so a MITM can't impersonate
# github.com). No `identity.pub` needed for clone.
#
# atlantis-only: the per-secret IAM grant (tofu flux-infra-private.tf) authorizes
# just the atlantis flux-system ESO SA, and this file lives under the atlantis
# cluster dir — fairy never renders it.
# yaml-language-server: $schema=https://k8s-schemas.freckle.systems/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: infra-private-deploy-key
  namespace: flux-system
spec:
  secretStoreRef:
    kind: SecretStore
    name: gcp-sm
  target:
    name: infra-private-deploy-key
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        identity: "{{ .identity }}"
        known_hosts: "{{ .known_hosts }}"
  dataFrom:
    - extract:
        key: atlantis-k8s01-flux-infra-private-deploy-key
