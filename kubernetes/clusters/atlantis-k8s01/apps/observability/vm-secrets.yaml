---
# yaml-language-server: $schema=https://k8s-schemas.freckle.systems/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app vm-secrets
  namespace: &namespace observability
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    - name: onepassword-stores
      namespace: external-secrets
  targetNamespace: *namespace
  path: ./kubernetes/apps/observability/victoria-metrics/secrets
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  interval: 30s
  retryInterval: 1m
  timeout: 5m
  patches:
    - target:
        kind: ExternalSecret
        name: victoriametrics-secrets
      patch: |-
        - op: replace
          path: /spec/secretStoreRef/name
          value: op-cluster-vault
        - op: replace
          path: /spec/data/0/remoteRef/key
          value: victoriametrics
