---
# yaml-language-server: $schema=https://k8s-schemas.freckle.systems/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app gateway-configs
  namespace: &namespace gateway-system
  labels:
    infra.freckle.systems/post-build-variables: enabled
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    - name: envoy-gateway
      namespace: envoy-gateway-system
  targetNamespace: *namespace
  path: ./kubernetes/apps/networking/envoy-gateway/gateways
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  interval: 1h
  retryInterval: 2m
  timeout: 5m
  patches:
    # Dedicated freckle.id listener restricted to HTTPRoutes from the
    # freckle-id namespace. Keeps the auth surface firewalled off from
    # any other namespace's routes attaching to it.
    - target:
        kind: Gateway
        name: public
      patch: |-
        - op: add
          path: /spec/listeners/-
          value:
            name: https-auth-root
            protocol: HTTPS
            port: 443
            hostname: "freckle.id"
            allowedRoutes:
              namespaces:
                from: Selector
                selector:
                  matchLabels:
                    kubernetes.io/metadata.name: freckle-id
            tls:
              certificateRefs:
                - kind: Secret
                  name: auth-tls
    # Dedicated freckle.chat listeners (root + wildcard) restricted to
    # HTTPRoutes from the matrix namespace.
    - target:
        kind: Gateway
        name: public
      patch: |-
        - op: add
          path: /spec/listeners/-
          value:
            name: https-chat-root
            protocol: HTTPS
            port: 443
            hostname: "freckle.chat"
            allowedRoutes:
              namespaces:
                from: Selector
                selector:
                  matchLabels:
                    kubernetes.io/metadata.name: matrix
            tls:
              certificateRefs:
                - kind: Secret
                  name: chat-tls
        - op: add
          path: /spec/listeners/-
          value:
            name: https-chat-wildcard
            protocol: HTTPS
            port: 443
            hostname: "*.freckle.chat"
            allowedRoutes:
              namespaces:
                from: Selector
                selector:
                  matchLabels:
                    kubernetes.io/metadata.name: matrix
            tls:
              certificateRefs:
                - kind: Secret
                  name: chat-tls
