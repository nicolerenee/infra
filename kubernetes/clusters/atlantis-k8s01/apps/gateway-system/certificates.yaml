---
# Atlantis-only certs that don't belong on every cluster's gateway. Lives
# alongside gateways.yaml so the patches there can reference these names
# without polluting the shared gateway base.

---
# yaml-language-server: $schema=https://k8s-schemas.freckle.systems/cert-manager.io/certificate_v1.json
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: auth-tls
spec:
  secretName: auth-tls
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
  commonName: "freckle.id"
  dnsNames:
    - freckle.id
    - "*.freckle.id"

---
# yaml-language-server: $schema=https://k8s-schemas.freckle.systems/cert-manager.io/certificate_v1.json
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: chat-tls
spec:
  secretName: chat-tls
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
  commonName: "freckle.chat"
  dnsNames:
    - freckle.chat
    - "*.freckle.chat"
