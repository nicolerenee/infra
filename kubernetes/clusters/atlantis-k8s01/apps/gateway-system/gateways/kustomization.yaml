---
# yaml-language-server: $schema=https://www.schemastore.org/kustomization.json
# Atlantis is the only cluster with a public-IP gateway. gw-public is now
# part of the shared Component (so the CI completeness check stays green),
# and internal-only clusters (fairy) strip it out via cluster-side patches.
# Atlantis just inherits it, no extra resources needed here.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: gateway-system
components:
  - ../../../../../apps/networking/envoy-gateway/gateways
patches:
  # Add the public:http parent back onto the shared httpsredirect HR.
  - target:
      kind: HTTPRoute
      name: httpsredirect
    patch: |-
      - op: add
        path: /spec/parentRefs/-
        value:
          name: public
          sectionName: http
