---
# yaml-language-server: $schema=https://k8s-schemas.freckle.systems/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app sonarr
  namespace: &namespace media
  labels:
    infra.freckle.systems/post-build-variables: enabled
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    - name: rook-ceph-cluster
      namespace: rook-ceph
  interval: 1h
  path: ./kubernetes/apps/media/sonarr
  prune: true
  retryInterval: 2m
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: *namespace
  timeout: 5m
  wait: false
  postBuild:
    substitute:
      APP: *app
  patches:
    # The atlantis sonarr instance was migrated to a non-cluster-suffixed
    # 1Password item (just `sonarr`) when oidc_client_id/secret were
    # added. The other sonarr instances (fairy, sonarr-anime) still use
    # the legacy sonarr-${CLUSTER_NAME} key, so the override is here.
    - target:
        kind: ExternalSecret
        name: sonarr
      patch: |-
        - op: replace
          path: /spec/dataFrom/0/extract/key
          value: sonarr
    - target:
        kind: HelmRelease
      patch: |-
        - op: replace
          path: /spec/values/persistence/config/size
          value: 30Gi

        - op: replace
          path: /spec/values/persistence/media
          value:
            existingClaim: store01-media
            globalMounts:
              - path: /store01

        - op: replace
          path: /spec/values/defaultPodOptions/securityContext/runAsUser
          value: 943
        - op: replace
          path: /spec/values/defaultPodOptions/securityContext/runAsGroup
          value: 943
        - op: replace
          path: /spec/values/defaultPodOptions/securityContext/fsGroup
          value: 943
