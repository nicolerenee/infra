---
# yaml-language-server: $schema=https://k8s-schemas.freckle.systems/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app plex
  namespace: &namespace media
  labels:
    infra.freckle.systems/post-build-variables: enabled
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    - name: rook-ceph-cluster
      namespace: rook-ceph
  interval: 1h
  path: ./kubernetes/apps/media/plex
  prune: true
  retryInterval: 2m
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: *namespace
  timeout: 5m
  wait: false
  postBuild:
    substitute:
      APP: *app
      VOLSYNC_UID: "943"
      VOLSYNC_CAPACITY: 100Gi
      VOLSYNC_SCHEDULE: "1 * * * *"
  patches:
    # One-off: plex is publicly available at plex.freckle.vision via
    # the legacy `external` cilium gateway. The freckle.vision listener
    # hasn't migrated to the envoy public gateway yet, so this route
    # stays on the old gateway. Drop the patch when freckle.vision
    # joins gateway-system/public.
    - target:
        kind: HelmRelease
      patch: |-
        - op: add
          path: /spec/values/route/public
          value:
            hostnames: ["plex.freckle.vision"]
            parentRefs:
              - name: external
                namespace: gateway
            rules:
              - backendRefs:
                  - identifier: app
                    port: 80
