---
# yaml-language-server: $schema=https://k8s-schemas.freckle.systems/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app qbt-reel
  namespace: &namespace media
  labels:
    infra.freckle.systems/post-build-variables: enabled
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    - name: rook-ceph-cluster
      namespace: rook-ceph
  interval: 1h
  path: ./kubernetes/apps/media/qbittorrent
  prune: true
  retryInterval: 2m
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: *namespace
  timeout: 5m
  wait: false
  postBuild:
    substitute:
      APP: *app
      VOLSYNC_UID: "943"
      VOLSYNC_CAPACITY: 1Gi
      VOLSYNC_SCHEDULE: "47 * * * *"
      QBT_TRANSFER_PORT: "51847"
  patches:
    # qbt-reel-only: read-only access to the TV and Movies libraries.
    # Main qbt deliberately doesn't get these — only reel needs them.
    - target:
        kind: HelmRelease
      patch: |-
        - op: add
          path: /spec/values/persistence/media/globalMounts/-
          value:
            path: /store01/TV
            subPath: TV
            readOnly: true
        - op: add
          path: /spec/values/persistence/media/globalMounts/-
          value:
            path: /store01/Movies
            subPath: Movies
            readOnly: true
