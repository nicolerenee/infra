---
# yaml-language-server: $schema=https://k8s-schemas.freckle.systems/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app emby
  namespace: &namespace media
  labels:
    infra.freckle.systems/post-build-variables: enabled
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    - name: rook-ceph-cluster
      namespace: rook-ceph
  interval: 1h
  path: ./kubernetes/apps/media/emby
  prune: true
  retryInterval: 2m
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: *namespace
  timeout: 5m
  wait: false
  postBuild:
    substitute:
      APP: *app
      VOLSYNC_UID: "943"
      VOLSYNC_CAPACITY: 200Gi
      VOLSYNC_CACHE_CAPACITY: 25Gi
      VOLSYNC_SCHEDULE: "58 * * * *"
  patches:
    # Public route at emby.freckle.media on the envoy public gateway.
    # The default `route.ui` stays internal-only on tailnet at
    # emby.${CLUSTER_SUBDOMAIN}.freckle.media. The shared `media-tls`
    # cert on gateway-system/public covers *.freckle.media, so no
    # extra cert/listener config is needed here.
    - target:
        kind: HelmRelease
      patch: |-
        - op: add
          path: /spec/values/route/public
          value:
            hostnames: ["emby.freckle.media"]
            parentRefs:
              - name: public
                namespace: gateway-system
            rules:
              - backendRefs:
                  - identifier: app
                    port: 80
