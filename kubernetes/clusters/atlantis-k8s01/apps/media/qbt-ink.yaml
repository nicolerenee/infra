---
# yaml-language-server: $schema=https://k8s-schemas.freckle.systems/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app qbt-ink
  namespace: &namespace media
  labels:
    infra.freckle.systems/post-build-variables: enabled
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    - name: rook-ceph-cluster
      namespace: rook-ceph
  interval: 1h
  path: ./kubernetes/apps/media/qbittorrent
  prune: true
  retryInterval: 2m
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: *namespace
  timeout: 5m
  wait: false
  postBuild:
    substitute:
      APP: *app
      VOLSYNC_UID: "943"
      VOLSYNC_CAPACITY: 10Gi
      VOLSYNC_SCHEDULE: "23 * * * *"
      QBT_TRANSFER_PORT: "54182"
      # Legacy `-config` PVC name; migrate to bare `${APP}` PVC with
      # subPath mounts during the next qbt rework.
      VOLSYNC_PVC_SUFFIX: -config
