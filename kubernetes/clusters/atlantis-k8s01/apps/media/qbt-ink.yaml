---
# yaml-language-server: $schema=https://k8s-schemas.freckle.systems/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app qbt-ink
  namespace: &namespace media
  labels:
    infra.freckle.systems/post-build-variables: enabled
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    - name: rook-ceph-cluster
      namespace: rook-ceph
  interval: 1h
  path: ./kubernetes/apps/media/qbittorrent
  prune: true
  retryInterval: 2m
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: *namespace
  timeout: 5m
  wait: false
  postBuild:
    substitute:
      APP: *app
      VOLSYNC_UID: "943"
      VOLSYNC_CAPACITY: 1Gi
      VOLSYNC_SCHEDULE: "23 * * * *"
      QBT_TRANSFER_PORT: "54182"
  patches:
    # qbt-ink's tracker whitelists specific qBittorrent versions and lags
    # upstream. Pin the image tag here so qbt-ink can stay on a supported
    # version while the shared HR (consumed by other qbt instances) tracks
    # upstream. Bump this tag only after the tracker clears the new version.
    - target:
        kind: HelmRelease
      patch: |-
        - op: replace
          path: /spec/values/controllers/qbittorrent/containers/app/image/tag
          # renovate: datasource=docker depName=ghcr.io/home-operations/qbittorrent
          value: 5.2.0@sha256:788796013c3da75f2dba568c5319975a5c41f555586dfd13987be4631181e00e
