---
# OIDC client credentials for the media-side homepage. 1Password item
# `homepage-media` must have oidc_client_id and oidc_client_secret fields.
# Register the client in pocket-id with redirect URI
# https://atlantis.freckle.media/oauth2/callback before deploying.
# yaml-language-server: $schema=https://k8s-schemas.freckle.systems/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: homepage-oidc
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: op-cluster-vault
  target:
    template:
      data:
        client-id: "{{ .oidc_client_id }}"
        client-secret: "{{ .oidc_client_secret }}"
  dataFrom:
    - extract:
        key: homepage-media
---
# Forces all browser traffic to atlantis.freckle.media through OIDC
# against pocket-id. The homepage Pod's siteMonitor pings to in-cluster
# Service URLs bypass the gateway and are unaffected.
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: homepage-oidc
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: homepage
  oidc:
    provider:
      issuer: https://freckle.id
    clientIDRef:
      group: ""
      kind: Secret
      name: homepage-oidc
    clientSecret:
      group: ""
      kind: Secret
      name: homepage-oidc
    redirectURL: https://atlantis.freckle.media/oauth2/callback
    logoutPath: /logout
    scopes:
      - openid
      - email
      - profile
