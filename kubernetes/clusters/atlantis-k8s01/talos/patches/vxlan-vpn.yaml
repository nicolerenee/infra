# VXLAN overlay network for torrent transfer ports
# Creates vxlan100 interface bridged to br-vxlan100
# Traffic routes to VyOS border1 (10.140.0.68) for DNAT
machine:
  pods:
    - apiVersion: v1
      kind: Pod
      metadata:
        name: vxlan-setup
        namespace: kube-system
      spec:
        hostNetwork: true
        hostPID: true
        restartPolicy: Always
        containers:
          - name: vxlan-setup
            image: public.ecr.aws/docker/library/alpine:3.21
            command: ["/bin/sh", "-c"]
            args:
              - |
                set -e
                apk add --no-cache iproute2 bridge-utils

                # Get the node's primary IP from the bond0 interface
                NODE_IP=$$(ip -4 addr show bond0 | awk '/inet / {print $$2}' | cut -d/ -f1 | head -1)
                echo "Node IP: $${NODE_IP}"

                # Create VXLAN interface if it doesn't exist
                if ! ip link show vxlan100 >/dev/null 2>&1; then
                  echo "Creating vxlan100 interface..."
                  ip link add vxlan100 type vxlan id 100 dstport 4789 local $${NODE_IP} nolearning
                fi
                ip link set vxlan100 up
                ip link set vxlan100 mtu 1400

                # Create bridge if it doesn't exist
                if ! ip link show br-vxlan100 >/dev/null 2>&1; then
                  echo "Creating br-vxlan100 bridge..."
                  ip link add br-vxlan100 type bridge
                fi
                ip link set br-vxlan100 up

                # Add vxlan to bridge if not already
                if ! bridge link show dev vxlan100 2>/dev/null | grep -q br-vxlan100; then
                  echo "Adding vxlan100 to bridge..."
                  ip link set vxlan100 master br-vxlan100
                fi

                # Static FDB entry - flood BUM traffic to border1 gateway
                echo "Adding FDB entry for border1 gateway..."
                bridge fdb append 00:00:00:00:00:00 dev vxlan100 dst 10.140.0.68

                echo "VXLAN setup complete"

                # Keep running and periodically verify the interface exists
                while true; do
                  if ! ip link show vxlan100 >/dev/null 2>&1; then
                    echo "WARNING: vxlan100 interface missing, exiting to trigger restart"
                    exit 1
                  fi
                  sleep 60
                done
            securityContext:
              privileged: true
            resources:
              requests:
                cpu: "1m"
                memory: "16Mi"
              limits:
                cpu: "100m"
                memory: "64Mi"
