---
# Deploys the cluster-wide ImageUpdateAutomation. Must run AFTER the
# flux-instance HR rolls with image-automation-controller, otherwise the
# kustomize-controller dry-run fails on an unknown CRD. dependsOn handles
# the ordering.
#
# Only atlantis runs this — image-automation commits back to main; if both
# clusters had an ImageUpdateAutomation they'd race on the same setter
# markers. Image-reflector + image-automation controllers themselves are
# enabled on both clusters via the shared FluxInstance values.
# yaml-language-server: $schema=https://k8s-schemas.freckle.systems/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app image-automation
  namespace: &namespace flux-system
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  targetNamespace: *namespace
  dependsOn:
    - name: flux-instance
      namespace: flux-system
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  path: ./kubernetes/apps/flux/image-automation
  interval: 1h
  retryInterval: 2m
  timeout: 5m
  prune: true
  wait: true
