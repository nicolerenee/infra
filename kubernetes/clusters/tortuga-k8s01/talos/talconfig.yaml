---
clusterName: tortuga-k8s01
talosVersion: ${TALOS_VERSION}
kubernetesVersion: ${KUBERNETES_VERSION}
endpoint: https://184.107.141.39:6443
domain: cluster.local
allowSchedulingOnMasters: true
clusterPodNets:
  - 10.232.0.0/16
  - fd2b:ec93:e232::/48
clusterSvcNets:
  - 10.231.0.0/16
  - fd2b:ec93:e230:1::/112
cniConfig:
  name: none

nodes:
  - hostname: tortuga-cn01
    ipAddress: 184.107.141.39
    controlPlane: true
    installDiskSelector:
      size: ">= 100GB"
    machineSpec:
      mode: metal
      arch: amd64
    networkInterfaces:
      - interface: ens3
        dhcp: true
        mtu: 1500
        dhcpOptions:
          ipv6: false
    patches:
      - ./patches/local-storage.yaml
      - ./patches/watchdog.yaml

controlPlane:
  nodeLabels: {}
  patches:
    # Cluster configuration
    - |-
      cluster:
        etcd:
          extraArgs:
            listen-metrics-urls: "http://127.0.0.1:2381"
        proxy:
          disabled: true

    # Disable search domain
    - &disableSearchDomainPatch |-
      machine:
        network:
          disableSearchDomain: true

    # Use public DNS (not provider's)
    - &nameServersPatch |-
      machine:
        network:
          nameservers:
            - 1.1.1.1
            - 1.0.0.1

    # Enable K8s Talos API Access
    - |-
      machine:
        features:
          kubernetesTalosAPIAccess:
            enabled: true
            allowedRoles:
              - os:reader
              - os:admin
            allowedKubernetesNamespaces:
              - system-upgrade

    # Machine patches
    - &machinePatches |
      machine:
        features:
          hostDNS:
            enabled: true
            forwardKubeDNSToHost: false
            resolveMemberNames: true
        files:
          - op: create
            path: /etc/cri/conf.d/20-customization.part
            content: |
              [plugins."io.containerd.cri.v1.images"]
                discard_unpacked_layers = false
              [plugins."io.containerd.cri.v1.runtime"]
                device_ownership_from_security_context = true
        sysctls:
          # Kubernetes essentials
          fs.inotify.max_user_watches: 1048576
          fs.inotify.max_user_instances: 8192
          user.max_user_namespaces: 11255

          # Network tuning (high BDP Denver-Montreal link)
          net.core.default_qdisc: fq
          net.core.rmem_max: 67108864
          net.core.wmem_max: 67108864
          net.core.netdev_max_backlog: 30000
          net.ipv4.tcp_congestion_control: bbr
          net.ipv4.tcp_fastopen: 3
          net.ipv4.tcp_rmem: 4096 131072 67108864
          net.ipv4.tcp_wmem: 4096 131072 67108864
          net.ipv4.tcp_slow_start_after_idle: 0
          net.ipv4.tcp_fin_timeout: 30
          net.ipv4.tcp_keepalive_time: 600
          net.ipv4.tcp_keepalive_intvl: 30
          net.ipv4.tcp_keepalive_probes: 10

          # IP forwarding for WireGuard NAT
          net.ipv4.ip_forward: 1
          net.ipv6.conf.all.forwarding: 1

          # Conntrack tuning for NAT
          net.netfilter.nf_conntrack_max: 262144
          net.netfilter.nf_conntrack_tcp_timeout_established: 86400
        install:
          bootloader: true
          wipe: true
        kubelet:
          extraConfig:
            imageMaximumGCAge: 168h
            imageGCHighThresholdPercent: 50
            imageGCLowThresholdPercent: 20
            serverTLSBootstrap: true
        time:
          servers:
          - time.cloudflare.com
