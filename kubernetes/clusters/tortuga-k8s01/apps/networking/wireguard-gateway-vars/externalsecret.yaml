---
# yaml-language-server: $schema=https://k8s-schemas.freckle.systems/external-secrets.io/externalsecret_v1.json
# Exposes WireGuard server config as postBuild variables for Flux substitution.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: wireguard-gateway-vars
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: op-cluster-vault
  target:
    name: wireguard-gateway-vars
    template:
      data:
        WG_LISTEN_PORT: "{{ .listen_port }}"
  dataFrom:
    - extract:
        key: wg-server
