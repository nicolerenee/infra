---
# yaml-language-server: $schema=https://k8s-schemas.freckle.systems/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app cilium
  namespace: &namespace kube-system
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  targetNamespace: *namespace
  path: ./kubernetes/apps/networking/cilium/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  interval: 1h
  retryInterval: 2m
  timeout: 5m
  patches:
    - target:
        kind: HTTPRoute
      patch: |-
        $patch: delete
        apiVersion: gateway.networking.k8s.io/v1
        kind: HTTPRoute
        metadata:
          name: hubble
    - target:
        kind: HelmRelease
      patch: |-
        - op: add
          path: /spec/values
          value:
            bandwidthManager:
              enabled: true
              bbr: true
            bpf:
              datapathMode: netkit
              preallocateMaps: true
            devices:
              - ens3
            hostFirewall:
              enabled: true
            loadBalancer:
              algorithm: maglev
            gatewayAPI:
              enabled: false
