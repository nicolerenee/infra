---
# yaml-language-server: $schema=https://k8s-schemas.freckle.systems/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app cilium-cidrgroups
  namespace: &namespace kube-system
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  targetNamespace: *namespace
  dependsOn:
    - name: site-public-ips
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  path: ./kubernetes/apps/networking/cilium/cidrgroups
  interval: 2m
  retryInterval: 1m
  timeout: 5m
  prune: true
  wait: true
  postBuild:
    substituteFrom:
      - kind: Secret
        name: site-public-ips
