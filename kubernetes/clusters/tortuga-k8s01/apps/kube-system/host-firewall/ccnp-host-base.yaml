---
# yaml-language-server: $schema=https://k8s-schemas.freckle.systems/cilium.io/ciliumclusterwidenetworkpolicy_v2.json
# Base host firewall policy for tortuga: default deny with ICMP and Talos API allowed.
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: host-base-policy
spec:
  nodeSelector: {}
  enableDefaultDeny:
    ingress: true
  ingress:
    # Allow ICMP (ping) from anywhere
    - icmps:
        - fields:
            - type: 8
              family: IPv4
            - type: 128
              family: IPv6
    # Allow all cluster-internal traffic to the host
    - fromEntities:
        - cluster
    # Allow Talos API and Kubernetes API from fairy and atlantis
    - fromCIDRSet:
        - cidrGroupRef: site-fairy-public
        - cidrGroupRef: site-atlantis-public
      toPorts:
        - ports:
            - port: "6443"
              protocol: TCP
            - port: "50000"
              protocol: TCP
