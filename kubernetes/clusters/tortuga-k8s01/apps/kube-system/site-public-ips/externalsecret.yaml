---
# yaml-language-server: $schema=https://k8s-schemas.freckle.systems/external-secrets.io/externalsecret_v1.json
# Pulls site public IPs from 1Password for use in CiliumCIDRGroup resources.
# Referenced via postBuild substituteFrom in the Flux Kustomization.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: site-public-ips
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: op-cluster-vault
  target:
    name: site-public-ips
  dataFrom:
    - extract:
        key: site-public-ips
