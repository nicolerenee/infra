---
# yaml-language-server: $schema=https://k8s-schemas.freckle.systems/external-secrets.io/externalsecret_v1.json
# Empty cluster secrets — tortuga doesn't have domain variables yet.
# This ExternalSecret creates an empty secret so the flux-post-build-variables
# component doesn't fail on missing k8s-cluster-secrets.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: k8s-cluster-secrets
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: op-cluster-vault
  target:
    name: k8s-cluster-secrets
    template:
      metadata:
        annotations:
          reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
          reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
    creationPolicy: Orphan
  dataFrom:
    - extract:
        key: cluster-secrets
        conversionStrategy: Default
