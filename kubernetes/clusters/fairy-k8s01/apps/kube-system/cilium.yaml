---
# yaml-language-server: $schema=https://k8s-schemas.freckle.systems/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app cilium
  namespace: &namespace kube-system
  labels:
    infra.freckle.systems/post-build-variables: enabled
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    - name: prometheus-operator-crds
      namespace: observability
  targetNamespace: *namespace
  path: ./kubernetes/apps/networking/cilium/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  interval: 1h
  retryInterval: 2m
  timeout: 5m
  patches:
    - target:
        kind: HelmRelease
      patch: |-
        - op: add
          path: /spec/values
          value:
            bandwidthManager:
              enabled: true
              bbr: false
            bpf:
              datapathMode: netkit
              preallocateMaps: true
              distributedLRU:
                enabled: true
              # VLAN 300 (home LAN) is bridged onto br300 via bond0.300
              # for KubeVirt VMs and macvlan-style pods (scrypted,
              # esphome). Cilium's TCX program on bond0 drops VLAN-tagged
              # ingress with "VLAN traffic disallowed by VLAN filter"
              # unless the VLAN is in this bypass list. Auto-detection
              # only registers VLAN sub-interfaces that have an IP at
              # agent startup, which is fragile; explicit bypass is
              # the durable fix.
              vlanBypass:
                - 300
            loadBalancer:
              algorithm: maglev
            bpfClockProbe: true
