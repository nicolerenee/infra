---
# yaml-language-server: $schema=https://k8s-schemas.freckle.systems/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app nvidia-dra-driver
  namespace: &namespace gpu-operator
spec:
  targetNamespace: *namespace
  dependsOn:
    - name: nvidia-gpu-operator
      namespace: gpu-operator
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  path: ./kubernetes/apps/devices/nvidia-dra-driver
  interval: 2m
  retryInterval: 1m
  timeout: 5m
  prune: true
  wait: true
