---
# k8s SA + GCP Secret Manager SecretStore for external-dns on fairy.
# Shared by every external-dns instance in this namespace (cloudflare,
# cloudflare-tunnel). Per-instance token isolation happens at the GSM
# secret level — each instance pulls its own token from its own GSM
# secret, but they all authenticate via this one SA.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets-fairy-k8s01
  namespace: external-dns
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: gcp-sm
  namespace: external-dns
spec:
  provider:
    gcpsm:
      projectID: freckle-secrets-db8d4f
      auth:
        workloadIdentityFederation:
          audience: //iam.googleapis.com/projects/305363951351/locations/global/workloadIdentityPools/k8s-clusters/providers/fairy-k8s01
          serviceAccountRef:
            name: external-secrets-fairy-k8s01
            namespace: external-dns
            audiences:
              - //iam.googleapis.com/projects/305363951351/locations/global/workloadIdentityPools/k8s-clusters/providers/fairy-k8s01
