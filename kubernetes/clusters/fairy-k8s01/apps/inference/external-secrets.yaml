---
# k8s SA + GCP Secret Manager SecretStore for the inference namespace.
# Authenticates to GCP via Workload Identity Federation — no stored
# credentials. ESO requests a projected SA token with the WIF provider
# audience, exchanges via STS for a federated principal, then reads GSM
# secrets matching the conditional secretAccessor binding
# (fairy-k8s01-inference-* prefix; binding is in tofu/ai-gateway.tf).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets-inference
  namespace: inference
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: gcp-sm
  namespace: inference
spec:
  provider:
    gcpsm:
      projectID: freckle-secrets-db8d4f
      auth:
        workloadIdentityFederation:
          audience: //iam.googleapis.com/projects/305363951351/locations/global/workloadIdentityPools/k8s-clusters/providers/fairy-k8s01
          serviceAccountRef:
            name: external-secrets-inference
            namespace: inference
            audiences:
              - //iam.googleapis.com/projects/305363951351/locations/global/workloadIdentityPools/k8s-clusters/providers/fairy-k8s01
