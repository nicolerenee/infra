---
# yaml-language-server: $schema=https://k8s-schemas.freckle.systems/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app qwen36-35b-a3b
  namespace: &namespace inference
  labels:
    infra.freckle.systems/post-build-variables: enabled
spec:
  targetNamespace: *namespace
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    # No huggingface dep: this serves pre-staged weights with HF_HUB_OFFLINE=1
    # and never reads the HF secret. Real deps are the DRA claim templates and
    # the GPU/DRA driver.
    - name: resource-claims
      namespace: inference
    - name: nvidia-gpu-operator
      namespace: gpu-operator
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  path: ./kubernetes/apps/inference/models/qwen36-35b-a3b
  interval: 2m
  retryInterval: 1m
  timeout: 30m
  prune: true
  wait: true
  # spec.clusterIP is immutable, so converting the Service from ClusterIP to
  # headless can't be done by a patch — force lets Flux delete+recreate it. Safe
  # to leave on: it only recreates a resource when an in-place apply hits an
  # immutable-field conflict (rare), and it self-heals such drift going forward.
  force: true
