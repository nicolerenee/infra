---
# yaml-language-server: $schema=https://k8s-schemas.freckle.systems/kustomize.toolkit.fluxcd.io/kustomization_v1.json
# Fairy-only AI gateway routing for local models (Janet → qwen). Cluster-tree
# resource so it never lands on atlantis (which also runs the EAG controller).
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app ai-routes
  namespace: &namespace inference
spec:
  targetNamespace: *namespace
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    # Gateway + CRDs from the EAG install; the qwen Service must exist for the
    # AIServiceBackend/BackendTrafficPolicy to bind.
    - name: ai-gateway
      namespace: inference
    - name: qwen36-35b-a3b
      namespace: inference
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  path: ./kubernetes/clusters/fairy-k8s01/apps/inference/ai-routes
  interval: 2m
  retryInterval: 1m
  timeout: 5m
  prune: true
  wait: true
