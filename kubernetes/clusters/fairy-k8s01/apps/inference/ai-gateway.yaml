---
# yaml-language-server: $schema=https://k8s-schemas.freckle.systems/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app ai-gateway
  namespace: &namespace inference
  labels:
    infra.freckle.systems/post-build-variables: enabled
spec:
  targetNamespace: *namespace
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    # AIGatewayRoute/AIServiceBackend/BackendSecurityPolicy CRDs come from
    # the EAG install; ESO controller must be up to materialize the key.
    - name: envoy-ai-gateway
      namespace: envoy-ai-gateway-system
    - name: external-secrets
      namespace: external-secrets
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  path: ./kubernetes/apps/inference/platform/ai-gateway
  interval: 2m
  retryInterval: 1m
  timeout: 5m
  prune: true
  wait: true
