---
# Fairy-only local-model routing for the in-cluster AI gateway. Lives in the
# cluster tree (not shared apps/) on purpose: it points at fairy-only DGX vLLM,
# and atlantis also runs the EAG controller — cluster-tree placement guarantees
# these routes can never follow a shared app onto atlantis.
#
# Janet sends Anthropic Messages with model = a semantic name; the "ai" Gateway
# extracts it into x-ai-eg-model and routes here. Backend schema is OpenAI, so
# EAG translates Anthropic→OpenAI for vLLM. The concrete model id stays
# gateway-only — each rule rewrites the semantic name to qwen3.6-35b-a3b via
# modelNameOverride.
#
# HA: the qwen Service is HEADLESS, so this FQDN resolves to one A record per
# ready pod and Envoy's STRICT_DNS cluster load-balances per REQUEST (round-robin)
# across the pods, dropping any that fail /health. This replaced a ClusterIP,
# which gave Envoy a single VIP endpoint and let kube-proxy pin ~99% of traffic
# to one pod (per-connection L4 LB + few long-lived upstream connections). Real
# per-request LB needs Envoy to see the pod endpoints — EDS via a direct Service
# backendRef isn't supported until EAG implements envoyproxy/ai-gateway#902, so
# headless DNS is the mechanism until then. (least-request / active-health /
# outlier-eject still unavailable: EAG requires AIServiceBackend→Backend, and
# BackendTrafficPolicy can only target a Gateway/Route — a Gateway-scoped policy
# would also hit the shared Anthropic backend. Revisit if backend-scoped traffic
# policy lands.)
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: Backend
metadata:
  name: qwen36-35b-a3b
spec:
  endpoints:
    - fqdn:
        hostname: qwen36-35b-a3b.inference.svc.cluster.local
        port: 8000
---
apiVersion: aigateway.envoyproxy.io/v1beta1
kind: AIServiceBackend
metadata:
  name: local-qwen36-35b-a3b
spec:
  schema:
    name: OpenAI
  backendRef:
    group: gateway.envoyproxy.io
    kind: Backend
    name: qwen36-35b-a3b
---
apiVersion: aigateway.envoyproxy.io/v1beta1
kind: AIGatewayRoute
metadata:
  name: local-models
spec:
  parentRefs:
    - name: ai
      kind: Gateway
      group: gateway.networking.k8s.io
  # The brain's models.json registry sends model=Qwen3.6-35B-A3B-FP8 directly, so
  # this single rule (matching the real served name) is what Janet hits and what
  # surfaces the model in the gateway's GET /v1/models. The old tier names
  # (chat/fast/planning/code/secure-local/secure-ephemeral) were removed once
  # nothing referenced them. When a dedicated coder/27B backend lands, add a rule
  # matching its served name pointing at that backend.
  rules:
    - matches:
        - headers:
            - type: Exact
              name: x-ai-eg-model
              value: Qwen3.6-35B-A3B-FP8
      backendRefs:
        - name: local-qwen36-35b-a3b
          modelNameOverride: qwen3.6-35b-a3b
      # Streaming LLM responses legitimately run several minutes; Envoy AI
      # Gateway's implicit 60s request-timeout default truncated long single
      # generations mid-stream. 30m is a runaway backstop a real turn never
      # reaches — a genuinely stalled stream is reaped far sooner by the
      # gateway-wide streamIdleTimeout (see ai-buffer-limit ClientTrafficPolicy).
      timeouts:
        request: 1800s
