---
# k8s SA + GCP Secret Manager SecretStore for the janet-mcp namespace (WIF; no
# stored credentials). Reads GSM secrets matching the fairy-k8s01-janet-mcp-*
# prefix grant (tofu/janet-mcp.tf).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets-janet-mcp
  namespace: janet-mcp
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: gcp-sm
  namespace: janet-mcp
spec:
  provider:
    gcpsm:
      projectID: freckle-secrets-db8d4f
      auth:
        workloadIdentityFederation:
          audience: //iam.googleapis.com/projects/305363951351/locations/global/workloadIdentityPools/k8s-clusters/providers/fairy-k8s01
          serviceAccountRef:
            name: external-secrets-janet-mcp
            namespace: janet-mcp
            audiences:
              - //iam.googleapis.com/projects/305363951351/locations/global/workloadIdentityPools/k8s-clusters/providers/fairy-k8s01
