---
# k8s SA + GCP Secret Manager SecretStore for the janet namespace.
# Authenticates to GCP via Workload Identity Federation — no stored
# credentials. Reads GSM secrets matching the conditional secretAccessor
# binding (fairy-k8s01-janet-* prefix; binding is in tofu/janet.tf).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets-janet
  namespace: janet
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: gcp-sm
  namespace: janet
spec:
  provider:
    gcpsm:
      projectID: freckle-secrets-db8d4f
      auth:
        workloadIdentityFederation:
          audience: //iam.googleapis.com/projects/305363951351/locations/global/workloadIdentityPools/k8s-clusters/providers/fairy-k8s01
          serviceAccountRef:
            name: external-secrets-janet
            namespace: janet
            audiences:
              - //iam.googleapis.com/projects/305363951351/locations/global/workloadIdentityPools/k8s-clusters/providers/fairy-k8s01
