---
# The single bootstrap Kustomization: applies the app-owned Flux TOPOLOGY from
# the janet OCI bundle (deploy/flux/). Everything about WHICH janet components
# deploy and in WHAT order now lives in the app repo (freckleapps/janet) — the
# child KSs this creates (janet-migrate, janet-api, janet-controller, and
# janet-scheduler when it lands) source the same OCIRepository and reconcile the
# workload subpaths. Adding/moving a component is an app-side change, never an
# infra PR.
#
# This replaces the per-component child KSs (migrate/brain/controller) that used
# to live beside this file — they moved into deploy/flux/ and are adopted by the
# same-named bundle KSs (janet-brain -> janet-api). prune was pre-disabled on the
# old KSs (#2080) so removing their files orphans, not GCs, their workloads.
#
# Infra keeps the irreducible floor (applied by the parent janet-apps KS
# alongside this bootstrap): external-secrets (the janet SecretStore), platform
# (the OCIRepository source + image automation), and db (the CNPG janet-db
# Cluster + role). The bundle child KSs dependsOn those by name.
#
# yaml-language-server: $schema=https://k8s-schemas.freckle.systems/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: janet
  namespace: janet
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: janet
  dependsOn:
    - name: external-secrets
      namespace: external-secrets
    # The OCIRepository this KS (and every child it creates) sources from is
    # created by janet-platform.
    - name: janet-platform
      namespace: janet
  sourceRef:
    kind: OCIRepository
    name: janet
    namespace: janet
  path: ./flux
  interval: 2m
  retryInterval: 1m
  timeout: 5m
  prune: true
  wait: false
