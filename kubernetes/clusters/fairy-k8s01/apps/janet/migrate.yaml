---
# PR 2 (OCI-artifact cutover): adopts the objects the old git-sourced
# `janet-migrate` Kustomization of the same name applied — same
# name/namespace/commonMetadata labels, so this is an SSA owner-label
# rewrite, not a fresh create. prune was pre-disabled in PR 1 specifically so
# this file-swap does not GC anything; it's re-enabled here since the new
# owner (this OCIRepository-sourced KS) should garbage-collect its own
# moves/renames going forward. The migrate Job itself will force-recreate
# once on first reconcile — Job specs are immutable, and the
# commonMetadata/label rewrite is a spec diff — expected; `goose up` is
# idempotent so the re-run is a no-op.
#
# yaml-language-server: $schema=https://k8s-schemas.freckle.systems/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app janet-migrate
  namespace: &namespace janet
  labels:
    infra.freckle.systems/post-build-variables: enabled
spec:
  targetNamespace: *namespace
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    - name: external-secrets
      namespace: external-secrets
    - name: janet-db
      namespace: janet
  sourceRef:
    kind: OCIRepository
    name: janet
    namespace: janet
  path: ./migrate
  interval: 2m
  retryInterval: 1m
  timeout: 5m
  prune: true
  # Wait for the Job to complete before dependents (the brain) roll.
  wait: true
