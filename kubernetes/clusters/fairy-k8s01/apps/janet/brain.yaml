---
# yaml-language-server: $schema=https://k8s-schemas.freckle.systems/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app janet-brain
  namespace: &namespace janet
  labels:
    infra.freckle.systems/post-build-variables: enabled
spec:
  targetNamespace: *namespace
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    - name: external-secrets
      namespace: external-secrets
    # Wait for migrations to complete — the brain no longer creates its own
    # schema (goose owns it). janet-migrate itself dependsOn janet-db, so this
    # transitively waits for the DB too.
    - name: janet-migrate
      namespace: janet
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  path: ./kubernetes/apps/inference/janet/brain
  interval: 2m
  retryInterval: 1m
  timeout: 5m
  # prune deliberately disabled ahead of the OCI-artifact cutover so deleting
  # this KS (PR 2) adopts the existing resources instead of garbage-collecting them.
  prune: false
  wait: true
