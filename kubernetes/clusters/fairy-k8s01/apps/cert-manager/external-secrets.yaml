---
# k8s SA + GCP Secret Manager SecretStore for cert-manager on fairy.
# Authenticates to GCP via Workload Identity Federation — no stored
# credentials. The SA name includes the full cluster name (not just
# `fairy`) so adding atlantis-k8s02 alongside atlantis-k8s01 doesn't
# collide either — every cluster's federated principal subject stays
# distinct, which is what the IAM condition relies on.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets-fairy-k8s01
  namespace: cert-manager
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: gcp-sm
  namespace: cert-manager
spec:
  provider:
    gcpsm:
      projectID: freckle-secrets-db8d4f
      auth:
        workloadIdentityFederation:
          audience: //iam.googleapis.com/projects/305363951351/locations/global/workloadIdentityPools/k8s-clusters/providers/fairy-k8s01
          serviceAccountRef:
            name: external-secrets-fairy-k8s01
            namespace: cert-manager
            audiences:
              - //iam.googleapis.com/projects/305363951351/locations/global/workloadIdentityPools/k8s-clusters/providers/fairy-k8s01
