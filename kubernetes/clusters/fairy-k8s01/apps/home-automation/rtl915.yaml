---
# yaml-language-server: $schema=https://k8s-schemas.freckle.systems/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app rtl915
  namespace: &namespace home-automation
  labels:
    infra.freckle.systems/post-build-variables: enabled
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    - name: mosquitto
      namespace: home-automation
  targetNamespace: *namespace
  path: ./kubernetes/apps/home-automation/rtl-433
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  interval: 2m
  retryInterval: 1m
  timeout: 5m
  prune: true
  wait: true
  postBuild:
    substitute:
      APP: *app
      FREQUENCY: "915"
