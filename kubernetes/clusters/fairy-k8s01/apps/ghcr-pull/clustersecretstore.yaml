---
# Cluster-scoped GSM store for fairy. Needed because a ClusterExternalSecret's
# generated ExternalSecrets land in arbitrary namespaces and must reference a
# store that resolves cluster-wide — the per-namespace `gcp-sm` SecretStores
# only resolve in their own namespace. Authenticates via Workload Identity
# Federation as the existing flux-system cluster ESO SA
# (external-secrets-fairy-k8s01); IAM grant lives in tofu/ghcr-pull.tf.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: gcp-sm-cluster
spec:
  provider:
    gcpsm:
      projectID: freckle-secrets-db8d4f
      auth:
        workloadIdentityFederation:
          audience: //iam.googleapis.com/projects/305363951351/locations/global/workloadIdentityPools/k8s-clusters/providers/fairy-k8s01
          serviceAccountRef:
            name: external-secrets-fairy-k8s01
            namespace: flux-system
            audiences:
              - //iam.googleapis.com/projects/305363951351/locations/global/workloadIdentityPools/k8s-clusters/providers/fairy-k8s01
