---
# Fans one GHCR pull Secret into every namespace labeled
# `freckle.systems/ghcr-pull: "true"`. imagePullSecrets are namespace-local,
# so the dockerconfigjson must physically exist in each consuming namespace —
# this materializes it from the single GSM secret fairy-k8s01-ghcr-pull.
# Opt-in by design: the token can pull any private image the account can
# reach, so it only lands where a namespace explicitly asks for it.
#
# Consume it by labeling the namespace and referencing the Secret:
#   metadata.labels: { freckle.systems/ghcr-pull: "true" }   # on the Namespace
#   spec.imagePullSecrets: [{ name: ghcr-pull }]             # on the workload/SA
apiVersion: external-secrets.io/v1
kind: ClusterExternalSecret
metadata:
  name: ghcr-pull
spec:
  # Name of the ExternalSecret (and resulting Secret) created in each match.
  externalSecretName: ghcr-pull
  namespaceSelectors:
    - matchLabels:
        freckle.systems/ghcr-pull: "true"
  refreshTime: 1h
  externalSecretSpec:
    secretStoreRef:
      kind: ClusterSecretStore
      name: gcp-sm-cluster
    refreshInterval: 1h
    target:
      name: ghcr-pull
      creationPolicy: Owner
      template:
        engineVersion: v2
        type: kubernetes.io/dockerconfigjson
        data:
          .dockerconfigjson: |
            {
              "auths": {
                "ghcr.io": {
                  "username": "{{ .username }}",
                  "password": "{{ .token }}",
                  "auth": "{{ printf "%s:%s" .username .token | b64enc }}"
                }
              }
            }
    dataFrom:
      - extract:
          key: fairy-k8s01-ghcr-pull
