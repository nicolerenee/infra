---
# k8s SA + GCP Secret Manager SecretStore for flux on fairy. Lets the
# shared github-app ExternalSecret source from GSM instead of 1P. SA
# name encodes the full cluster name so per-cluster federated principals
# stay distinct in IAM (same rationale as cert-manager / external-dns).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets-fairy-k8s01
  namespace: flux-system
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: gcp-sm
  namespace: flux-system
spec:
  provider:
    gcpsm:
      projectID: freckle-secrets-db8d4f
      auth:
        workloadIdentityFederation:
          audience: //iam.googleapis.com/projects/305363951351/locations/global/workloadIdentityPools/k8s-clusters/providers/fairy-k8s01
          serviceAccountRef:
            name: external-secrets-fairy-k8s01
            namespace: flux-system
            audiences:
              - //iam.googleapis.com/projects/305363951351/locations/global/workloadIdentityPools/k8s-clusters/providers/fairy-k8s01
