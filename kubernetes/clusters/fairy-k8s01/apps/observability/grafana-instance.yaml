---
# yaml-language-server: $schema=https://k8s-schemas.freckle.systems/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app grafana-instance
  namespace: &namespace observability
  labels:
    infra.freckle.systems/post-build-variables: enabled
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    - name: grafana-operator
  targetNamespace: *namespace
  path: ./kubernetes/apps/observability/grafana/instance
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  interval: 30s
  retryInterval: 1m
  timeout: 5m
  patches:
    # Fairy-only: source the grafana OIDC credentials from GSM
    # (tofu/pocketid.tf provisions the client) instead of the shared
    # 1P-backed default. Atlantis continues using the manually-managed
    # client until we explicitly migrate it.
    - target:
        kind: ExternalSecret
        name: grafana-oauth
      patch: |-
        - op: replace
          path: /spec/secretStoreRef
          value:
            kind: SecretStore
            name: gcp-sm
        - op: remove
          path: /spec/data
        - op: add
          path: /spec/dataFrom
          value:
            - extract:
                key: ${CLUSTER_NAME}-observability-grafana-oidc
