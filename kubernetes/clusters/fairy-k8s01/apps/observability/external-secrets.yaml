---
# k8s SA + GCP Secret Manager SecretStore for observability on fairy.
# Used by OIDC ExternalSecrets (grafana, future alertmanager etc.) and
# anything else in the namespace that wants GSM-backed credentials.
# SA name encodes the full cluster name so per-cluster federated
# principals stay distinct in IAM (same rationale as cert-manager).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets-fairy-k8s01
  namespace: observability
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: gcp-sm
  namespace: observability
spec:
  provider:
    gcpsm:
      projectID: freckle-secrets-db8d4f
      auth:
        workloadIdentityFederation:
          audience: //iam.googleapis.com/projects/305363951351/locations/global/workloadIdentityPools/k8s-clusters/providers/fairy-k8s01
          serviceAccountRef:
            name: external-secrets-fairy-k8s01
            namespace: observability
            audiences:
              - //iam.googleapis.com/projects/305363951351/locations/global/workloadIdentityPools/k8s-clusters/providers/fairy-k8s01
