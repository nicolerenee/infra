---
# yaml-language-server: $schema=https://k8s-schemas.freckle.systems/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app gateway-configs
  namespace: &namespace gateway-system
  labels:
    infra.freckle.systems/post-build-variables: enabled
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    - name: envoy-gateway
      namespace: envoy-gateway-system
    - name: envoy-gateway-crds
      namespace: envoy-gateway-system
  targetNamespace: *namespace
  path: ./kubernetes/apps/networking/envoy-gateway/gateways
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  interval: 1h
  retryInterval: 2m
  timeout: 5m
  # gw-public is in the shared base so the CI completeness check passes;
  # fairy is internal-only, so strip the public Gateway plus its companion
  # EnvoyPatchPolicy out at apply time.
  patches:
    - target:
        kind: Gateway
        name: public
      patch: |
        $patch: delete
        apiVersion: gateway.networking.k8s.io/v1
        kind: Gateway
        metadata:
          name: public
    - target:
        kind: EnvoyPatchPolicy
        name: public
      patch: |
        $patch: delete
        apiVersion: gateway.envoyproxy.io/v1alpha1
        kind: EnvoyPatchPolicy
        metadata:
          name: public
