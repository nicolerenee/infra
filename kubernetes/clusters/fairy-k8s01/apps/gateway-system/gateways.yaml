---
# yaml-language-server: $schema=https://k8s-schemas.freckle.systems/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app gateway-configs
  namespace: &namespace gateway-system
  labels:
    infra.freckle.systems/post-build-variables: enabled
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    - name: envoy-gateway
      namespace: envoy-gateway-system
    - name: envoy-gateway-crds
      namespace: envoy-gateway-system
  targetNamespace: *namespace
  path: ./kubernetes/apps/networking/envoy-gateway/gateways
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  interval: 1h
  retryInterval: 2m
  timeout: 5m
  patches:
    # tag:fairy-k8s01-gw isn't registered in the tailnet ACLs — reuse
    # tag:fairy-k8s01-ingress (already used by the ingress-proxy
    # ProxyGroup) so the operator can provision the Tailscale Service.
    - target:
        kind: Gateway
        name: tailnet
      patch: |-
        - op: replace
          path: /spec/infrastructure/annotations/tailscale.com~1tags
          value: "tag:${CLUSTER_NAME}-ingress"
