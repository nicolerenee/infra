---
apiVersion: v1
kind: Namespace
metadata:
  name: harvest
  labels:
    # Opt in to the cluster-wide GHCR pull secret (ClusterExternalSecret
    # stamps a `ghcr-pull` dockerconfigjson here) so we can pull the private
    # ghcr.io/nicolerenee/harvest image.
    freckle.systems/ghcr-pull: "true"
  annotations:
    kustomize.toolkit.fluxcd.io/prune: disabled
---
# yaml-language-server: $schema=https://k8s-schemas.freckle.systems/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app harvest-apps
  namespace: &namespace harvest
  labels:
    infra.freckle.systems/post-build-variables: enabled
spec:
  targetNamespace: *namespace
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    - name: external-secrets
      namespace: external-secrets
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  path: ./kubernetes/clusters/fairy-k8s01/apps/harvest
  interval: 2m
  retryInterval: 1m
  timeout: 5m
  prune: true
  wait: false
