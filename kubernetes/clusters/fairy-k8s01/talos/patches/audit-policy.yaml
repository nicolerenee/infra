---
# Enable kube-apiserver audit logging at Metadata level. Talos writes the
# log to /var/log/audit/kube-apiserver.log on each CP node; the
# observability/vector DaemonSet tails it via the hostPath /var/log/
# mount and ships to VictoriaLogs.
#
# This patch is used standalone for compute02/03 (which aren't in
# talconfig.yaml during reprovisioning). The same auditPolicy is also
# inlined into talconfig.yaml so it applies to the rest of the fleet
# when talhelper regenerates clusterconfig.
cluster:
  apiServer:
    auditPolicy:
      apiVersion: audit.k8s.io/v1
      kind: Policy
      rules:
        - level: Metadata
          omitStages:
            - RequestReceived
