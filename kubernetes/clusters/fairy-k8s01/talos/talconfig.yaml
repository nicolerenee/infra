---
clusterName: fairy-k8s01
talosVersion: ${TALOS_VERSION}
kubernetesVersion: ${KUBERNETES_VERSION}
endpoint: https://fairy-k8s01-api.freckle.systems:6443
domain: cluster.local
allowSchedulingOnMasters: true
clusterPodNets:
  - 10.230.0.0/16
  - fd2b:ec92:e232::/48
clusterSvcNets:
  - 10.229.0.0/16
  - fd2b:ec92:e230:1::/112
cniConfig:
  name: none

nodes:
  - hostname: fairy-r02-cn01
    ipAddress: 10.189.3.16
    controlPlane: true
    installDiskSelector:
      model: "Samsung SSD 870*"
    nodeLabels:
      networks.freckle.systems/home-lan: present
      topology.freckle.systems/rack: r02
    machineSpec: &cn01-machineSpec
      mode: metal
      arch: amd64
      useUKI: true
      secureboot: true
    schematic: &cn01-schematic
      customization:
        systemExtensions:
          officialExtensions:
            - siderolabs/i915
            - siderolabs/intel-ucode
            - siderolabs/iscsi-tools
            - siderolabs/lldpd
            - siderolabs/mei
    extensionServices:
      - &cn01-lldp-extension
        name: lldpd
        configFiles:
          - mountPath: /usr/local/etc/lldpd/lldpd.conf
            content: |
              configure lldp portidsubtype ifname
              unconfigure lldp management-addresses-advertisements
              unconfigure lldp capabilities-advertisements
              configure system description "Talos Compute Node"
    networkInterfaces:
      - &cn01-10g-1
        interface: bond0
        dhcp: false
        mtu: 9000
        addresses:
          - 10.189.3.16/24
        routes:
          - network: 0.0.0.0/0
            gateway: 10.189.3.1
            metric: 1024
        bond:
          mode: active-backup
          interfaces:
            - eno3
        vlans:
          - vlanId: 300
            mtu: 1500
            dhcp: false
            # No address: bond0.300 is purely a bridge port for br300.
            # (The earlier dummy 203.0.113.1/32 placeholder existed to
            # nudge Cilium's auto-detect into adding VLAN 300 to its
            # bpf VLAN allow-list. That's now done explicitly via
            # `bpf.vlanBypass: [300]` in the Cilium Helm values, so the
            # placeholder is no longer needed.)
      - &cn01-br300
        # L2 bridge over VLAN 300 (home LAN). Used as the parent for
        # KubeVirt VM bridge-CNI attachments and macvlan pod attachments
        # (multus-trusted, multus-vm-trusted). The bridge holds no IP —
        # it's purely an L2 fanout. STP disabled (single port = no loops).
        #
        # The MAC is pinned per node via an inline patch on each cn
        # node's `patches:` list (talhelper doesn't pass `hardwareAddr`
        # through to BridgeConfig). Scheme: 02:1f:80:03:00:NN —
        # locally-administered (02), random vendor-like prefix (1f:80),
        # VLAN ID 300 as 03:00, NN = cn-node number. Without pinning
        # the kernel synthesizes a random MAC each boot (observed
        # 16:f4:… → 0e:da:… across a single reboot).
        interface: br300
        dhcp: false
        mtu: 1500
        bridge:
          stp:
            enabled: false
          interfaces:
            - bond0.300
    patches:
      - ./patches/bridge-sysctls.yaml
      - ./patches/tpm-encryption.yaml
      - ./patches/watchdog.yaml
      - |-
        apiVersion: v1alpha1
        kind: BridgeConfig
        name: br300
        hardwareAddr: "02:1f:80:03:00:01"

  - hostname: fairy-r02-cn02
    ipAddress: 10.189.3.17
    controlPlane: true
    installDiskSelector:
      model: "Samsung SSD 990 PRO*"
    nodeLabels:
      networks.freckle.systems/home-lan: present
      topology.freckle.systems/rack: r02
    machineSpec: *cn01-machineSpec
    schematic: *cn01-schematic
    extensionServices:
      - <<: *cn01-lldp-extension
    networkInterfaces:
      - <<: *cn01-10g-1
        addresses:
