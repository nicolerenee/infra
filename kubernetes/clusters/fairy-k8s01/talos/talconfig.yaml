---
clusterName: fairy-k8s01
talosVersion: ${TALOS_VERSION}
kubernetesVersion: ${KUBERNETES_VERSION}
endpoint: https://10.189.2.69:6443
domain: cluster.local
allowSchedulingOnMasters: true
clusterPodNets:
  - 10.230.0.0/16
  - fd2b:ec92:e232::/48
clusterSvcNets:
  - 10.229.0.0/16
  - fd2b:ec92:e230:1::/112
cniConfig:
  name: none

nodes:
  - hostname: fairy-r02-cn01
    ipAddress: 10.189.3.16
    controlPlane: true
    installDiskSelector:
      model: "Samsung SSD 990 PRO*"
    nodeLabels:
      infra.freckle.systems/vlan-bridge: "true"
      infra.freckle.systems/gpu: i915
      topology.freckle.systems/rack: r02
    machineSpec: &cn01-machineSpec
      mode: metal
      arch: amd64
      useUKI: true
      secureboot: true
    schematic: &cn01-schematic
      customization:
        systemExtensions:
          officialExtensions:
            - siderolabs/i915
            - siderolabs/intel-ucode
            - siderolabs/iscsi-tools
            - siderolabs/lldpd
            - siderolabs/mei
    extensionServices:
      - &cn01-lldp-extension
        name: lldpd
        configFiles:
          - mountPath: /usr/local/etc/lldpd/lldpd.conf
            content: |
              configure lldp portidsubtype ifname
              unconfigure lldp management-addresses-advertisements
              unconfigure lldp capabilities-advertisements
              configure system description "Talos Compute Node"
    networkInterfaces:
      - &cn01-10g-1
        interface: eno3
        dhcp: false
        mtu: 9000
      - &cn01-bridge
        interface: bridge1
        dhcp: false
        mtu: 9000
        addresses:
          - 10.189.3.16/24
        routes:
          - network: 0.0.0.0/0
            gateway: 10.189.3.1
            metric: 1024
        bridge:
          interfaces:
            - eno3
          stp:
            enabled: false
          # talhelper 3.1.7 doesn't render vlan config to generated config
          # vlan:
          #   vlanFiltering: true
        vlans:
          - &cn01-vlan-home
            vlanId: 300
            mtu: 1500
    patches:
      - ./patches/bridge-sysctls.yaml
      - ./patches/bridge-vlan-filtering.yaml
      - ./patches/tpm-encryption.yaml
      - ./patches/watchdog.yaml

  - hostname: fairy-r02-cn02
    ipAddress: 10.189.3.17
    controlPlane: true
    installDiskSelector:
      model: "Samsung SSD 990 PRO*"
    nodeLabels:
      infra.freckle.systems/vlan-bridge: "true"
      infra.freckle.systems/gpu: i915
      topology.freckle.systems/rack: r02
    machineSpec: *cn01-machineSpec
    schematic: *cn01-schematic
    extensionServices:
      - <<: *cn01-lldp-extension
    networkInterfaces:
      - <<: *cn01-10g-1
      - <<: *cn01-bridge
        addresses:
          - 10.189.3.17/24
    patches:
      - ./patches/bridge-sysctls.yaml
      - ./patches/bridge-vlan-filtering.yaml
      - ./patches/tpm-encryption.yaml
      - ./patches/watchdog.yaml

  - hostname: fairy-r02-cn03
    ipAddress: 10.189.3.18
    controlPlane: true
    installDiskSelector:
      model: "Samsung SSD 990 PRO*"
    nodeLabels:
      infra.freckle.systems/vlan-bridge: "true"
      infra.freckle.systems/gpu: i915
      topology.freckle.systems/rack: r02
    machineSpec: *cn01-machineSpec
    schematic: *cn01-schematic
    extensionServices:
      - <<: *cn01-lldp-extension
    networkInterfaces:
      - <<: *cn01-10g-1
      - <<: *cn01-bridge
        addresses:
          - 10.189.3.18/24
    patches:
      - ./patches/bridge-sysctls.yaml
      - ./patches/bridge-vlan-filtering.yaml
      - ./patches/tpm-encryption.yaml
      - ./patches/watchdog.yaml

  - hostname: fairy-r02-cn04
    ipAddress: 10.189.3.19
    controlPlane: true
    installDiskSelector:
      model: "Samsung SSD 990 PRO*"
    nodeLabels:
      infra.freckle.systems/vlan-bridge: "true"
      infra.freckle.systems/gpu: i915
      topology.freckle.systems/rack: r02
    machineSpec: *cn01-machineSpec
    schematic: *cn01-schematic
    extensionServices:
      - <<: *cn01-lldp-extension
    networkInterfaces:
      - <<: *cn01-10g-1
      - <<: *cn01-bridge
        addresses:
          - 10.189.3.19/24
    patches:
      - ./patches/bridge-sysctls.yaml
      - ./patches/bridge-vlan-filtering.yaml
      - ./patches/tpm-encryption.yaml
      - ./patches/watchdog.yaml

  - hostname: fairy-r02-cn05
    ipAddress: 10.189.3.20
    controlPlane: true
    installDiskSelector:
      model: "Samsung SSD 990 PRO*"
    nodeLabels:
      infra.freckle.systems/vlan-bridge: "true"
      infra.freckle.systems/gpu: i915
      topology.freckle.systems/rack: r02
    machineSpec: *cn01-machineSpec
    schematic: *cn01-schematic
    extensionServices:
      - <<: *cn01-lldp-extension
    networkInterfaces:
      - <<: *cn01-10g-1
      - <<: *cn01-bridge
        addresses:
