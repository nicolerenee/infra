        interface: enp1s0f0np0
        dhcp: false
        mtu: 9000
      - &dgx01-cx7-1-2
        interface: enP2p1s0f0np0
        dhcp: false
        mtu: 9000
      - &dgx01-cx7-2-1
        interface: enp1s0f1np1
        dhcp: false
        mtu: 9000
