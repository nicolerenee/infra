  - hostname: fairy-r02-dgx01
    ipAddress: 10.189.3.22
    controlPlane: false
    installDisk: /dev/nvme0n1
    nodeLabels:
      topology.freckle.systems/rack: r02
    nodeTaints:
      nvidia.com/gpu: ":NoSchedule"
    machineSpec: &dgx01-machineSpec
      mode: metal
      arch: arm64
      useUKI: true
      secureboot: true
    schematic: &dgx01-schematic
      customization:
        extraKernelArgs:
          - arm64.nobti
        systemExtensions:
          officialExtensions:
            - siderolabs/iscsi-tools
            - siderolabs/lldpd
            - siderolabs/nvidia-container-toolkit-production
            # Open-source drivers cause CUDA initialization failures in containers (cuInit error 3)
            # - siderolabs/nvidia-open-gpu-kernel-modules-production
            # Proprietary drivers required for CUDA to work properly on DGX Spark (GB10)
            - siderolabs/nonfree-kmod-nvidia-production
    extensionServices:
