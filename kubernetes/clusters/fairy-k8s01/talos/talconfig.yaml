    networkInterfaces:
      - <<: *cn01-10g-1
      - <<: *cn01-bridge
        addresses:
          - 10.189.3.21/24
    patches:
      - ./patches/bridge-sysctls.yaml
      - ./patches/bridge-vlan-filtering.yaml
      - ./patches/tpm-encryption.yaml
      - ./patches/watchdog.yaml

  - hostname: fairy-r02-dgx01
    ipAddress: 10.189.3.22
    controlPlane: false
    installDisk: /dev/nvme0n1
    nodeLabels:
      infra.freckle.systems/gpu: nvidia
      nvidia.com/dra-kubelet-plugin: "true"
      topology.freckle.systems/rack: r02
    nodeTaints:
      nvidia.com/gpu: ":NoSchedule"
    machineSpec: &dgx01-machineSpec
      mode: metal
      arch: arm64
      useUKI: true
      secureboot: true
    schematic: &dgx01-schematic
      customization:
        extraKernelArgs:
          - arm64.nobti
        systemExtensions:
          officialExtensions:
            - siderolabs/iscsi-tools
            - siderolabs/lldpd
            - siderolabs/nvidia-container-toolkit-production
            # Open-source drivers cause CUDA initialization failures in containers (cuInit error 3)
            # - siderolabs/nvidia-open-gpu-kernel-modules-production
            # Proprietary drivers required for CUDA to work properly on DGX Spark (GB10)
            - siderolabs/nonfree-kmod-nvidia-production
    extensionServices:
      - &dgx01-lldp-extension
        name: lldpd
        configFiles:
          - mountPath: /usr/local/etc/lldpd/lldpd.conf
            content: |
              configure lldp portidsubtype ifname
              unconfigure lldp management-addresses-advertisements
              unconfigure lldp capabilities-advertisements
              configure system description "Talos DGX Spark Node"
    networkInterfaces:
      - &dgx01-10g-1
        interface: enP7s7
        dhcp: false
        addresses:
          - 10.189.3.22/24
        routes:
          - network: 0.0.0.0/0
            gateway: 10.189.3.1
            metric: 1024
      - &dgx01-cx7-1-1
        interface: enp1s0f0np0
        dhcp: false
        mtu: 9000
      - &dgx01-cx7-1-2
        interface: enP2p1s0f0np0
        dhcp: false
        mtu: 9000
      - &dgx01-cx7-2-1
        interface: enp1s0f1np1
        dhcp: false
        mtu: 9000
      - &dgx01-cx7-2-2
        interface: enP2p1s0f1np1
        dhcp: false
        mtu: 9000
    patches:
      - ./patches/nvidia-runtime.yaml
      - ./patches/watchdog.yaml

  - hostname: fairy-r02-dgx02
    ipAddress: 10.189.3.23
    controlPlane: false
    installDisk: /dev/nvme0n1
    nodeLabels:
      infra.freckle.systems/gpu: nvidia
      nvidia.com/dra-kubelet-plugin: "true"
      topology.freckle.systems/rack: r02
    nodeTaints:
      nvidia.com/gpu: ":NoSchedule"
    machineSpec: *dgx01-machineSpec
    schematic: *dgx01-schematic
    extensionServices:
      - <<: *dgx01-lldp-extension
    networkInterfaces:
      - <<: *dgx01-10g-1
        addresses:
          - 10.189.3.23/24
      - <<: *dgx01-cx7-1-1
      - <<: *dgx01-cx7-1-2
      - <<: *dgx01-cx7-2-1
      - <<: *dgx01-cx7-2-2
    patches:
      - ./patches/nvidia-runtime.yaml
      - ./patches/watchdog.yaml

  - hostname: fairy-r02-dgx03
    ipAddress: 10.189.3.24
    controlPlane: false
    installDisk: /dev/nvme0n1
    nodeLabels:
      infra.freckle.systems/gpu: nvidia
      nvidia.com/dra-kubelet-plugin: "true"
      topology.freckle.systems/rack: r02
    nodeTaints:
      nvidia.com/gpu: ":NoSchedule"
    machineSpec: *dgx01-machineSpec
    schematic: *dgx01-schematic
    extensionServices:
      - <<: *dgx01-lldp-extension
    networkInterfaces:
      - <<: *dgx01-10g-1
        addresses:
          - 10.189.3.24/24
      - <<: *dgx01-cx7-1-1
      - <<: *dgx01-cx7-1-2
      - <<: *dgx01-cx7-2-1
      - <<: *dgx01-cx7-2-2
    patches:
      - ./patches/nvidia-runtime.yaml
      - ./patches/watchdog.yaml

controlPlane:
  nodeLabels: {}
  patches:
    # Cluster configuration
    - |-
      cluster:
        etcd:
          extraArgs:
            listen-metrics-urls: "http://0.0.0.0:2381"
        controllerManager:
          extraArgs:
            bind-address: 0.0.0.0
            node-cidr-mask-size-ipv6: 64
        scheduler:
          extraArgs:
            bind-address: 0.0.0.0
        proxy:
          disabled: true

    # Disable search domain everywhere
    - &disableSearchDomainPatch |-
      machine:
        network:
          disableSearchDomain: true

    # Set nameserver
    - &nameServersPatch |-
      machine:
        network:
          nameservers:
            - 1.1.1.1
            - 1.0.0.1

    # Enable K8s Talos API Access
    - |-
      machine:
        features:
          kubernetesTalosAPIAccess:
            enabled: true
            allowedRoles:
              - os:reader
              - os:admin
            allowedKubernetesNamespaces:
              - actions-runner-system
              - system-upgrade

    # Machine patches to apply to all nodes
    - &machinePatches |
      machine:
        features:
          # Configures host DNS caching resolver.
          hostDNS:
            enabled: true
            # Cilium update "broke" this so disabling it
            # * https://github.com/cilium/cilium/issues/35153
            # * https://github.com/siderolabs/talos/pull/9200
            forwardKubeDNSToHost: false
            resolveMemberNames: true
        # Containerd customization
        files:
          - op: create
            path: /etc/cri/conf.d/20-customization.part
            content: |
              [plugins."io.containerd.cri.v1.images"]
                discard_unpacked_layers = false
              [plugins."io.containerd.cri.v1.runtime"]
                device_ownership_from_security_context = true
              [plugins."io.containerd.nri.v1.nri"]
                disable = false
        sysctls:
          # Kubernetes essentials
          fs.inotify.max_user_watches: 1048576
          fs.inotify.max_user_instances: 8192
          user.max_user_namespaces: 11255

          # Network - 25Gb optimized
          net.core.default_qdisc: fq
          net.core.rmem_max: 67108864
          net.core.wmem_max: 67108864
          net.core.netdev_max_backlog: 30000
          net.ipv4.tcp_congestion_control: bbr
          net.ipv4.tcp_fastopen: 3
          net.ipv4.tcp_rmem: 4096 131072 67108864
          net.ipv4.tcp_wmem: 4096 131072 67108864
          net.ipv4.tcp_slow_start_after_idle: 0
          net.ipv4.tcp_fin_timeout: 30
          net.ipv4.tcp_keepalive_time: 600
          net.ipv4.tcp_keepalive_intvl: 30
          net.ipv4.tcp_keepalive_probes: 10

          # NFS optimations
          sunrpc.tcp_slot_table_entries: 128
          sunrpc.tcp_max_slot_table_entries: 128
        install:
          bootloader: true
          wipe: true
        kubelet:
          nodeIP:
            validSubnets:
            - 10.189.3.0/24
          extraArgs: {}
          extraConfig:
            # Let IPv6 RAs through on 'net1' for thread announcements getting to HA additional NIC
            allowedUnsafeSysctls:
              - net.ipv6.conf.net1.accept_ra_rt_info_max_plen
            # Make image cleanup more aggressive
            imageMaximumGCAge: 168h # One week
            imageGCHighThresholdPercent: 50 # Default is 85%
            imageGCLowThresholdPercent: 20  # Default is 80%
            # Equivalent of `rotate-server-certificates` arg, for one less thing
            serverTLSBootstrap: true
            clusterDNS:
              - 10.229.0.10
              - fd2b:ec92:e230:1::a
        time:
          servers:
          - time.cloudflare.com # leave it as cloudflare but the router will hijack this and respond
worker:
  patches:
    - *disableSearchDomainPatch
    - *nameServersPatch
    - *machinePatches
