controlPlane:
  nodeLabels: {}
  patches:
    # Cluster configuration
    - |-
      cluster:
        apiServer:
          extraArgs:
            # SA token issuer is decoupled from the cluster's API endpoint
            # so external validators (Tailscale, GCP WIF) can fetch the
            # OIDC discovery + JWKS over the public internet. Hosted on
            # Cloudflare R2 via the k8s-oidc.freckle.systems custom domain.
            # Update `task wif:publish CLUSTER=fairy-k8s01` whenever the
            # cluster's SA signing key rotates (rare on talos).
            service-account-issuer: "https://k8s-oidc.freckle.systems/fairy-k8s01"
          # Audit log every request at Metadata level. Talos writes to
          # /var/log/audit/kube-apiserver.log on each CP node; the
          # observability/vector DaemonSet tails it via the hostPath
          # /var/log/ mount and ships to VictoriaLogs.
          auditPolicy:
            apiVersion: audit.k8s.io/v1
            kind: Policy
            rules:
              - level: Metadata
                omitStages:
                  - RequestReceived
        etcd:
          extraArgs:
            listen-metrics-urls: "http://0.0.0.0:2381"
        controllerManager:
          extraArgs:
            bind-address: 0.0.0.0
            node-cidr-mask-size-ipv6: 64
        scheduler:
          extraArgs:
            bind-address: 0.0.0.0
        proxy:
          disabled: true

    # Disable search domain everywhere
    - &disableSearchDomainPatch |-
      machine:
        network:
          disableSearchDomain: true

    # Set nameserver
    - &nameServersPatch |-
      machine:
        network:
          nameservers:
            - 1.1.1.1
            - 1.0.0.1

    # Enable K8s Talos API Access
    - |-
      machine:
        features:
          kubernetesTalosAPIAccess:
            enabled: true
            allowedRoles:
              - os:reader
              - os:admin
            allowedKubernetesNamespaces:
              - actions-runner-system
              - system-upgrade

    # Machine patches to apply to all nodes
    - &machinePatches |
      machine:
        features:
          # Configures host DNS caching resolver.
          hostDNS:
            enabled: true
            # Cilium update "broke" this so disabling it
            # * https://github.com/cilium/cilium/issues/35153
            # * https://github.com/siderolabs/talos/pull/9200
            forwardKubeDNSToHost: false
            resolveMemberNames: true
        # Containerd customization
        files:
          - op: create
            path: /etc/cri/conf.d/20-customization.part
            content: |
              [plugins."io.containerd.cri.v1.images"]
                discard_unpacked_layers = false
              [plugins."io.containerd.cri.v1.runtime"]
                device_ownership_from_security_context = true
              [plugins."io.containerd.nri.v1.nri"]
                disable = false
        sysctls:
          # Kubernetes essentials
          fs.inotify.max_user_watches: 1048576
          fs.inotify.max_user_instances: 8192
          user.max_user_namespaces: 11255

          # Network - 25Gb optimized
          net.core.default_qdisc: fq
          net.core.rmem_max: 67108864
          net.core.wmem_max: 67108864
          net.core.netdev_max_backlog: 30000
          net.ipv4.tcp_fastopen: 3
          net.ipv4.tcp_rmem: 4096 131072 67108864
          net.ipv4.tcp_wmem: 4096 131072 67108864
          net.ipv4.tcp_slow_start_after_idle: 0
          net.ipv4.tcp_fin_timeout: 30
          net.ipv4.tcp_keepalive_time: 600
          net.ipv4.tcp_keepalive_intvl: 30
          net.ipv4.tcp_keepalive_probes: 10

          # NFS optimations
          sunrpc.tcp_slot_table_entries: 128
          sunrpc.tcp_max_slot_table_entries: 128
        install:
          bootloader: true
          wipe: true
        kubelet:
          nodeIP:
            validSubnets:
            - 10.189.3.0/24
          extraArgs: {}
          extraConfig:
            # Let IPv6 RAs through on 'net1' for thread announcements getting to HA additional NIC
            allowedUnsafeSysctls:
              - net.ipv6.conf.net1.accept_ra_rt_info_max_plen
            # Make image cleanup more aggressive
            imageMaximumGCAge: 168h # One week
            imageGCHighThresholdPercent: 50 # Default is 85%
            imageGCLowThresholdPercent: 20  # Default is 80%
            # Equivalent of `rotate-server-certificates` arg, for one less thing
            serverTLSBootstrap: true
            clusterDNS:
              - 10.229.0.10
              - fd2b:ec92:e230:1::a
        time:
          servers:
          - time.cloudflare.com # leave it as cloudflare but the router will hijack this and respond
        # Node-local seccomp profile for the janet-coding namespace's sandbox pods:
        # denies the cross-process memory-read syscalls (ptrace, process_vm_readv/
        # writev, process_madvise, kcmp). Talos writes it to
        # /var/lib/kubelet/seccomp/profiles/janet-no-ptrace.json; pods select it via
        # localhostProfile: profiles/janet-no-ptrace.json.
        seccompProfiles:
          - name: janet-no-ptrace.json
            value:
              defaultAction: SCMP_ACT_ALLOW
              architectures:
                - SCMP_ARCH_X86_64
                - SCMP_ARCH_X86
                - SCMP_ARCH_X32
              syscalls:
                - names:
                    - ptrace
                    - process_vm_readv
                    - process_vm_writev
                    - process_madvise
                    - kcmp
                  action: SCMP_ACT_ERRNO
                  errnoRet: 1
worker:
  patches:
    - *disableSearchDomainPatch
    - *nameServersPatch
    - *machinePatches
