---
# Encora and StageMedia API credentials live in the shared op vault
# (kube-shared), not the per-cluster vault — they're the same keys
# regardless of which cluster runs promptbook.
# yaml-language-server: $schema=https://k8s-schemas.freckle.systems/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ${APP:=promptbook}
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: op-shared-vault
  data:
    - secretKey: PROMPTBOOK_ENCORA_APIKEY
      remoteRef:
        key: encora-api
        property: credential
    - secretKey: PROMPTBOOK_STAGEMEDIA_APIKEY
      remoteRef:
        key: stagemedia-api
        property: credential
