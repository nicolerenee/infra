---
# yaml-language-server: $schema=https://raw.githubusercontent.com/recyclarr/recyclarr/refs/tags/v8.0.0/schemas/config-schema.json
sonarr:
  sonarr:
    base_url: http://sonarr
    api_key: !env_var SONARR_API_KEY
    delete_old_custom_formats: true

    media_management:
      propers_and_repacks: do_not_prefer

    media_naming:
      series: jellyfin
      season: default
      episodes:
        rename: true
        standard: default
        daily: default
        anime: default

    quality_definition:
      type: series

    quality_profiles:
      - trash_id: c4cadd6b35b95f62c3d47a408e53e2f7  # WEB-2160p (Combined)
        reset_unmatched_scores:
          enabled: true

    custom_formats:
      - # Unwanted
        trash_ids:
          - 32b367365729d530ca1c124a0b180c64  # Bad Dual Groups
          - 82d40da2bc6923f41e14394075dd4b03  # No-RlsGroup
          - e1a997ddb54e3ecbfe06341ad323c458  # Obfuscated
          - 06d66ab109d4d2eddb2794d21526d140  # Retags
        assign_scores_to:
          - trash_id: c4cadd6b35b95f62c3d47a408e53e2f7  # WEB-2160p (Combined)

radarr:
  radarr:
    base_url: http://radarr
    api_key: !env_var RADARR_API_KEY
    delete_old_custom_formats: true

    media_management:
      propers_and_repacks: do_not_prefer

    media_naming:
      folder: jellyfin
      movie:
        rename: true
        standard: default

    quality_definition:
      type: sqp-uhd

    quality_profiles:
      - trash_id: 5128baeb2b081b72126bc8482b2a86a0  # [SQP] SQP-1 (2160p)
        reset_unmatched_scores:
          enabled: true

    custom_formats:
      - # HDR10+ Boost — Samsung S95F supports HDR10+
        trash_ids:
          - b17886cb4158d9fea189859409975758  # HDR10Plus Boost
          - 55a5b50cb416dea5a50c4955896217ab  # DV HDR10+ Boost
        assign_scores_to:
          - trash_id: 5128baeb2b081b72126bc8482b2a86a0  # [SQP] SQP-1 (2160p)

      - # SDR (no WEBDL) — block SDR Remux/Bluray, allow SDR WEB for older movies
        trash_ids:
          - 25c12f78430a3a23413652cbd1d48d77  # SDR (no WEBDL)
        assign_scores_to:
          - trash_id: 5128baeb2b081b72126bc8482b2a86a0  # [SQP] SQP-1 (2160p)

      - # Unwanted
        trash_ids:
          - b6832f586342ef70d9c128d40c07b872  # Bad Dual Groups
          - cc444569854e9de0b084ab2b8b1532b2  # Black and White Editions
          - 90cedc1fea7ea5d11298bebd3d1d3223  # EVO (no WEBDL)
          - ae9b7c9ebde1f3bd336a8cbd1ec4c5e5  # No-RlsGroup
          - 7357cf5161efbf8c4d5d0c30b4815ee2  # Obfuscated
          - 5c44f52a8714fdd79bb4d98e2673be1f  # Retags
        assign_scores_to:
          - trash_id: 5128baeb2b081b72126bc8482b2a86a0  # [SQP] SQP-1 (2160p)
