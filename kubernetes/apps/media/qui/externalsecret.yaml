---
# yaml-language-server: $schema=https://k8s-schemas.freckle.systems/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: qui
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: op-cluster-vault
  target:
    name: qui-secret
    template:
      data:
        QUI__SESSION_SECRET: "{{ .session_secret }}"
        QUI__OIDC_CLIENT_ID: "{{ .oidc_client_id }}"
        QUI__OIDC_CLIENT_SECRET: "{{ .oidc_client_secret }}"
  dataFrom:
    - extract:
        key: qui
