---
# yaml-language-server: $schema=https://www.schemastore.org/kustomization.json
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
components:
  - ../../../components/volsync
resources:
  - externalsecret.yaml
  - helmrelease.yaml
configMapGenerator:
  - name: ${APP}-configmap
    files:
      - config.yml=./config.yml
generatorOptions:
  disableNameSuffixHash: true
