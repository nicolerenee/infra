---
# yaml-language-server: $schema=https://k8s-schemas.freckle.systems/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ${APP}-seed
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: op-cluster-vault
  target:
    template:
      data:
        # Initial bootstrap files. The init container copies these into the
        # PVC the first time only. After that the app rewrites .pytrakt.json
        # in place when Trakt rotates the OAuth access token, so the working
        # copy on the PVC is the source of truth — these 1Password fields
        # are seed-only.
        .env: |
          {{ .env }}
        .pytrakt.json: |
          {{ .pytrakt_json }}
        servers.yml: |
          {{ .servers_yml }}
  dataFrom:
    - extract:
        key: ${APP}
