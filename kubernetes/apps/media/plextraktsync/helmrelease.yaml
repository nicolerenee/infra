---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ${APP}
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: default
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  driftDetection:
    mode: enabled
    ignore:
      - paths: ["/spec/replicas"]
  interval: 1h
  values:
    controllers:
      ${APP}:
        type: cronjob
        annotations:
          reloader.stakater.com/auto: "true"
        cronjob:
          schedule: "*/15 * * * *"
          backoffLimit: 0
          concurrencyPolicy: Forbid
          successfulJobsHistory: 1
          failedJobsHistory: 3
          ttlSecondsAfterFinished: 86400
        initContainers:
          # First-run bootstrap: copy the three auth files (.env,
          # .pytrakt.json, servers.yml) from the seed Secret into the PVC,
          # but only if they're not already there. After bootstrap the
          # app owns these files — .pytrakt.json gets rewritten when the
          # Trakt OAuth access token rotates.
          seed:
            image:
              repository: ghcr.io/taxel/plextraktsync
              tag: 0.35.5@sha256:de61cbdeeb242ed32efb2e16ed18cec6920098c0dc612e83ac68b93f01294b8a
            command: [sh, -c]
            args:
              - |
                set -eu
                cd /app/config
                for f in .env .pytrakt.json servers.yml; do
                  if [ ! -f "$f" ]; then
                    echo "seeding $f from /seed"
                    cp "/seed/$f" "$f"
                  fi
                done
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
              runAsNonRoot: true
              seccompProfile:
                type: RuntimeDefault
            resources:
              requests:
                cpu: 10m
                memory: 16Mi
              limits:
                memory: 64Mi
        containers:
          app:
            image:
              repository: ghcr.io/taxel/plextraktsync
              tag: 0.35.5@sha256:de61cbdeeb242ed32efb2e16ed18cec6920098c0dc612e83ac68b93f01294b8a
            env:
              TZ: America/Chicago
            args: [sync]
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
              runAsNonRoot: true
              seccompProfile:
                type: RuntimeDefault
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 1Gi
        pod:
          restartPolicy: Never
    defaultPodOptions:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: ${VOLSYNC_UID}
        runAsGroup: ${VOLSYNC_GID:=${VOLSYNC_UID}}
        fsGroup: ${VOLSYNC_FSGROUP:=${VOLSYNC_UID}}
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    persistence:
      config:
        existingClaim: ${APP}${VOLSYNC_PVC_SUFFIX:=}
        globalMounts:
          - path: /app/config
            subPath: config
      config-file:
        type: configMap
        name: ${APP}-configmap
        globalMounts:
          - path: /app/config/config.yml
            subPath: config.yml
            readOnly: true
      seed:
        type: secret
        name: ${APP}-seed
        advancedMounts:
          ${APP}:
            seed:
              - path: /seed
                readOnly: true
      # PlexTraktSync's image sets HOME=/app/xdg with XDG_* dirs underneath.
      # readOnlyRootFilesystem requires this to be a writable mount.
      xdg:
        type: emptyDir
        globalMounts:
          - path: /app/xdg
