---
# OIDC client credentials for bazarr, pulled from the same 1P item
# that holds the rest of bazarr's secrets (oidc_client_id and
# oidc_client_secret are additional fields on it).
# yaml-language-server: $schema=https://k8s-schemas.freckle.systems/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: bazarr-oidc
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: op-cluster-vault
  target:
    template:
      data:
        client-id: "{{ .oidc_client_id }}"
        client-secret: "{{ .oidc_client_secret }}"
  dataFrom:
    - extract:
        key: bazarr
---
# Forces all browser traffic to bazarr-ui through OIDC against
# pocket-id. Internal cluster traffic to the bazarr Service (sonarr,
# radarr, etc.) bypasses the gateway and is unaffected. The api
# HTTPRoute is intentionally left unprotected so X-Api-Key still works.
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: bazarr-oidc
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: bazarr-ui
  oidc:
    provider:
      issuer: https://freckle.id
    clientIDRef:
      group: ""
      kind: Secret
      name: bazarr-oidc
    clientSecret:
      group: ""
      kind: Secret
      name: bazarr-oidc
    redirectURL: https://bazarr.${CLUSTER_SUBDOMAIN}.freckle.media/oauth2/callback
    logoutPath: /logout
    scopes:
      - openid
      - email
      - profile
