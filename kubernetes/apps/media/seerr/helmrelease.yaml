---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: seerr
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: default
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  driftDetection:
    mode: enabled
  interval: 1h
  values:
    controllers:
      seerr:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              # seerr-team fork (jellyseerr split) — preview-new-oidc tag
              # bundles v3.2.0 + the OIDC PR (#2715). Pinned to the
              # 2026-04-29 community-recommended digest. See
              # https://github.com/seerr-team/seerr/discussions/2721.
              repository: ghcr.io/seerr-team/seerr
              tag: preview-new-oidc@sha256:a14a9c326881fdce70b00df3fc095f5b5b128f5552677f677cd3788e757fb4e6
            env:
              TZ: America/Chicago
              LOG_LEVEL: info
            ports:
              - containerPort: &port 5055
                name: http
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/v1/status
                    port: *port
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 2Gi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    service:
      app:
        ipFamilyPolicy: PreferDualStack
        ipFamilies:
          - IPv4
          - IPv6
        ports:
          http:
            port: 80
            targetPort: *port
    route:
      app:
        annotations:
          gatus.home-operations.com/endpoint: |-
            conditions: ["[STATUS] == 200"]
        hostnames:
          - seerr.atlantis.freckle.media
          - requests.atlantis.freckle.media
        parentRefs:
          - name: public
            namespace: gateway-system
    persistence:
      # Config PVC managed via Kustomize alongside this HelmRelease
      # (see pvc.yaml) so it can carry a dataSourceRef pointing at
      # the volsync ReplicationDestination for restore-on-recreate.
      config:
        existingClaim: seerr-config
        globalMounts:
          - path: /app/config
      tmp:
        type: emptyDir
