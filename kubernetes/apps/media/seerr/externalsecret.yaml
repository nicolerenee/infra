---
# Pulls the shared volsync 1Password item and templates a per-app
# Secret with the credentials volsync's restic mover expects.
# RESTIC_REPOSITORY embeds the per-app HTTP basic auth user (seer)
# and password into the rest-server URL. Server's Private Repositories
# mode resolves the path from the auth automatically; the trailing
# /seer/ path scopes restic ops to the user's private repo.
# yaml-language-server: $schema=https://k8s-schemas.freckle.systems/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: seerr-volsync
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: seerr-volsync
    template:
      data:
        # urlquery percent-encodes the password so it survives URL
        # parsing regardless of which special chars the password has.
        RESTIC_REPOSITORY: '{{ .repository_prefix | replace "rest:https://" (printf "rest:https://seer:%s@" (urlquery .seer_password)) }}/seer/'
        RESTIC_PASSWORD: '{{ .restic_password }}'
  dataFrom:
    - extract:
        key: volsync
