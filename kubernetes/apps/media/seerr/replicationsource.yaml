---
# Hourly backup of seerr's config PVC to the off-cluster Restic
# REST Server on TrueNAS. Uses VolumeSnapshot copyMethod so backups
# work despite the source PVC being RWO and in active use.
#
# Schedule offset to :13 to spread load vs jellyfin's :37 and avoid
# top-of-hour cron contention.
#
# moverSecurityContext runs as seerr's UID (1000) — restic running
# as non-root skips ownership preservation calls (the mover container
# drops CAP_CHOWN, root would EPERM on lchown).
#
# Retention: 24 hourly + 7 daily + 4 weekly. No monthly band.
apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: seerr-config
spec:
  sourcePVC: seerr-config
  trigger:
    schedule: "13 * * * *"
  restic:
    moverSecurityContext:
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
      fsGroupChangePolicy: OnRootMismatch
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault
    repository: seerr-volsync
    copyMethod: Snapshot
    volumeSnapshotClassName: csi-ceph-blockpool
    storageClassName: ceph-block
    accessModes: [ReadWriteOnce]
    cacheCapacity: 1Gi
    cacheStorageClassName: ceph-block
    cacheAccessModes: [ReadWriteOnce]
    pruneIntervalDays: 7
    retain:
      hourly: 24
      daily: 7
      weekly: 4
