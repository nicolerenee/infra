---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ${APP:=sabnzbd}
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: default
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  driftDetection:
    mode: enabled
    ignore:
      - paths: ["/spec/replicas"]
  interval: 1h
  values:
    controllers:
      sabnzbd:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/sabnzbd
              tag: 5.0.1@sha256:c22ada9eb6f6306a4e94d3372c784a5330818f2021b2fa9233ff4ae92d9f3582
            env:
              SABNZBD__PORT: &port 80
              SABNZBD__HOST_WHITELIST_ENTRIES: >-
                sabnzbd,
                sabnzbd.media,
                sabnzbd.media.svc,
                sabnzbd.media.svc.cluster,
                sabnzbd.media.svc.cluster.local,
                sabnzbd.${CLUSTER_SUBDOMAIN}.freckle.media
              TZ: America/Chicago
            envFrom:
              - secretRef:
                  name: ${APP:=sabnzbd}
            ports:
              - containerPort: *port
                name: http
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api?mode=version
                    port: *port
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
              runAsNonRoot: true
              seccompProfile:
                type: RuntimeDefault
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                cpu: 4
                memory: 4Gi
    defaultPodOptions:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: ${VOLSYNC_UID}
        runAsGroup: ${VOLSYNC_GID:=${VOLSYNC_UID}}
        fsGroup: ${VOLSYNC_FSGROUP:=${VOLSYNC_UID}}
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    service:
      app:
        controller: sabnzbd
        # SABnzbd's IPv6 binding is broken even with `host = ::`,
        # `SABNZBD__ADDRESS=[::]`, and `ipv6_hosting = 1` set —
        # sabnzbd ends up serving IPv6 on `::1` (localhost) instead
        # of `[::]` (all interfaces), so envoy gets connection
        # refused on the IPv6 endpoint and the UI flaps between
        # working (IPv4) and dead (IPv6). Force SingleStack IPv4
        # explicitly because the cluster default is dual-stack.
        ipFamilyPolicy: SingleStack
        ipFamilies:
          - IPv4
        ports:
          app:
            port: *port
    route:
      ui:
        hostnames: ["{{ .Release.Name }}.${CLUSTER_SUBDOMAIN}.freckle.media"]
        parentRefs:
          - name: tailnet
            namespace: gateway-system
        rules:
          - backendRefs:
              - identifier: app
                port: *port
      api:
        hostnames: ["{{ .Release.Name }}.${CLUSTER_SUBDOMAIN}.freckle.media"]
        parentRefs:
          - name: tailnet
            namespace: gateway-system
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /api
            backendRefs:
              - identifier: app
                port: *port
    persistence:
      config:
        existingClaim: ${APP:=sabnzbd}${VOLSYNC_PVC_SUFFIX:=}
        globalMounts:
          - path: /config
            subPath: config
      media:
        existingClaim: ${MEDIA_PVC:=store01-media}
        globalMounts:
          - path: /store01/downloads/sabnzbd
            subPath: downloads/sabnzbd
      tmp:
        type: emptyDir
