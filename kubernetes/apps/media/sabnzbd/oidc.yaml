---
# yaml-language-server: $schema=https://k8s-schemas.freckle.systems/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: sabnzbd-oidc
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: op-cluster-vault
  target:
    template:
      data:
        client-id: "{{ .oidc_client_id }}"
        client-secret: "{{ .oidc_client_secret }}"
  dataFrom:
    - extract:
        key: sabnzbd
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: sabnzbd-oidc
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: sabnzbd-ui
  oidc:
    provider:
      issuer: https://freckle.id
    clientIDRef:
      group: ""
      kind: Secret
      name: sabnzbd-oidc
    clientSecret:
      group: ""
      kind: Secret
      name: sabnzbd-oidc
    redirectURL: https://sabnzbd.${CLUSTER_SUBDOMAIN}.freckle.media/oauth2/callback
    logoutPath: /logout
    scopes:
      - openid
      - email
      - profile
