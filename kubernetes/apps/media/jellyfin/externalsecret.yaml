---
# Pulls the shared volsync 1Password item and templates a per-app
# Secret with the credentials volsync's restic mover expects.
# RESTIC_REPOSITORY embeds the per-app HTTP basic auth user (jellyfin)
# and password into the rest-server URL. Server's Private Repositories
# mode resolves the path from the auth automatically.
# yaml-language-server: $schema=https://k8s-schemas.freckle.systems/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: jellyfin-volsync
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: jellyfin-volsync
    template:
      data:
        # urlquery percent-encodes the htpasswd so it survives URL parsing
        # regardless of which special chars the password generator picked.
        # Trailing /jellyfin/ is required because rest-server runs with
        # --private-repos: restic's path appends (/config, /data/) must
        # all sit under the username's namespace or auth returns 401.
        RESTIC_REPOSITORY: '{{ .repository_prefix | replace "rest:https://" (printf "rest:https://jellyfin:%s@" (urlquery .jellyfin_htpasswd)) }}/jellyfin/'
        RESTIC_PASSWORD: '{{ .restic_password }}'
  dataFrom:
    - extract:
        key: volsync
