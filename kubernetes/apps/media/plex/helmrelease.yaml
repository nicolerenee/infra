---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: plex
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: default
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  driftDetection:
    mode: enabled
    ignore:
      - paths: ["/spec/replicas"]
  interval: 1h
  values:
    controllers:
      plex:
        replicas: 1
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/plex
              tag: 1.43.1.10611@sha256:a9c3723cb31cc9621df27cf5801184c290293adf1df2bfaea4b8b6fc01dbfd96
            env:
              TZ: America/Chicago
              ADVERTISE_IP: https://plex.freckle.vision/,http://plex/
              PLEX_PREFERENCE_1: FriendlyName=atlantis
            ports:
              - containerPort: &port 32400
                name: http
            probes:
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /identity
                    port: *port
                  initialDelaySeconds: 0
                  timeoutSeconds: 1
                  periodSeconds: 5
                  failureThreshold: 30
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /identity
                    port: *port
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
              runAsNonRoot: true
              seccompProfile:
                type: RuntimeDefault
            resources:
              claims:
                - name: gpu
              limits:
                cpu: 8
                memory: 12Gi
              requests:
                cpu: 1
                memory: 2Gi
    defaultPodOptions:
      automountServiceAccountToken: false
      resourceClaims:
        - name: gpu
          resourceClaimTemplateName: plex
      securityContext:
        runAsNonRoot: true
        runAsUser: ${VOLSYNC_UID}
        runAsGroup: ${VOLSYNC_GID:=${VOLSYNC_UID}}
        fsGroup: ${VOLSYNC_FSGROUP:=${VOLSYNC_UID}}
        fsGroupChangePolicy: OnRootMismatch
        supplementalGroups:
          - 44
        seccompProfile:
          type: RuntimeDefault
    service:
      app:
        controller: plex
        ipFamilyPolicy: PreferDualStack
        ipFamilies:
          - IPv4
          - IPv6
        ports:
          http:
            port: 80
            targetPort: *port
    route:
      ui:
        hostnames: ["{{ .Release.Name }}.${CLUSTER_SUBDOMAIN}.freckle.media"]
        parentRefs:
          - name: tailnet
            namespace: gateway-system
        rules:
          - backendRefs:
              - identifier: app
                port: 80
    persistence:
      # Backed-up config PVC (volsync-managed). Holds Plug-in Support
      # (library DB, watch state), Metadata (artwork), Codecs, etc.
      config:
        existingClaim: ${APP:=plex}${VOLSYNC_PVC_SUFFIX:=}
        globalMounts:
          - path: /config
            subPath: config
      # Sibling cache PVC — explicitly NOT backed up. Holds Media/
      # (preview thumbs, ~608G — regenerable, slow to rebuild) and
      # Cache/. The plex-cache PVC's root has /Media and /Cache
      # directly (flat layout); subPaths overlay them at the nested
      # paths plex expects.
      cache:
        existingClaim: plex-cache
        globalMounts:
          - path: "/config/Library/Application Support/Plex Media Server/Media"
            subPath: media
          - path: "/config/Library/Application Support/Plex Media Server/Cache"
            subPath: cache
      media:
        existingClaim: ${MEDIA_PVC:=store01-media}
        globalMounts:
          - path: /store01
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
