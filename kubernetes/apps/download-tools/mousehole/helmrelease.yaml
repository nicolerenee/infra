---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mousehole
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: default
  interval: 1h
  values:
    controllers:
      mousehole:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: tmmrtn/mousehole
              tag: latest
            env:
              TZ: America/Chicago
            ports:
              - name: http
                containerPort: &port 5010
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: http
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: { drop: ["ALL"] }
              runAsNonRoot: true
              seccompProfile:
                type: RuntimeDefault
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 512Mi
    defaultPodOptions:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    service:
      app:
        controller: mousehole
        ports:
          http:
            port: 80
            targetPort: *port
    ingress:
      app:
        className: tailscale
        annotations:
          tailscale.com/proxy-group: ingress-proxy
          tailscale.com/tags: tag:mousehole
        hosts:
          - host: mousehole
            paths:
              - path: /
                service:
                  identifier: app
                  port: http
        tls:
          - hosts:
              - mousehole
    persistence:
      data:
        enabled: true
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 1Gi
        retain: true
        suffix: "data"
        globalMounts:
          - path: /srv/mousehole
