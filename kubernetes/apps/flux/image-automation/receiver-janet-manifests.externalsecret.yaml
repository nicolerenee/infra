---
# HMAC token shared between the janet-brain publish workflow and the
# notification-controller. The workflow signs each POST body with this token;
# Flux verifies the X-Signature header before annotating the ImageRepository.
#
# Unlike the hedgehog receiver (1Password), this token is GENERATED BY TOFU and
# stored in Google Secret Manager as `atlantis-k8s01-flux-system-flux-receiver-
# janet` (see tofu/janet-flux-receiver.tf). Read here via the atlantis
# flux-system gcp-sm SecretStore. The SAME value must be set as the
# FLUX_WEBHOOK_TOKEN GitHub Actions secret on freckleapps/janet-brain.
# yaml-language-server: $schema=https://k8s-schemas.freckle.systems/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: flux-receiver-janet-token
  namespace: flux-system
spec:
  secretStoreRef:
    kind: SecretStore
    name: gcp-sm
  target:
    name: flux-receiver-janet-token
  data:
    - secretKey: token
      remoteRef:
        key: flux-receiver-janet
