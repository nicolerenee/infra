---
# Selects the latest harvest image tag matching `main-<ts>-<sha>`. Extracts the
# timestamp and picks the numerically highest (= most recent build). The single
# ImageUpdateAutomation rewrites the marked `image:` field in the harvest
# Deployment (marker: # {"$imagepolicy": "flux-system:harvest"}).
#
# When the harvest repo cuts semver releases (v0.x.y), add a second policy
# beside this one with `policy.semver` and decide which channel to track.
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: harvest
spec:
  imageRepositoryRef:
    name: harvest
    # Same namespace (flux-system) as this policy + the automation — no
    # cross-namespace accessFrom needed.
    namespace: flux-system
  filterTags:
    pattern: '^main-(?P<ts>[0-9]{8}T[0-9]{6}Z)-[a-f0-9]+$'
    extract: '$ts'
  policy:
    # Fixed-width ISO 8601 compact UTC (YYYYMMDDTHHMMSSZ) is lex-sortable —
    # alphabetical ascending = chronological. Latest = highest.
    alphabetical:
      order: asc
