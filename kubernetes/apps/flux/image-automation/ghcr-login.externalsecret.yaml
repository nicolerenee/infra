---
# Docker-config secret the harvest ImageRepository uses to scan the private
# ghcr.io/nicolerenee/harvest registry. Lands in flux-system (this whole
# image-automation Kustomization targets flux-system) alongside the
# ImageRepository + ImagePolicy that consume it.
#
# Backed by the same 1Password item as hedgehog's GHCR login — a single GHCR
# read PAT owned by the nicolerenee account, which can read both the
# freckleapps org packages and the personal nicolerenee packages.
# yaml-language-server: $schema=https://k8s-schemas.freckle.systems/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: harvest-ghcr-login
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: op-cluster-vault
  target:
    creationPolicy: Owner
    template:
      engineVersion: v2
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {
            "auths": {
              "ghcr.io": {
                "username": "{{ .GHCR_USERNAME }}",
                "password": "{{ .GHCR_TOKEN }}",
                "auth": "{{ printf "%s:%s" .GHCR_USERNAME .GHCR_TOKEN | b64enc }}"
              }
            }
          }
  dataFrom:
    - extract:
        key: hedgehog-ghcr
