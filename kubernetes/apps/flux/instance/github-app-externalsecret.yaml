---
# Owns the `github-app` Secret used by source-controller (for repo sync) and
# image-automation-controller (for the write-back commits) against the
# flux-system GitRepository, configured with `provider: github`.
#
# Bootstrap: the cluster bring-up script creates this Secret manually from 1P
# so Flux can sync before external-secrets-operator is ready. Once ESO comes
# up, this ExternalSecret asserts ownership.
# yaml-language-server: $schema=https://k8s-schemas.freckle.systems/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: github-app
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: op-cluster-vault
  target:
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        githubAppID: "{{ .GITHUB_APP_ID }}"
        githubAppInstallationID: "{{ .GITHUB_INSTALLATION_ID }}"
        githubAppPrivateKey: "{{ .GITHUB_PRIVATE_KEY }}"
  dataFrom:
    - extract:
        key: flux-github-app
