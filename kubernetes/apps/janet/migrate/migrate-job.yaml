# Database migration Job — runs `janet-brain migrate up` (goose) against the
# dedicated janet-db as the managed `janet` role. Runs BEFORE the brain
# Deployment (the janet-migrate Flux KS is a dependsOn of janet-brain), so the
# app never races on DDL and replicas stay safe.
#
# Job specs are immutable; each release pins a new image tag, so the rendered
# spec changes per release. The Flux force annotation recreates the Job on spec
# change (otherwise the new migration would never run). Reloader recreates it
# when the DATABASE_URL secret rotates. Keep the image tag in sync with the
# brain Deployment.
apiVersion: batch/v1
kind: Job
metadata:
  name: janet-migrate
  annotations:
    kustomize.toolkit.fluxcd.io/force: "Enabled"
spec:
  ttlSecondsAfterFinished: 86400
  backoffLimit: 3
  template:
    metadata:
      annotations:
        reloader.stakater.com/auto: "true"
      labels:
        app.kubernetes.io/name: janet-brain
        app.kubernetes.io/component: migrate
    spec:
      restartPolicy: OnFailure
      imagePullSecrets:
        - name: ghcr-pull
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: migrate
          image: ghcr.io/freckleapps/janet-brain:main-20260624T202441Z-05deaf2 # {"$imagepolicy": "flux-system:janet-brain"}
          args: ["migrate", "up"]
          envFrom:
            # DATABASE_URL (managed janet role on the dedicated cluster).
            - secretRef:
                name: janet-db
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
