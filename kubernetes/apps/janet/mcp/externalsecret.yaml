---
# yaml-language-server: $schema=https://k8s-schemas.freckle.systems/external-secrets.io/externalsecret_v1.json
# Auth config for the MCP server, from GSM (fairy-k8s01-janet-mcp-auth). JSON
# keys are env-var names. cnpg-style reload label not needed; the Deployment
# carries the reloader annotation.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: google-workspace-mcp
spec:
  secretStoreRef:
    kind: SecretStore
    name: gcp-sm
  target:
    name: google-workspace-mcp
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: ${CLUSTER_NAME}-janet-mcp-auth
