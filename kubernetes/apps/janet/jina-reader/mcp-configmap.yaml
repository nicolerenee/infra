---
# Source for the FastMCP shim. The brain currently consumes only HTTP MCP
# servers, while the Jina Reader speaks a plain `GET /<url>` API — this shim
# bridges the two by exposing one `read_url` tool over Streamable HTTP (/mcp)
# that proxies to the reader and returns Markdown.
#
# Shipping the script as a ConfigMap + stock python image (pip-install at start)
# avoids building/maintaining a custom image. Retire this whole shim once the
# brain gains native HTTP/OpenAPI tool support — at which point the brain can
# call the reader directly. Reloader rolls the pod when this ConfigMap changes.
apiVersion: v1
kind: ConfigMap
metadata:
  name: jina-reader-mcp-src
data:
  server.py: |
    """FastMCP shim exposing self-hosted Jina Reader as an HTTP MCP tool."""
    import os

    import httpx
    from fastmcp import FastMCP

    READER_URL = os.environ.get("READER_URL", "http://jina-reader:8081").rstrip("/")
    HTTP_PORT = int(os.environ.get("HTTP_PORT", "8000"))
    TIMEOUT = float(os.environ.get("FETCH_TIMEOUT", "90"))
    MAX_CHARS = int(os.environ.get("MAX_CHARS", "60000"))

    mcp = FastMCP("jina-reader")

    @mcp.tool
    async def read_url(url: str) -> str:
        """Fetch a web page and return its main content as clean Markdown.

        Renders JavaScript/SPA pages via a headless browser. Pass a single
        http(s) URL (for example a web_search result). Returns Markdown text,
        truncated if very long.
        """
        if not url.startswith(("http://", "https://")):
            return f"Error: '{url}' is not an http(s) URL."
        target = f"{READER_URL}/{url}"
        try:
            async with httpx.AsyncClient(
                timeout=TIMEOUT, follow_redirects=True
            ) as client:
                resp = await client.get(
                    target, headers={"Accept": "text/plain, text/markdown"}
                )
                resp.raise_for_status()
        except httpx.HTTPStatusError as exc:
            return (
                f"Error fetching {url}: upstream returned "
                f"HTTP {exc.response.status_code}."
            )
        except httpx.HTTPError as exc:
            return f"Error fetching {url}: {exc!s}"
        text = resp.text
        if len(text) > MAX_CHARS:
            text = text[:MAX_CHARS] + f"\n\n[truncated at {MAX_CHARS} chars]"
        return text

    if __name__ == "__main__":
        mcp.run(transport="streamable-http", host="0.0.0.0", port=HTTP_PORT)
