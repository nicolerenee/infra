---
# Config-driven MCP server registry for the brain (JANET_MCP_CONFIG points
# here). Adding/editing a capability is an edit to this ConfigMap — no code
# change, no image rebuild. Reloader rolls the pod when this changes.
#
# Each entry is a lazily-loadable CAPABILITY: the model only sees a load_tools
# catalog by default; a capability's real tool schemas are injected when its
# `keywords` match the message (preload) or the model calls load_tools. All
# point at the one Google Workspace MCP server, scoped to a service via `allow`.
# `allow` is a substring match on the MCP tool name — exact names pin a tier
# (see taylorwilsdon/google_workspace_mcp core/tool_tiers.yaml).
#
# §14.1 approval gate: `approve` is a substring match on the tool name; any
# matching call (sending mail, creating/deleting events, creating Drive files)
# pauses for explicit human sign-off in the UI before it runs. Reads are never
# gated. Loosening/tightening this is a ConfigMap edit — no code change.
apiVersion: v1
kind: ConfigMap
metadata:
  name: janet-mcp-config
data:
  mcp.json: |
    {
      "servers": {
        "calendar": {
          "type": "mcp",
          "url": "http://google-workspace-mcp.janet-mcp.svc.cluster.local:8000/mcp",
          "auth": { "type": "google_user", "scopes": ["https://www.googleapis.com/auth/calendar"] },
          "allow": ["list_calendars", "get_events", "manage_event", "query_freebusy"],
          "approve": ["manage_event"],
          "description": "Google Calendar — list calendars, view events, create/update/delete events, check free/busy.",
          "keywords": ["calendar", "event", "meeting", "schedule", "appointment", "availability", "free time", "busy"]
        },
        "gmail": {
          "type": "mcp",
          "url": "http://google-workspace-mcp.janet-mcp.svc.cluster.local:8000/mcp",
          "auth": { "type": "google_user", "scopes": ["https://www.googleapis.com/auth/gmail.modify", "https://www.googleapis.com/auth/gmail.send"] },
          "deny": ["start_google_auth"],
          "approve": ["send", "draft", "reply", "forward", "trash", "delete", "modify", "manage", "create", "update", "insert", "import"],
          "description": "Gmail — search/read/send/draft email, threads, labels, filters.",
          "keywords": ["email", "gmail", "mail", "inbox", "message", "draft", "reply", "label"]
        },
        "drive": {
          "type": "mcp",
          "url": "http://google-workspace-mcp.janet-mcp.svc.cluster.local:8000/mcp",
          "auth": { "type": "google_user", "scopes": ["https://www.googleapis.com/auth/drive"] },
          "allow": ["search_drive_files", "get_drive_file_content", "get_drive_file_download_url", "create_drive_file", "create_drive_folder", "import_to_google", "get_drive_shareable_link"],
          "approve": ["create", "import"],
          "description": "Google Drive — search/read files, create files & folders, import docs, get shareable links.",
          "keywords": ["drive", "file", "folder", "document"]
        },
        "web": {
          "type": "mcp",
          "url": "http://brave-search-mcp.janet-mcp.svc.cluster.local:8000/mcp",
          "auth": { "type": "none" },
          "description": "Web search for current/real-time info or anything past the training cutoff.",
          "allow": ["web_search", "news_search"],
          "preload": ["web_search"]
        },
        "fetch": {
          "type": "http",
          "description": "Fetch a web page/URL and return its main content as clean Markdown (JavaScript/SPA pages supported). Use to read a web_search result or any known URL.",
          "preload": ["read_url"],
          "tools": [
            {
              "name": "read_url",
              "description": "Fetch a web page and return its main content as clean Markdown. Renders JavaScript/SPA pages. Pass a single http(s) URL (e.g. a web_search result). Returns Markdown, truncated if very long.",
              "parameters": {
                "type": "object",
                "properties": { "url": { "type": "string", "description": "The http(s) URL to fetch." } },
                "required": ["url"]
              },
              "request": {
                "method": "GET",
                "url": "http://jina-reader.janet-mcp.svc.cluster.local:8081/{url}",
                "headers": { "Accept": "text/plain, text/markdown" },
                "timeoutSeconds": 90
              },
              "response": { "maxChars": 60000 }
            }
          ]
        }
      }
    }
