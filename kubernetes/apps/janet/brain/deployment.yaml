apiVersion: apps/v1
kind: Deployment
metadata:
  name: janet-brain
  annotations:
    # Roll the pod when its referenced Secrets change (ExternalSecret refresh
    # / rotation) — env vars are only read at container start.
    reloader.stakater.com/auto: "true"
spec:
  replicas: 1
  # RollingUpdate so deploys never take the service fully offline. History,
  # sessions, and the Google-token vault are now all in Postgres (survive
  # restarts). Still a single replica only because the short-lived login/PKCE
  # STATE maps are still in-memory — persist those before scaling out.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: janet-brain
  template:
    metadata:
      labels:
        app.kubernetes.io/name: janet-brain
    spec:
      imagePullSecrets:
        - name: ghcr-pull
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: janet-brain
          image: ghcr.io/freckleapps/janet-brain:main-20260624T061549Z-f28e60e # {"$imagepolicy": "flux-system:janet-brain"}
          ports:
            - name: http
              containerPort: 8787
          env:
            - name: PORT
              value: "8787"
            # Semantic names — resolved by the AI gateway to a concrete backend
            # (local qwen today). Brain default + judge lane.
            - name: JANET_MODEL
              value: chat
            - name: JANET_JUDGE_MODEL
              value: fast
            # Registers schedule_agentic_task and lets agentic fires run their
            # instruction, gated by the intent judge (JANET_JUDGE_MODEL=fast via
            # the gateway). Judge fails closed — denies all if it can't reach its
            # model — so the gateway fast route must be healthy.
            - name: JANET_AGENTIC_ENABLED
              value: "true"
            # Keyless: the AI gateway holds the real Anthropic key. The
            # placeholder only satisfies the SDK's credential precondition;
            # the gateway overrides whatever the client sends.
            - name: ANTHROPIC_BASE_URL
              value: http://ai-gateway.inference.svc.cluster.local/anthropic
            - name: ANTHROPIC_API_KEY
              value: placeholder-gateway-injects-real-key
            - name: OIDC_ISSUER
              value: https://freckle.id
            - name: OIDC_REDIRECT_URL
              value: https://janet.fairy.freckle.services/auth/callback
            - name: JANET_ALLOW_ANON
              value: "false"
            # Google OAuth (calendar/email vault). GOOGLE_CLIENT_ID comes from
            # the secret (kept out of this public repo).
            - name: GOOGLE_REDIRECT_URL
              value: https://janet.fairy.freckle.services/auth/google/callback
            # MCP servers are declared in the mounted ConfigMap, not hardcoded.
            - name: JANET_MCP_CONFIG
              value: /etc/janet/mcp.json
            # Export traces (OTLP/HTTP) to the cluster collector → VictoriaTraces.
            # Spans carry IDs/classifications/token-counts only (§16 redaction),
            # never prompt/response content. The brain appends /v1/traces.
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector-collector.observability.svc.cluster.local:4318
          envFrom:
            # GOOGLE_CLIENT_ID + GOOGLE_CLIENT_SECRET (keys = env-var names).
            - secretRef:
                name: janet-google
            # OIDC_CLIENT_ID.
            - secretRef:
                name: janet-oidc
            # DATABASE_URL -> dedicated CNPG cluster (pgStore + sessions + vault).
            - secretRef:
                name: janet-db
            # JANET_TOKEN_ENC_KEY -> encrypts the Google token vault at rest.
            - secretRef:
                name: janet-token-enc
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: mcp-config
              mountPath: /etc/janet
              readOnly: true
      volumes:
        - name: tmp
          emptyDir: {}
        - name: mcp-config
          configMap:
            name: janet-mcp-config
