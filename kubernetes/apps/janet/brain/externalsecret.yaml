---
# yaml-language-server: $schema=https://k8s-schemas.freckle.systems/external-secrets.io/externalsecret_v1.json
# Janet brain app secrets from GSM (fairy-k8s01-janet-oauth). The JSON blob's
# keys are env-var names, so the resulting Secret is consumed via envFrom:
#   GOOGLE_CLIENT_SECRET — Google OAuth secret for the calendar/email vault
#   OIDC_CLIENT_ID        — Janet's pocket-id public/PKCE client id
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: janet-oauth
spec:
  secretStoreRef:
    kind: SecretStore
    name: gcp-sm
  target:
    name: janet-oauth
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: ${CLUSTER_NAME}-janet-oauth
