---
# yaml-language-server: $schema=https://k8s-schemas.freckle.systems/external-secrets.io/externalsecret_v1.json
# Google OAuth config (calendar/email vault) from GSM. JSON keys = env-var
# names, consumed via envFrom. Kept separate from the Freckle ID secret.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: janet-google
spec:
  secretStoreRef:
    kind: SecretStore
    name: gcp-sm
  target:
    name: janet-google
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: ${CLUSTER_NAME}-janet-google
---
# yaml-language-server: $schema=https://k8s-schemas.freckle.systems/external-secrets.io/externalsecret_v1.json
# Freckle ID (pocket-id) client id from GSM — stored by tofu when it mints the
# client. Raw value mapped to the OIDC_CLIENT_ID env var.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: janet-oidc
spec:
  secretStoreRef:
    kind: SecretStore
    name: gcp-sm
  target:
    name: janet-oidc
    creationPolicy: Owner
  data:
    - secretKey: OIDC_CLIENT_ID
      remoteRef:
        key: ${CLUSTER_NAME}-janet-oidc
