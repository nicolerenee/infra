---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: element
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: default
  interval: 1h
  values:
    defaultPodOptions:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        seccompProfile:
          type: RuntimeDefault
    controllers:
      element:
        type: deployment
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/element-hq/element-web
              tag: v1.12.23@sha256:2a65f32acc6fd7163523d1c4b5174de354b5ceb085898b15898f4d8ea01a8e3d
            env:
              # nginx-unprivileged base defaults this to 80 (which a non-root
              # user can't bind); pin it to the exposed 8080.
              - name: ELEMENT_WEB_PORT
                value: "8080"
            probes:
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 8080
                  initialDelaySeconds: 5
                  periodSeconds: 30
                  timeoutSeconds: 3
                  failureThreshold: 3
              readiness: *probe
            resources:
              requests:
                cpu: 10m
                memory: 48Mi
              limits:
                memory: 128Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop: ["ALL"]
    service:
      main:
        ports:
          http:
            port: &port 80
            protocol: TCP
            targetPort: 8080
    route:
      app:
        hostnames:
          - "freckle.chat"
        parentRefs:
          - name: public
            namespace: gateway-system
        rules:
          # Catch-all for the client SPA. The more-specific /.well-known/matrix
          # prefix on this same host is owned by tuwunel's route and wins by
          # Gateway API precedence, so federation/client discovery is unaffected.
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - identifier: main
                port: *port
    persistence:
      config:
        type: configMap
        name: element-config
        globalMounts:
          - path: /app/config.json
            subPath: config.json
            readOnly: true
