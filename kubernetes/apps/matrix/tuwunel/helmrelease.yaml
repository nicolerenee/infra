---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tuwunel
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: default
  interval: 1h
  values:
    controllers:
      tuwunel:
        type: statefulset
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/matrix-construct/tuwunel
              tag: v1.8.0@sha256:0b00dc4fe125736c3b96070ad397e43498750ecb59ec09e573327155eec6c31a
            env:
              - name: TUWUNEL_SERVER_NAME
                value: ${CHAT_DOMAIN}
              - name: TOKIO_WORKER_THREADS
                value: "5"
              - name: TUWUNEL_ROCKSDB_PARALLELISM_THREADS
                value: "4"
              - name: TUWUNEL_DATABASE_PATH
                value: "/data/db"
              - name: TUWUNEL_DATABASE_BACKEND
                value: "rocksdb"
              - name: TUWUNEL_ADDRESS
                value: "0.0.0.0"
              - name: TUWUNEL_PORT
                value: "8080"
              - name: RUST_LOG
                value: "info"
              - name: TUWUNEL_ALLOW_FEDERATION
                value: "true"
              - name: TUWUNEL_ALLOW_REGISTRATION
                value: "true"
              - name: TUWUNEL_TRUSTED_SERVERS
                value: '["matrix.org"]'
              - name: TUWUNEL_WELL_KNOWN__CLIENT
                value: https://matrix.${CHAT_DOMAIN}
              - name: TUWUNEL_WELL_KNOWN__SERVER
                value: "matrix.${CHAT_DOMAIN}:443"
              - name: TUWUNEL_MAX_REQUEST_SIZE
                value: "104857600"
              - name: TUWUNEL_IP_LOOKUP_STRATEGY
                value: "5"
              # SSO / next-gen OIDC auth via pocket-id (freckle.id). tuwunel is
              # the OIDC relying party: it redirects login to freckle.id and maps
              # the returned identity to a Matrix account. Setting well_known.client
              # (above) plus this provider also activates tuwunel's built-in
              # next-gen OIDC Authorization Server (MSC3861) for Element X et al.
              # brand = provider type (drives built-in icons/defaults for known
              # brands; PocketID is unknown so it's just an internal label — we
              # supply issuer_url below). name = the label shown on the login page.
              # CLIENT_ID, CLIENT_SECRET and CALLBACK_URL all embed the generated
              # client uuid, so they arrive via the tuwunel-oidc envFrom secret
              # rather than being named here (the uuid stays out of git).
              - name: TUWUNEL_IDENTITY_PROVIDER__0__BRAND
                value: PocketID
              - name: TUWUNEL_IDENTITY_PROVIDER__0__NAME
                value: Freckle ID
              - name: TUWUNEL_IDENTITY_PROVIDER__0__ISSUER_URL
                value: https://freckle.id
              # freckle.id is self-hosted and fully controlled, so trusted mode is
              # safe: an SSO login whose preferred_username matches an existing
              # Matrix localpart is granted that account instead of creating a new
              # one (links pre-existing accounts). Never enable for public IdPs.
              - name: TUWUNEL_IDENTITY_PROVIDER__0__TRUSTED
                value: "true"
              # Advertise OIDC as the preferred login method (MSC3824) so next-gen
              # clients drive the new flow.
              - name: TUWUNEL_OIDC_AWARE_PREFERRED
                value: "true"
            envFrom:
              - secretRef:
                  name: tuwunel-secret
              - secretRef:
                  name: tuwunel-oidc
            resources:
              requests:
                memory: 512Mi
              limits:
                memory: 1Gi
            probes:
              liveness: &probes
                enabled: false
                custom: true
                spec:
                  httpGet:
                    path: /_matrix/federation/v1/version
                    port: http
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes

    service:
      main:
        ports:
          http:
            port: &port 80
            protocol: TCP
            targetPort: 8080
    route:
      matrix:
        annotations: {}
        labels: {}
        hostnames:
          - "matrix.${CHAT_DOMAIN}"
        parentRefs:
          - name: public
            namespace: gateway-system
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /_matrix
              # Next-gen OIDC Authorization Server endpoints (authorize, token,
              # jwks, userinfo, registration, device, account) live under
              # /_tuwunel, and the OAuth issuer discovery doc sits at the issuer
              # origin (matrix.${CHAT_DOMAIN}) — neither is under /_matrix.
              - path:
                  type: PathPrefix
                  value: /_tuwunel
              - path:
                  type: PathPrefix
                  value: /.well-known/openid-configuration
            backendRefs:
              - identifier: main
                port: *port
      app:
        annotations: {}
        labels: {}
        hostnames:
          - "${CHAT_DOMAIN}"
        parentRefs:
          - name: public
            namespace: gateway-system
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /.well-known/matrix
            backendRefs:
              - identifier: main
                port: *port
    persistence:
      data:
        enabled: true
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 20Gi
        retain: true
        suffix: "data"
        advancedMounts:
          tuwunel:
            app:
              - path: /data
