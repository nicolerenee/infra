---
# Qwen3.6-35B-A3B-FP8 served by vLLM, single-node (tp=1) per GB10. Scaled to a
# single replica: two of the three DGX nodes are now claimed by the 2-node
# minimax-m27-nvfp4 LeaderWorkerSet, leaving exactly one node for Qwen. No
# longer an HA pair — a node loss takes Qwen down until it reschedules. The
# one-pod-per-node podAntiAffinity is retained so that if this is scaled back
# up (once GPUs free), replicas still spread across distinct DGX nodes.
# RollingUpdate keeps maxSurge/maxUnavailable so a scale-up rollout never wedges
# when all DGX nodes are occupied.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qwen36-35b-a3b
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: qwen36-35b-a3b
  template:
    metadata:
      labels:
        app.kubernetes.io/name: qwen36-35b-a3b
    spec:
      runtimeClassName: nvidia
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      affinity:
        podAntiAffinity:
          # One pod per node — keeps the HA pair (and the rolling-surge pod)
          # on distinct DGX nodes so a node loss never takes both down.
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: qwen36-35b-a3b
              topologyKey: kubernetes.io/hostname
      resourceClaims:
        - name: gpu
          resourceClaimTemplateName: gpu
      containers:
        - name: vllm
          # v0.24.0 (CUDA-13 default, Ubuntu 24.04) via the GCR pull-through mirror
          # (avoids Docker Hub rate limits). v0.24's Responses-API parser handles
          # codex's multi-turn tool loop, so this one deploy serves brain chat AND
          # coding. NOT the older v0.20 (its /responses couldn't parse tool results).
          image: mirror.gcr.io/vllm/vllm-openai:v0.24.0-aarch64-ubuntu2404
          command:
            - vllm
            - serve
            - Qwen/Qwen3.6-35B-A3B-FP8
            # Canonical ids only. The semantic names (chat/fast/…) live in the
            # AI gateway, which rewrites to qwen3.6-35b-a3b on egress.
            - --served-model-name
            - Qwen/Qwen3.6-35B-A3B-FP8
            - qwen3.6-35b-a3b
            - --tensor-parallel-size
            - "1"
            - --host
            - 0.0.0.0
            - --port
            - "8000"
            - --max-model-len
            - "262144"
            - --max-num-seqs
            - "20"
            - --max-num-batched-tokens
            - "32768"
            - --gpu-memory-utilization
            - "0.7069"
            - --attention-backend
            - flashinfer
            - --enable-prefix-caching
            - --reasoning-parser
            - qwen3
            - --enable-auto-tool-choice
            - --tool-call-parser
            # qwen3_xml matches the native XML tool format the froggeric template
            # emits (the default template + qwen3_coder can't parse codex's calls).
            - qwen3_xml
            # Vendored froggeric fixed template (see chat_template.jinja): tolerates
            # the developer/tool roles + arbitrary system placement that the OpenAI
            # Responses API (codex) sends, while staying correct for brain chat.
            - --chat-template
            - /config/chat_template.jinja
            # Qwen recommends preserving thinking across turns for agentic loops;
            # froggeric honors this kwarg (defaults true anyway).
            - --default-chat-template-kwargs
            - '{"preserve_thinking": true}'
            # MTP speculative decoding: the method is built into this checkpoint
            # (no separate draft model needed). Worked fine on the prior v0.20
            # image; re-enabled on v0.24 after the consolidation validated
            # without it.
            - --speculative-config
            - '{"method":"mtp","num_speculative_tokens":1}'
            - --trust-remote-code
          env:
            - name: HF_HOME
              value: /models
            # Weights are pre-staged on CephFS; never reach HF at serve time
            # (egress is locked — see cnp.yaml). Offline + no telemetry.
            - name: HF_HUB_OFFLINE
              value: "1"
            - name: DO_NOT_TRACK
              value: "1"
            - name: PYTORCH_CUDA_ALLOC_CONF
              value: expandable_segments:True
            - name: CUDA_MANAGED_FORCE_DEVICE_ALLOC
              value: "1"
            - name: OMP_NUM_THREADS
              value: "4"
            - name: VLLM_MARLIN_USE_ATOMIC_ADD
              value: "1"
            # v0.24 defaults to DeepGEMM for FP8 MoE and asserts "Unknown SF
            # transformation" on this checkpoint's scale-factor layout; force the
            # Marlin/Triton path (VLLM_MARLIN_USE_ATOMIC_ADD above) instead.
            - name: VLLM_USE_DEEP_GEMM
              value: "0"
          ports:
            - containerPort: 8000
              name: http
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            # Long — first load is weights from CephFS + torch.compile + cudagraph capture.
            failureThreshold: 180
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            claims:
              - name: gpu
          volumeMounts:
            - name: models
              mountPath: /models
            - name: shm
              mountPath: /dev/shm
            - name: chat-template
              mountPath: /config
              readOnly: true
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: models
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 16Gi
        # Content-hashed by kustomize's configMapGenerator, so editing the template
        # rolls the Deployment automatically.
        - name: chat-template
          configMap:
            name: qwen36-chat-template
