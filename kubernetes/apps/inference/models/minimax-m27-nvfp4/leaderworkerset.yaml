---
# MiniMax-M2.7 (NVFP4) served by vLLM across 2 DGX nodes as a single
# tensor-parallel replica (tp=2, one GB10 per rank). Adapted from the
# spark-arena/eugr NVFP4 recipe (github.com/eugr/spark-vllm-docker), running on
# eugr's own spark-vllm container — the recipe's actual runtime image, which is
# arm64 (built for the GB10 DGX Spark) and ships the InstantTensor loader plus
# the minimax_m2 parsers and NVFP4 kernels. Two deliberate deviations:
#   1. Model is nvidia/MiniMax-M2.7-NVFP4 (230B MoE, 10B active, NVFP4) — vLLM
#      auto-detects the modelopt/NVFP4 quantization, so no explicit --quantization.
#   2. Multi-node launch uses vLLM's NATIVE distributed backend over a
#      LeaderWorkerSet (--nnodes/--node-rank/--master-addr), not the recipe's
#      Ray backend — this matches the proven gpt-oss 2-node pattern here and
#      avoids standing up a separate Ray cluster.
# --load-format instanttensor is what keeps the two ranks in sync during the
# weight load: the stock upstream vLLM image lacks the InstantTensor library, so
# it fell back to fastsafetensors, whose bursty prefetch let the ranks drift on
# our slow CephFS path until NCCL's 600s collective watchdog killed the group.
# Weights are pre-staged on CephFS (see the download job), so it serves fully
# offline (HF_HUB_OFFLINE=1) with no HF secret — egress is locked in cnp.yaml.
apiVersion: leaderworkerset.x-k8s.io/v1
kind: LeaderWorkerSet
metadata:
  name: minimax-m27-nvfp4
spec:
  replicas: 1
  leaderWorkerTemplate:
    size: 2
    restartPolicy: RecreateGroupOnPodRestart
    leaderTemplate:
      metadata:
        labels:
          app.kubernetes.io/name: minimax-m27-nvfp4
          app.kubernetes.io/component: leader
      spec:
        runtimeClassName: nvidia
        tolerations:
          - key: nvidia.com/gpu
            operator: Exists
            effect: NoSchedule
        resourceClaims:
          - name: gpu-rdma
            resourceClaimTemplateName: gpu-rdma
        containers:
          - name: vllm
            # eugr spark-vllm (arm64, built for GB10 DGX Spark). Ships
            # InstantTensor + minimax_m2 parsers + NVFP4. Digest-pinned.
            image: mirror.gcr.io/eugr/spark-vllm:latest@sha256:91a7d1ed3f6c32d456558b825e9f19dde91b84412f827d885c5b7f755feeeb6d
            command:
              - bash
              - -c
              - |
                vllm serve nvidia/MiniMax-M2.7-NVFP4 \
                  --served-model-name nvidia/MiniMax-M2.7-NVFP4 minimax-m2.7 \
                  --trust-remote-code \
                  --tensor-parallel-size 2 \
                  --gpu-memory-utilization 0.85 \
                  --max-model-len 196608 \
                  --load-format instanttensor \
                  --enable-auto-tool-choice \
                  --tool-call-parser minimax_m2 \
                  --reasoning-parser minimax_m2_append_think \
                  --nnodes 2 \
                  --node-rank 0 \
                  --master-addr $${LWS_LEADER_ADDRESS} \
                  --master-port 29500 \
                  --host 0.0.0.0 \
                  --port 8000
            env:
              - name: HF_HOME
                value: /models
              # Weights pre-staged on CephFS (/models/hub); never reach HF at
              # serve time (egress is locked — see cnp.yaml).
              - name: HF_HUB_OFFLINE
                value: "1"
              - name: DO_NOT_TRACK
                value: "1"
              - name: PYTORCH_CUDA_ALLOC_CONF
                value: expandable_segments:True
              # NCCL: use RDMA over the ConnectX-7 fabric (dranet gpu-rdma claim).
              - name: NCCL_IB_HCA
                value: mlx5
              - name: NCCL_NET_GDR_LEVEL
                value: "2"
              # Force the Marlin/Triton path for the NVFP4 MoE kernels (matches
              # the spark-arena NVFP4 recipe + the qwen deploy). Without it, v0.24
              # can pick a DeepGEMM path that asserts on some FP8/FP4 checkpoints.
              - name: VLLM_MARLIN_USE_ATOMIC_ADD
                value: "1"
            ports:
              - containerPort: 8000
                name: http
              - containerPort: 29500
                name: dist-coord
            startupProbe:
              httpGet:
                path: /health
                port: http
              initialDelaySeconds: 60
              periodSeconds: 10
              timeoutSeconds: 5
              # Long — first load is a 116GB NVFP4 checkpoint from CephFS across
              # 2 nodes + torch.compile + cudagraph capture.
              failureThreshold: 360
            livenessProbe:
              httpGet:
                path: /health
                port: http
              periodSeconds: 30
              timeoutSeconds: 5
              failureThreshold: 3
            readinessProbe:
              httpGet:
                path: /health
                port: http
              periodSeconds: 30
              timeoutSeconds: 5
              failureThreshold: 3
            securityContext:
              capabilities:
                add:
                  - IPC_LOCK
            resources:
              claims:
                - name: gpu-rdma
            volumeMounts:
              - name: models
                mountPath: /models
              - name: shm
                mountPath: /dev/shm
        volumes:
          - name: models
            persistentVolumeClaim:
              claimName: models
          - name: shm
            emptyDir:
              medium: Memory
              sizeLimit: 16Gi
    workerTemplate:
      metadata:
        labels:
          app.kubernetes.io/name: minimax-m27-nvfp4
          app.kubernetes.io/component: worker
      spec:
        runtimeClassName: nvidia
        tolerations:
          - key: nvidia.com/gpu
            operator: Exists
            effect: NoSchedule
        resourceClaims:
          - name: gpu-rdma
            resourceClaimTemplateName: gpu-rdma
        containers:
          - name: vllm
            # eugr spark-vllm (arm64) — same image as the leader. Digest-pinned.
            image: mirror.gcr.io/eugr/spark-vllm:latest@sha256:91a7d1ed3f6c32d456558b825e9f19dde91b84412f827d885c5b7f755feeeb6d
            command:
              - bash
              - -c
              - |
                vllm serve nvidia/MiniMax-M2.7-NVFP4 \
                  --served-model-name nvidia/MiniMax-M2.7-NVFP4 minimax-m2.7 \
                  --trust-remote-code \
                  --tensor-parallel-size 2 \
                  --gpu-memory-utilization 0.85 \
                  --max-model-len 196608 \
                  --load-format instanttensor \
                  --enable-auto-tool-choice \
                  --tool-call-parser minimax_m2 \
                  --reasoning-parser minimax_m2_append_think \
                  --nnodes 2 \
                  --node-rank 1 \
                  --master-addr $${LWS_LEADER_ADDRESS} \
                  --master-port 29500 \
                  --headless \
                  --host 0.0.0.0 \
                  --port 8000
            env:
              - name: HF_HOME
                value: /models
              - name: HF_HUB_OFFLINE
                value: "1"
              - name: DO_NOT_TRACK
                value: "1"
              - name: PYTORCH_CUDA_ALLOC_CONF
                value: expandable_segments:True
              - name: NCCL_IB_HCA
                value: mlx5
              - name: NCCL_NET_GDR_LEVEL
                value: "2"
              # Force the Marlin/Triton path for the NVFP4 MoE kernels (matches
              # the spark-arena NVFP4 recipe + the qwen deploy). Without it, v0.24
              # can pick a DeepGEMM path that asserts on some FP8/FP4 checkpoints.
              - name: VLLM_MARLIN_USE_ATOMIC_ADD
                value: "1"
            securityContext:
              capabilities:
                add:
                  - IPC_LOCK
            resources:
              claims:
                - name: gpu-rdma
            volumeMounts:
              - name: models
                mountPath: /models
              - name: shm
                mountPath: /dev/shm
        volumes:
          - name: models
            persistentVolumeClaim:
              claimName: models
          - name: shm
            emptyDir:
              medium: Memory
              sizeLimit: 16Gi
