---
# MiniMax-M2.7 (NVFP4) served by vLLM across 2 DGX nodes as a single
# tensor-parallel replica (tp=2, one GB10 per rank). Adapted from the
# spark-arena/eugr NVFP4 recipe (github.com/eugr/spark-vllm-docker). Two
# deliberate deviations:
#   1. Model is nvidia/MiniMax-M2.7-NVFP4 (230B MoE, 10B active, NVFP4) — vLLM
#      auto-detects the modelopt/NVFP4 quantization, so no explicit --quantization.
#   2. Multi-node launch uses vLLM's NATIVE distributed backend over a
#      LeaderWorkerSet (--nnodes/--node-rank/--master-addr), not the recipe's
#      Ray backend — this matches the proven gpt-oss 2-node pattern here and
#      avoids standing up a separate Ray cluster.
# Runs on the official upstream vLLM release (the same image qwen uses). The
# rclone init container below caches the checkpoint to node-local NVMe before
# vLLM starts, so the slow (Firewalla-routed) CephFS read happens once per node
# in a plain copy and vLLM loads from fast local disk. Fast, even local reads
# keep the two TP ranks in sync during load with no risk of the slow-CephFS
# desync that once tripped NCCL's 600s collective watchdog — which is why we no
# longer need the eugr image's InstantTensor loader. --load-format fastsafetensors
# is pinned explicitly (its bursty prefetch is harmless off fast local disk):
# once the 10G storage network lands we can likely drop this cache + init
# container and load fastsafetensors straight off CephFS. Weights are pre-staged
# on CephFS by the download job; served fully offline (HF_HUB_OFFLINE=1), no HF
# secret — egress locked in cnp.yaml.
apiVersion: leaderworkerset.x-k8s.io/v1
kind: LeaderWorkerSet
metadata:
  name: minimax-m27-nvfp4
spec:
  replicas: 1
  leaderWorkerTemplate:
    size: 2
    restartPolicy: RecreateGroupOnPodRestart
    leaderTemplate:
      metadata:
        labels:
          app.kubernetes.io/name: minimax-m27-nvfp4
          app.kubernetes.io/component: leader
      spec:
        runtimeClassName: nvidia
        tolerations:
          - key: nvidia.com/gpu
            operator: Exists
            effect: NoSchedule
        resourceClaims:
          - name: gpu-rdma
            resourceClaimTemplateName: gpu-rdma
        initContainers:
          # Cache the checkpoint from CephFS to node-local NVMe before vLLM starts.
          # -L dereferences the HF-cache symlinks so the local copy is
          # self-contained; scoped to the minimax dir (the `models` PVC is shared
          # with qwen + gpt-oss) and excludes blobs/ since the deref'd snapshot
          # already holds the data (avoids a 2x copy). hostPath persists across
          # RecreateGroupOnPodRestart, so restarts re-sync incrementally (fast).
          - name: cache-models
            image: mirror.gcr.io/rclone/rclone:1.73.4@sha256:654f6517c7aaec7e377690b2caf7c272dbe5f3b8200afbc14a00df6b4a9aa6ef
            command:
              - rclone
              - sync
              - /ceph-models/hub/models--nvidia--MiniMax-M2.7-NVFP4/
              - /models/hub/models--nvidia--MiniMax-M2.7-NVFP4/
              - --copy-links
              - --exclude
              - blobs/**
              - --transfers
              - "8"
              - --checkers
              - "16"
              # One-line stats each minute instead of --progress (which floods
              # non-TTY pod logs with continuous progress redraws).
              - --stats
              - 1m
              - --stats-one-line
            volumeMounts:
              - name: ceph-models
                mountPath: /ceph-models
                readOnly: true
              - name: local-models
                mountPath: /models
        containers:
          - name: vllm
            # Official upstream vLLM release (aarch64), same image qwen runs;
            # has the minimax_m2 parsers + NVFP4. Loads from the local NVMe
            # cache (see the init container). Digest-pinned.
            image: mirror.gcr.io/vllm/vllm-openai:v0.24.0-aarch64-ubuntu2404@sha256:e5759bdea866ac65633f3d1dd9a1850de1e5ff3865f5c659a600173d8cf2f59c
            command:
              - bash
              - -c
              - |
                vllm serve nvidia/MiniMax-M2.7-NVFP4 \
                  --served-model-name nvidia/MiniMax-M2.7-NVFP4 minimax-m2.7 \
                  --trust-remote-code \
                  --tensor-parallel-size 2 \
                  --gpu-memory-utilization 0.85 \
                  --max-model-len 196608 \
                  --load-format fastsafetensors \
                  --enable-auto-tool-choice \
                  --tool-call-parser minimax_m2 \
                  --reasoning-parser minimax_m2 \
                  --nnodes 2 \
                  --node-rank 0 \
                  --master-addr $${LWS_LEADER_ADDRESS} \
                  --master-port 29500 \
                  --host 0.0.0.0 \
                  --port 8000
            env:
              - name: HF_HOME
                value: /models
              # Weights pre-staged on CephFS (/models/hub); never reach HF at
              # serve time (egress is locked — see cnp.yaml).
              - name: HF_HUB_OFFLINE
                value: "1"
              - name: DO_NOT_TRACK
                value: "1"
              - name: PYTORCH_CUDA_ALLOC_CONF
                value: expandable_segments:True
              # NCCL: use RDMA over the ConnectX-7 fabric (dranet gpu-rdma claim).
              - name: NCCL_IB_HCA
                value: mlx5
              - name: NCCL_NET_GDR_LEVEL
                value: "2"
              # Force the Marlin/Triton path for the NVFP4 MoE kernels (matches
              # the spark-arena NVFP4 recipe + the qwen deploy). Without it, v0.24
              # can pick a DeepGEMM path that asserts on some FP8/FP4 checkpoints.
              - name: VLLM_MARLIN_USE_ATOMIC_ADD
                value: "1"
            ports:
              - containerPort: 8000
                name: http
              - containerPort: 29500
                name: dist-coord
            startupProbe:
              httpGet:
                path: /health
                port: http
              initialDelaySeconds: 60
              periodSeconds: 10
              timeoutSeconds: 5
              # Long — covers the vLLM load from node-local NVMe (the CephFS→local
              # rclone sync runs first as an initContainer) + torch.compile +
              # cudagraph capture. The startup-probe clock starts after init.
              failureThreshold: 360
            livenessProbe:
              httpGet:
                path: /health
                port: http
              periodSeconds: 30
              timeoutSeconds: 5
              failureThreshold: 3
            readinessProbe:
              httpGet:
                path: /health
                port: http
              periodSeconds: 30
              timeoutSeconds: 5
              failureThreshold: 3
            securityContext:
              capabilities:
                add:
                  - IPC_LOCK
            resources:
              claims:
                - name: gpu-rdma
            volumeMounts:
              - name: local-models
                mountPath: /models
              - name: shm
                mountPath: /dev/shm
        volumes:
          # Source: shared models PVC on CephFS (read-only; init copies out of it).
          - name: ceph-models
            persistentVolumeClaim:
              claimName: models
              readOnly: true
          # Dest: node-local NVMe cache. hostPath persists across pod restarts so
          # the CephFS sync is a one-time-per-node cost; vLLM reads weights here.
          - name: local-models
            hostPath:
              path: /var/local/inference-models
              type: DirectoryOrCreate
          - name: shm
            emptyDir:
              medium: Memory
              sizeLimit: 16Gi
    workerTemplate:
      metadata:
        labels:
          app.kubernetes.io/name: minimax-m27-nvfp4
          app.kubernetes.io/component: worker
      spec:
        runtimeClassName: nvidia
        tolerations:
          - key: nvidia.com/gpu
            operator: Exists
            effect: NoSchedule
        resourceClaims:
          - name: gpu-rdma
            resourceClaimTemplateName: gpu-rdma
        initContainers:
          # Cache the checkpoint from CephFS to node-local NVMe before vLLM starts.
          # -L dereferences the HF-cache symlinks so the local copy is
          # self-contained; scoped to the minimax dir (the `models` PVC is shared
          # with qwen + gpt-oss) and excludes blobs/ since the deref'd snapshot
          # already holds the data (avoids a 2x copy). hostPath persists across
          # RecreateGroupOnPodRestart, so restarts re-sync incrementally (fast).
          - name: cache-models
            image: mirror.gcr.io/rclone/rclone:1.73.4@sha256:654f6517c7aaec7e377690b2caf7c272dbe5f3b8200afbc14a00df6b4a9aa6ef
            command:
              - rclone
              - sync
              - /ceph-models/hub/models--nvidia--MiniMax-M2.7-NVFP4/
              - /models/hub/models--nvidia--MiniMax-M2.7-NVFP4/
              - --copy-links
              - --exclude
              - blobs/**
              - --transfers
              - "8"
              - --checkers
              - "16"
              # One-line stats each minute instead of --progress (which floods
              # non-TTY pod logs with continuous progress redraws).
              - --stats
              - 1m
              - --stats-one-line
            volumeMounts:
              - name: ceph-models
                mountPath: /ceph-models
                readOnly: true
              - name: local-models
                mountPath: /models
        containers:
          - name: vllm
            # Official upstream vLLM release (aarch64) — same image as the leader. Digest-pinned.
            image: mirror.gcr.io/vllm/vllm-openai:v0.24.0-aarch64-ubuntu2404@sha256:e5759bdea866ac65633f3d1dd9a1850de1e5ff3865f5c659a600173d8cf2f59c
            command:
              - bash
              - -c
              - |
                vllm serve nvidia/MiniMax-M2.7-NVFP4 \
                  --served-model-name nvidia/MiniMax-M2.7-NVFP4 minimax-m2.7 \
                  --trust-remote-code \
                  --tensor-parallel-size 2 \
                  --gpu-memory-utilization 0.85 \
                  --max-model-len 196608 \
                  --load-format fastsafetensors \
                  --enable-auto-tool-choice \
                  --tool-call-parser minimax_m2 \
                  --reasoning-parser minimax_m2 \
                  --nnodes 2 \
                  --node-rank 1 \
                  --master-addr $${LWS_LEADER_ADDRESS} \
                  --master-port 29500 \
                  --headless \
                  --host 0.0.0.0 \
                  --port 8000
            env:
              - name: HF_HOME
                value: /models
              - name: HF_HUB_OFFLINE
                value: "1"
              - name: DO_NOT_TRACK
                value: "1"
              - name: PYTORCH_CUDA_ALLOC_CONF
                value: expandable_segments:True
              - name: NCCL_IB_HCA
                value: mlx5
              - name: NCCL_NET_GDR_LEVEL
                value: "2"
              # Force the Marlin/Triton path for the NVFP4 MoE kernels (matches
              # the spark-arena NVFP4 recipe + the qwen deploy). Without it, v0.24
              # can pick a DeepGEMM path that asserts on some FP8/FP4 checkpoints.
              - name: VLLM_MARLIN_USE_ATOMIC_ADD
                value: "1"
            securityContext:
              capabilities:
                add:
                  - IPC_LOCK
            resources:
              claims:
                - name: gpu-rdma
            volumeMounts:
              - name: local-models
                mountPath: /models
              - name: shm
                mountPath: /dev/shm
        volumes:
          # Source: shared models PVC on CephFS (read-only; init copies out of it).
          - name: ceph-models
            persistentVolumeClaim:
              claimName: models
              readOnly: true
          # Dest: node-local NVMe cache. hostPath persists across pod restarts so
          # the CephFS sync is a one-time-per-node cost; vLLM reads weights here.
          - name: local-models
            hostPath:
              path: /var/local/inference-models
              type: DirectoryOrCreate
          - name: shm
            emptyDir:
              medium: Memory
              sizeLimit: 16Gi
