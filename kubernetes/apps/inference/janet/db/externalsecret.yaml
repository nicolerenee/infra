---
# yaml-language-server: $schema=https://k8s-schemas.freckle.systems/external-secrets.io/externalsecret_v1.json
# CNPG superuser secret. Value is tofu-generated and stored in GSM
# (fairy-k8s01-janet-db-superuser). cnpg.io/reload lets CNPG pick up rotations.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: janet-db-secrets
spec:
  secretStoreRef:
    kind: SecretStore
    name: gcp-sm
  target:
    name: janet-db-secrets
    creationPolicy: Owner
    template:
      engineVersion: v2
      metadata:
        labels:
          cnpg.io/reload: "true"
      data:
        username: "{{ .POSTGRES_SUPER_USER }}"
        password: "{{ .POSTGRES_SUPER_PASS }}"
  dataFrom:
    - extract:
        key: ${CLUSTER_NAME}-janet-db-superuser
