---
# yaml-language-server: $schema=https://k8s-schemas.freckle.systems/external-secrets.io/externalsecret_v1.json
# Password secret for the CNPG managed `janet` role. CNPG expects username +
# password keys. Value tofu-generated, stored in GSM (fairy-k8s01-janet-db-app);
# the brain's DATABASE_URL ExternalSecret reads the same source.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: janet-app-db-role
spec:
  secretStoreRef:
    kind: SecretStore
    name: gcp-sm
  target:
    name: janet-app-db-role
    creationPolicy: Owner
    template:
      engineVersion: v2
      metadata:
        labels:
          cnpg.io/reload: "true"
      data:
        username: "{{ .username }}"
        password: "{{ .password }}"
  dataFrom:
    - extract:
        key: ${CLUSTER_NAME}-janet-db-app
