---
# Internal (tailnet) ingress for the brain's web UI + API. The tailnet Gateway
# in gateway-system terminates *.fairy.freckle.services (cluster-svcs-tls).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: janet-brain
spec:
  hostnames:
    - janet.fairy.freckle.services
  parentRefs:
    - name: tailnet
      namespace: gateway-system
  rules:
    - backendRefs:
        - kind: Service
          name: janet-brain
          port: 8787
