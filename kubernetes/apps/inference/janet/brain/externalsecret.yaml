---
# yaml-language-server: $schema=https://k8s-schemas.freckle.systems/external-secrets.io/externalsecret_v1.json
# Google OAuth config (calendar/email vault) from GSM. JSON keys = env-var
# names, consumed via envFrom. Kept separate from the Freckle ID secret.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: janet-google
spec:
  secretStoreRef:
    kind: SecretStore
    name: gcp-sm
  target:
    name: janet-google
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: ${CLUSTER_NAME}-janet-google
---
# yaml-language-server: $schema=https://k8s-schemas.freckle.systems/external-secrets.io/externalsecret_v1.json
# Freckle ID (pocket-id) client id from GSM — stored by tofu when it mints the
# client. Raw value mapped to the OIDC_CLIENT_ID env var.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: janet-oidc
spec:
  secretStoreRef:
    kind: SecretStore
    name: gcp-sm
  target:
    name: janet-oidc
    creationPolicy: Owner
  data:
    - secretKey: OIDC_CLIENT_ID
      remoteRef:
        key: ${CLUSTER_NAME}-janet-oidc
---
# yaml-language-server: $schema=https://k8s-schemas.freckle.systems/external-secrets.io/externalsecret_v1.json
# AES-256 key (hex) for encrypting the Google token vault at rest. tofu-minted,
# stored in GSM. Required by the brain whenever DATABASE_URL is set.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: janet-token-enc
spec:
  secretStoreRef:
    kind: SecretStore
    name: gcp-sm
  target:
    name: janet-token-enc
    creationPolicy: Owner
  data:
    - secretKey: JANET_TOKEN_ENC_KEY
      remoteRef:
        key: ${CLUSTER_NAME}-janet-token-enc
---
# yaml-language-server: $schema=https://k8s-schemas.freckle.systems/external-secrets.io/externalsecret_v1.json
# DATABASE_URL for the brain's pgStore, assembled from the same tofu-generated
# app-role creds the CNPG managed role uses. sslmode=require: encrypt without
# CA verification (CNPG serves its own CA). Host is the CNPG read-write svc.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: janet-db
spec:
  secretStoreRef:
    kind: SecretStore
    name: gcp-sm
  target:
    name: janet-db
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        DATABASE_URL: "postgresql://{{ .username }}:{{ .password }}@janet-db-rw.janet.svc.cluster.local:5432/janet?sslmode=require"
  dataFrom:
    - extract:
        key: ${CLUSTER_NAME}-janet-db-app
