---
# Namespace-shared HF token. Anything in `inference` that needs to pull
# models from huggingface (single-node vllm, 2-node vllm, future
# workloads) consumes this single Secret instead of each app shipping
# its own ExternalSecret.
# yaml-language-server: $schema=https://k8s-schemas.freckle.systems/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: huggingface
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: op-cluster-vault
  target:
    template:
      data:
        HF_TOKEN: "{{ .token }}"
  dataFrom:
    - extract:
        key: huggingface-${CLUSTER_NAME}
