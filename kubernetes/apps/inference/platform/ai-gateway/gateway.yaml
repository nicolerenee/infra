---
# Internal AI gateway. ClusterIP-only (envoy-clusterip class) — reached
# only by in-cluster clients (the janet brain), never exposed publicly.
# yaml-language-server: $schema=https://k8s-schemas.freckle.systems/gateway.networking.k8s.io/gateway_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: ai
spec:
  gatewayClassName: envoy-clusterip
  # Per-gateway EnvoyProxy (overrides the class-level envoy-clusterip for this
  # Gateway only) so resolved-backend access logging is scoped to the AI gateway
  # and never touches the shared tunnel gateway.
  infrastructure:
    parametersRef:
      group: gateway.envoyproxy.io
      kind: EnvoyProxy
      name: ai-envoy
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same
---
# Envoy Gateway defaults the client buffer limit to 32kiB, too small for
# AI request/response bodies. Bump to 50MiB.
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/gateway.envoyproxy.io/clienttrafficpolicy_v1alpha1.json
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: ClientTrafficPolicy
metadata:
  name: ai-buffer-limit
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: ai
  # Reap a stream that goes 5 minutes with no upstream/downstream activity (a
  # wedged backend or hung generation). Resets on every byte, so a healthy
  # long-running LLM stream never trips it — this is the real safety net that
  # lets the per-route request timeout be a loose 30m runaway backstop.
  timeout:
    http:
      streamIdleTimeout: 300s
  connection:
    bufferLimit: 50Mi
---
# Stable address for in-cluster clients. Envoy Gateway provisions its own
# data-plane Service with a generated name; this selector Service gives a
# predictable DNS name (ai-gateway.inference.svc) independent of EG's
# naming. Selector matches the EG-managed envoy pods for this Gateway;
# port 80 maps to EG's container port 10080.
apiVersion: v1
kind: Service
metadata:
  name: ai-gateway
spec:
  type: ClusterIP
  selector:
    gateway.envoyproxy.io/owning-gateway-name: ai
    gateway.envoyproxy.io/owning-gateway-namespace: inference
  ports:
    - name: http
      port: 80
      targetPort: 10080
      protocol: TCP
---
# Dedicated data plane for the AI gateway. Mirrors the class-level
# envoy-clusterip settings (ClusterIP, 2 replicas, prometheus metrics) and adds
# a JSON access log with the resolved backend + x-ai-eg-model per request —
# the secure-tier audit trail ("where did this sensitive request run"). Logs
# metadata only (ids, model/backend, status, latency, byte counts) — never
# prompt/response content.
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/gateway.envoyproxy.io/envoyproxy_v1alpha1.json
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: ai-envoy
spec:
  ipFamily: DualStack
  logging:
    level:
      default: info
  provider:
    type: Kubernetes
    kubernetes:
      envoyDeployment:
        replicas: 2
        container:
          imageRepository: mirror.gcr.io/envoyproxy/envoy
          resources:
            requests:
              cpu: 100m
            limits:
              memory: 1Gi
      envoyService:
        type: ClusterIP
  shutdown:
    drainTimeout: 180s
  telemetry:
    metrics:
      prometheus:
        compression:
          type: Zstd
    accessLog:
      settings:
        - format:
            type: JSON
            json:
              start_time: "%START_TIME%"
              method: "%REQ(:METHOD)%"
              path: "%REQ(X-ENVOY-ORIGINAL-PATH?:PATH)%"
              model: "%REQ(x-ai-eg-model)%"
              backend: "%UPSTREAM_CLUSTER%"
              upstream_host: "%UPSTREAM_HOST%"
              response_code: "%RESPONSE_CODE%"
              response_flags: "%RESPONSE_FLAGS%"
              duration_ms: "%DURATION%"
              request_id: "%REQ(X-REQUEST-ID)%"
              bytes_sent: "%BYTES_SENT%"
              bytes_received: "%BYTES_RECEIVED%"
          sinks:
            - type: File
              file:
                path: /dev/stdout

