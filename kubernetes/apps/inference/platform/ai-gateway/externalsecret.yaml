---
# yaml-language-server: $schema=https://k8s-schemas.freckle.systems/external-secrets.io/externalsecret_v1.json
# Anthropic API key for the gateway's Anthropic backend, pulled from GSM
# (fairy-k8s01-inference-anthropic-api-key) via the inference-ns gcp-sm
# store. The target Secret key is literally `apiKey` — that's what
# BackendSecurityPolicy.anthropicAPIKey.secretRef expects.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: anthropic-apikey
spec:
  secretStoreRef:
    kind: SecretStore
    name: gcp-sm
  target:
    name: anthropic-apikey
    creationPolicy: Owner
  data:
    - secretKey: apiKey
      remoteRef:
        key: ${CLUSTER_NAME}-inference-anthropic-api-key
