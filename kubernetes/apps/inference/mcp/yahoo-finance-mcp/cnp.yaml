---
# yaml-language-server: $schema=https://k8s-schemas.freckle.systems/cilium.io/ciliumnetworkpolicy_v2.json
# Egress lockdown for the Yahoo Finance MCP server. yfinance talks to a fixed
# set of hosts on 443 (confirmed against yfinance's own source — const.py +
# data.py in ranaroussi/yfinance, the library this MCP server is built on):
#   - **.yahoo.com — every API/auth/consent host yfinance uses is a Yahoo
#     subdomain: query1/query2.finance.yahoo.com (the quote/chart/fundamentals/
#     news JSON APIs), finance.yahoo.com + fc.yahoo.com (cookie+crumb
#     bootstrap — its anti-bot workaround: mint a session cookie and CSRF
#     "crumb" before query1/query2 will answer), and consent.yahoo.com /
#     guce.yahoo.com (Yahoo's GUCE cookie-consent redirect the bootstrap can
#     be routed through). NOTE the DOUBLE asterisk: Cilium's single-`*`
#     matchPattern matches within ONE DNS label only (it does not cross dots),
#     so `*.yahoo.com` silently drops the two-label query1/query2.finance.
#     yahoo.com API hosts as world-ipv4 → curl(28). `**.` (Cilium ≥1.19,
#     PR #43420) matches subdomains at any depth, covering both.
#   - markets.businessinsider.com — the ONE non-Yahoo host. yfinance's
#     Ticker.isin scrapes Business Insider's ISIN search-suggest endpoint, and
#     this server's get_stock_info calls .isin as a validity guard before
#     .info. Without this, get_stock_info fails at the ISIN step (curl 28)
#     before it ever reaches Yahoo. (Read-only search endpoint; the other 8
#     tools never touch it.)
# No SSRF surface here (unlike jina-reader) — this server never fetches a
# caller-supplied URL, only fixed yfinance endpoints, so a scoped allowlist
# (like brave-search-mcp's) is the right shape, not "world minus internal".
# DNS (53) is allowed separately by the cluster-wide intercept-all-dns CCNP.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: yahoo-finance-mcp-egress
spec:
  endpointSelector:
    matchLabels:
      app: yahoo-finance-mcp
  egress:
    - toFQDNs:
        - matchPattern: "**.yahoo.com"
        - matchName: "markets.businessinsider.com"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
