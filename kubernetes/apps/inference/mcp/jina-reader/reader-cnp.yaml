---
# yaml-language-server: $schema=https://k8s-schemas.freckle.systems/cilium.io/ciliumnetworkpolicy_v2.json
# Egress lockdown for the Jina Reader — the SSRF surface, since it fetches
# arbitrary URLs the model asks for. Allow the `world` entity (public internet)
# so it can read external pages, but deny all private/internal space so it can't
# be steered at on-site LAN, management, storage, or tailnet hosts:
#   - RFC1918 (10/8, 172.16/12, 192.168/16)
#   - CGNAT / Tailscale (100.64.0.0/10)
#   - link-local / cloud-metadata (169.254.0.0/16)
#   - IPv6 ULA + link-local (fc00::/7, fe80::/10)
#
# No `except` for the cluster's own service/pod CIDRs is needed even though they
# sit inside 10/8 and fc00::/7: Cilium CIDR rules (allow AND deny) never govern
# traffic where both ends are Cilium-managed — in-cluster peers are matched by
# their pod identity, not by IP. So this deny simply doesn't apply to
# reader→CoreDNS (both Cilium-managed); DNS keeps working (and is separately
# allowed by the cluster-wide intercept-all-dns CCNP). Because there are no
# hardcoded cluster CIDRs, this policy is cluster-agnostic and shared verbatim by
# every jina-reader Flux Kustomization (janet-mcp on fairy, hedgehog on atlantis).
# The reader still cannot reach other in-cluster pods/services: nothing here
# allows the `cluster` entity, so default-deny egress blocks them. Node/host IPs
# in RFC1918 ARE covered by the deny (node networking isn't Cilium-managed) —
# which is intended: the reader must not reach mgmt/node addresses.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: jina-reader-egress
spec:
  endpointSelector:
    matchLabels:
      app: jina-reader
  egress:
    # Web fetching only ever needs HTTP/HTTPS outbound. Scoping to 80/443 also
    # blocks the bundled headless Chrome's background "phone home" — Chromium
    # dials Google's GCM/FCM push server on TCP 5228 (observed: 142.250.x:5228),
    # which a fetcher never needs. UDP 443 permits HTTP/3 (QUIC); Chrome falls
    # back to TCP if it's absent, so this is belt-and-suspenders. DNS (53) is
    # allowed separately by the cluster-wide intercept-all-dns CCNP.
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "80"
              protocol: TCP
            - port: "443"
              protocol: TCP
            - port: "443"
              protocol: UDP
  egressDeny:
    - toCIDRSet:
        - cidr: 10.0.0.0/8
        - cidr: 172.16.0.0/12
        - cidr: 192.168.0.0/16
        - cidr: 100.64.0.0/10
        - cidr: 169.254.0.0/16
        - cidr: fc00::/7
        - cidr: fe80::/10
