---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: vllm-gpt-oss
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: vllm-gpt-oss
  ingress:
    # Reachable only by the in-cluster AI gateway (envoy-clusterip "ai"
    # Gateway) that fronts the inference backends.
    - fromEndpoints:
        - matchLabels:
            gateway.envoyproxy.io/owning-gateway-name: ai
            gateway.envoyproxy.io/owning-gateway-namespace: inference
      toPorts:
        - ports:
            - port: "8000"
              protocol: TCP
