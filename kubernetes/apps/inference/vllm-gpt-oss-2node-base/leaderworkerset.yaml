---
apiVersion: leaderworkerset.x-k8s.io/v1
kind: LeaderWorkerSet
metadata:
  name: vllm-gpt-oss-2node-base
spec:
  replicas: 1
  leaderWorkerTemplate:
    size: 2
    restartPolicy: RecreateGroupOnPodRestart
    leaderTemplate:
      metadata:
        labels:
          app.kubernetes.io/name: vllm-gpt-oss-2node-base
          app.kubernetes.io/component: leader
        annotations:
          k8s.v1.cni.cncf.io/networks: gpu-fabric
      spec:
        runtimeClassName: nvidia
        tolerations:
          - key: nvidia.com/gpu
            operator: Exists
            effect: NoSchedule
        containers:
          - name: vllm
            image: nvcr.io/nvidia/vllm:26.04-py3
            command:
              - bash
              - -c
              - |
                vllm serve openai/gpt-oss-120b \
                  --tool-call-parser openai \
                  --reasoning-parser openai_gptoss \
                  --enable-auto-tool-choice \
                  --tensor-parallel-size 2 \
                  --gpu-memory-utilization 0.7 \
                  --enable-prefix-caching \
                  --quantization mxfp4 \
                  --kv-cache-dtype fp8 \
                  --max-num-batched-tokens 8192 \
                  --nnodes 2 \
                  --node-rank 0 \
                  --master-addr $${LWS_LEADER_ADDRESS} \
                  --master-port 29500 \
                  --host 0.0.0.0 \
                  --port 8000
            env:
              - name: VLLM_USE_FLASHINFER_MOE_MXFP4_MXFP8_CUTLASS
                value: "1"
              - name: HF_HOME
                value: /models
              # NCCL: use RDMA over ConnectX-7 fabric
              - name: NCCL_IB_HCA
                value: mlx5
              - name: NCCL_NET_GDR_LEVEL
                value: "2"
            envFrom:
              - secretRef:
                  name: huggingface
            ports:
              - containerPort: 8000
                name: http
              - containerPort: 29500
                name: dist-coord
            startupProbe:
              httpGet:
                path: /health
                port: http
              initialDelaySeconds: 60
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 360
            livenessProbe:
              httpGet:
                path: /health
                port: http
              periodSeconds: 30
              timeoutSeconds: 5
              failureThreshold: 3
            readinessProbe:
              httpGet:
                path: /health
                port: http
              periodSeconds: 30
              timeoutSeconds: 5
              failureThreshold: 3
            securityContext:
              capabilities:
                add:
                  - IPC_LOCK
            resources:
              limits:
                nvidia.com/gpu: 1
                rdma/rdma_shared_device_a: 2
            volumeMounts:
              - name: models
                mountPath: /models
              - name: shm
                mountPath: /dev/shm
        volumes:
          - name: models
            persistentVolumeClaim:
              claimName: models
          - name: shm
            emptyDir:
              medium: Memory
              sizeLimit: 16Gi
    workerTemplate:
      metadata:
        labels:
          app.kubernetes.io/name: vllm-gpt-oss-2node-base
          app.kubernetes.io/component: worker
        annotations:
          k8s.v1.cni.cncf.io/networks: gpu-fabric
      spec:
        runtimeClassName: nvidia
        tolerations:
          - key: nvidia.com/gpu
            operator: Exists
            effect: NoSchedule
        containers:
          - name: vllm
            image: nvcr.io/nvidia/vllm:26.04-py3
            command:
              - bash
              - -c
              - |
                vllm serve openai/gpt-oss-120b \
                  --tool-call-parser openai \
                  --reasoning-parser openai_gptoss \
                  --enable-auto-tool-choice \
                  --tensor-parallel-size 2 \
                  --gpu-memory-utilization 0.7 \
                  --enable-prefix-caching \
                  --quantization mxfp4 \
                  --kv-cache-dtype fp8 \
                  --max-num-batched-tokens 8192 \
                  --nnodes 2 \
                  --node-rank 1 \
                  --master-addr $${LWS_LEADER_ADDRESS} \
                  --master-port 29500 \
                  --headless \
                  --host 0.0.0.0 \
                  --port 8000
            env:
              - name: VLLM_USE_FLASHINFER_MOE_MXFP4_MXFP8_CUTLASS
                value: "1"
              - name: HF_HOME
                value: /models
              - name: NCCL_IB_HCA
                value: mlx5
              - name: NCCL_NET_GDR_LEVEL
                value: "2"
            envFrom:
              - secretRef:
                  name: huggingface
            securityContext:
              capabilities:
                add:
                  - IPC_LOCK
            resources:
              limits:
                nvidia.com/gpu: 1
                rdma/rdma_shared_device_a: 2
            volumeMounts:
              - name: models
                mountPath: /models
              - name: shm
                mountPath: /dev/shm
        volumes:
          - name: models
            persistentVolumeClaim:
              claimName: models
          - name: shm
            emptyDir:
              medium: Memory
              sizeLimit: 16Gi
