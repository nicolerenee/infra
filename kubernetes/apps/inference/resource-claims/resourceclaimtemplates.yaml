---
# DeviceClass for RDMA-capable interfaces exposed by dranet. Filters to
# devices reported with the rdma attribute true — on the DGX nodes that
# matches each ConnectX-7 PF. dranet doesn't ship a DeviceClass itself.
apiVersion: resource.k8s.io/v1
kind: DeviceClass
metadata:
  name: rdma.dra.net
spec:
  selectors:
    - cel:
        expression: device.driver == "dra.net" && device.attributes["dra.net"].rdma == true
---
apiVersion: resource.k8s.io/v1
kind: ResourceClaimTemplate
metadata:
  name: gpu
spec:
  spec:
    devices:
      requests:
        - name: gpu
          exactly:
            deviceClassName: gpu.nvidia.com
---
# Combined GPU + 2× RDMA NIC claim, used by the multi-node vLLM
# LeaderWorkerSet for GPUDirect over ConnectX-7.
apiVersion: resource.k8s.io/v1
kind: ResourceClaimTemplate
metadata:
  name: gpu-rdma
spec:
  spec:
    devices:
      requests:
        - name: gpu
          exactly:
            deviceClassName: gpu.nvidia.com
        - name: rdma
          exactly:
            deviceClassName: rdma.dra.net
            count: 2
