---
# yaml-language-server: $schema=https://k8s-schemas.freckle.systems/source.toolkit.fluxcd.io/helmrepository_v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: nvidia
spec:
  interval: 1h
  url: https://helm.ngc.nvidia.com/nvidia
---
# yaml-language-server: $schema=https://k8s-schemas.freckle.systems/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gpu-operator
spec:
  chart:
    spec:
      chart: gpu-operator
      version: v26.3.0
      sourceRef:
        kind: HelmRepository
        name: nvidia
  interval: 1h
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    # Use patched GPU operator image until v26.4.0+ is released
    # https://github.com/NVIDIA/gpu-operator/issues/2239
    operator:
      repository: ghcr.io/nvidia
      image: gpu-operator
      version: 670be908

    # Talos provides NVIDIA drivers via system extensions
    driver:
      enabled: false

    # Talos provides NVIDIA container toolkit via system extensions
    toolkit:
      enabled: false

    # Disable GPU operator's NFD - use kube-system NFD instead
    # The kube-system NFD runs on all nodes and has custom Intel GPU rules,
    # while this one has no custom configuration and would be redundant
    node-feature-discovery:
      enabled: false

    # Talos mounts drivers at /usr/local/glibc/usr/lib
    hostPaths:
      driverInstallDir: /usr/local/glibc/usr/lib
