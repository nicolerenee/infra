---
# Jellyfin's config PVC, managed here (not by the Helm chart) so the
# dataSourceRef can point at the volsync ReplicationDestination.
# On creation the volume populator restores the latest restic snapshot
# into this PVC; on every future recreate of this PVC (namespace move,
# cluster rebuild) the same path applies.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jellyfin-config
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 100Gi
  storageClassName: ceph-block
  dataSourceRef:
    apiGroup: volsync.backube
    kind: ReplicationDestination
    name: jellyfin-config-bootstrap
