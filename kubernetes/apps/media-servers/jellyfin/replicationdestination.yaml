---
# Bootstrap target: when a PVC references this via dataSourceRef,
# volsync's volume populator triggers a one-shot restore from the
# latest restic snapshot. Keep this around — same RD is reused on
# any future PVC recreation (cluster rebuild, namespace move, etc.).
apiVersion: volsync.backube/v1alpha1
kind: ReplicationDestination
metadata:
  name: jellyfin-config-bootstrap
spec:
  trigger:
    manual: bootstrap-2026-05-08
  restic:
    # Run mover as jellyfin's UID so restic skips chown-preservation
    # (would otherwise EPERM since the mover container drops CAP_CHOWN).
    moverSecurityContext:
      runAsUser: 3000
      runAsGroup: 3000
      fsGroup: 3000
      fsGroupChangePolicy: OnRootMismatch
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault
    repository: jellyfin-volsync
    copyMethod: Snapshot
    accessModes: [ReadWriteOnce]
    capacity: 100Gi
    storageClassName: ceph-block
    volumeSnapshotClassName: csi-ceph-blockpool
    cacheCapacity: 1Gi
    cacheStorageClassName: ceph-block
    cacheAccessModes: [ReadWriteOnce]
    cleanupCachePVC: true
    cleanupTempPVC: true
