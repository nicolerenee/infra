---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: homepage
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: default
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  driftDetection:
    mode: enabled
  values:
    controllers:
      homepage:
        annotations:
          reloader.stakater.com/auto: "true"
        strategy: RollingUpdate
        containers:
          app:
            image:
              repository: ghcr.io/gethomepage/homepage
              tag: v1.13.2@sha256:a0b71c8e757298d02560186bab9fbe3fc2d375c523a62cc1019177b37e48aa28
            env:
              TZ: America/Chicago
              LOG_TARGETS: stdout
              # Required since v0.10 — homepage rejects requests with a Host
              # header not in this list. Cluster overlay supplies value.
              HOMEPAGE_ALLOWED_HOSTS: ${HOMEPAGE_ALLOWED_HOSTS}
            envFrom:
              - secretRef:
                  name: homepage-secrets
            ports:
              - containerPort: &port 3000
                name: http
            probes:
              # TCP rather than HTTP so kubelet (which sends the pod IP as
              # the Host header) doesn't get rejected by HOMEPAGE_ALLOWED_HOSTS.
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: *port
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 1Gi
    defaultPodOptions:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    service:
      app:
        controller: homepage
        ipFamilyPolicy: PreferDualStack
        ipFamilies:
          - IPv4
          - IPv6
        ports:
          http:
            port: 80
            targetPort: *port
    route:
      app:
        hostnames:
          - ${HOMEPAGE_HOSTNAME}
        parentRefs:
          - name: public
            namespace: gateway-system
        rules:
          - backendRefs:
              - identifier: app
                port: 80
    persistence:
      # Homepage v1.12+ writes its skeleton config files (proxmox.yaml,
      # custom.css, etc.) into /app/config on first run. Writable emptyDir
      # there + subPath mounts overlay our customizations.
      app-config:
        type: emptyDir
        globalMounts:
          - path: /app/config
      config-files:
        type: configMap
        name: homepage-config
        globalMounts:
          - path: /app/config/settings.yaml
            subPath: settings.yaml
          - path: /app/config/services.yaml
            subPath: services.yaml
          - path: /app/config/widgets.yaml
            subPath: widgets.yaml
          - path: /app/config/bookmarks.yaml
            subPath: bookmarks.yaml
      cache:
        type: emptyDir
        globalMounts:
          - path: /app/.next/cache
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
