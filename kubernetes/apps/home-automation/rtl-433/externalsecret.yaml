---
# Parameterized via postBuild ${APP} — produces <APP>-mqtt-creds Secret
# from the matching 1P item mqtt-fairy-house-<APP>.
# yaml-language-server: $schema=https://k8s-schemas.freckle.systems/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ${APP}-mqtt-creds
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  refreshInterval: 1h
  target:
    name: ${APP}-mqtt-creds
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        MQTT_USERNAME: "{{ .username }}"
        MQTT_PASSWORD: "{{ .password }}"
  data:
    - secretKey: username
      remoteRef:
        key: mqtt-fairy-house-${APP}
        property: username
    - secretKey: password
      remoteRef:
        key: mqtt-fairy-house-${APP}
        property: password
