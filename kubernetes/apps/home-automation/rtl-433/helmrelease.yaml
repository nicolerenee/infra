---
# Parameterized via the Flux KS postBuild substitutions:
#   APP        — release name (e.g. rtl915, rtl433)
#   FREQUENCY  — MHz the radio tunes to (e.g. 915, 433)
# Multiple cluster KSes can target the same path with different APP +
# FREQUENCY to stand up one rtl_433 instance per band.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ${APP}
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: default
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  driftDetection:
    mode: enabled
    ignore:
      - paths: ["/spec/replicas"]
  values:
    controllers:
      ${APP}:
        annotations:
          reloader.stakater.com/auto: "true"
        strategy: Recreate
        containers:
          app:
            image:
              repository: ghcr.io/hertzg/rtl_433_docker
              tag: 25.12-debian
            args:
              - -c
              - /etc/rtl_433/rtl_433.conf
              - -F
              # bjw-s app-template defaults enableServiceLinks=false, so
              # the old $(MOSQUITTO_SERVICE_HOST) auto-link env vars
              # aren't there — use the FQDN directly.
              - mqtt://mosquitto.home-automation.svc:1883,retain=1,devices=rtl_433/$(FREQUENCY)/devices[/type][/model][/subtype][/channel][/id],events=rtl_433/$(FREQUENCY)/events,states=rtl_433/$(FREQUENCY)/states
              - -f
              - $(FREQUENCY)Mhz
            env:
              FREQUENCY: "${FREQUENCY}"
            # MQTT creds aren't used in the URL today (mosquitto allows
            # anonymous), but the Secret stays envFrom'd so we can flip
            # mqtt:// → mqtt://user:pass@... later without a redeploy.
            envFrom:
              - secretRef:
                  name: ${APP}-mqtt-creds
            resources:
              requests:
                cpu: 100m
                memory: 64Mi
                devic.es/dvb-t: "1"
              limits:
                cpu: 500m
                memory: 512Mi
                devic.es/dvb-t: "1"
    # rtl_433 needs access to the SDR via the devic.es/dvb-t device
    # plugin — leaving runAsUser/caps untouched matches the previous
    # deployment (run as root with default caps). Tighten later once
    # we confirm it works under runAsNonRoot+caps drop.
    defaultPodOptions:
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
    configMaps:
      config:
        enabled: true
        suffix: config
        data:
          rtl_433.conf: |
            report_meta time:iso:usec:tz
            report_meta level
            report_meta noise
            report_meta stats
            report_meta protocol

            convert si

            # rtl_433 -R help 2>&1 | grep -i 'ambient weather\|fine offset\|neptune' | sd '.*\[(\d+)\]\*?\s*(.*)' 'protocol $1 # $2'
            protocol 18 # Fine Offset Electronics, WH2, WH5, Telldus Temperature/Humidity/Rain Sensor
            protocol 20 # Ambient Weather F007TH, TFA 30.3208.02, SwitchDocLabs F016TH temperature sensor
            protocol 32 # Fine Offset Electronics WH1080/WH3080 Weather Station
            protocol 69 # Fine Offset WH1050 Weather Station
            protocol 78 # Fine Offset Electronics, WH25, WH32, WH32B, WN32B, WH24, WH65B, HP1000, Misol WS2320 Temperature/Humidity/Pressure Sensor
            protocol 79 # Fine Offset Electronics, WH0530 Temperature/Rain Sensor
            protocol 112 # Ambient Weather TX-8300 Temperature/Humidity Sensor
            protocol 113 # Ambient Weather WH31E Thermo-Hygrometer Sensor, EcoWitt WH40 rain gauge, WS68 weather station
            protocol 142 # Fine Offset Electronics/ECOWITT WH51, SwitchDoc Labs SM23 Soil Moisture Sensor
            protocol 155 # Fine Offset Electronics WH1080/WH3080 Weather Station (FSK)
            protocol 190 # Ambient Weather WH31L (FineOffset WH57) Lightning-Strike sensor
            protocol 213 # Fine Offset Electronics WS80 weather station
            protocol 219 # Fine Offset Electronics WH45 air quality sensor
            protocol 221 # Fine Offset Electronics WN34S/L/D and Froggit DP150/D35 temperature sensor
            protocol 228 # Neptune R900 flow meters
            protocol 244 # Fine Offset Electronics WS90 weather station
            protocol 251 # Fine Offset / Ecowitt WH55 water leak sensor
            protocol 262 # Fine Offset Electronics WH46 air quality sensor
    persistence:
      config:
        type: configMap
        name: ${APP}-config
        advancedMounts:
          ${APP}:
            app:
              - path: /etc/rtl_433
                readOnly: true
