---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: homeassistant
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: default
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      homeassistant:
        annotations:
          reloader.stakater.com/auto: "true"
        strategy: Recreate
        containers:
          app:
            image:
              repository: ghcr.io/home-assistant/home-assistant
              tag: 2026.7.0
            env:
              TZ: America/Chicago
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet: { path: /, port: &port 8123 }
                  initialDelaySeconds: 60
                  periodSeconds: 30
                  timeoutSeconds: 10
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet: { path: /, port: *port }
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 10
                  failureThreshold: 3
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet: { path: /, port: *port }
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  timeoutSeconds: 5
                  # ~10 min for full startup (DB migrations, integrations)
                  failureThreshold: 60
            resources:
              requests:
                cpu: 500m
                memory: 512Mi
              limits:
                cpu: 4
                memory: 8Gi
    defaultPodOptions:
      # HA needs hostNetwork for mDNS/SSDP/broadcast device discovery
      # on the LAN. ClusterFirstWithHostNet keeps in-cluster DNS working
      # for things like the mqtt:// upstream.
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
    service:
      app:
        controller: homeassistant
        ports:
          http:
            port: 80
            targetPort: *port
    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.${CLUSTER_SUBDOMAIN}.freckle.services"
        parentRefs:
          - name: tailnet
            namespace: gateway-system
    persistence:
      config:
        # Pre-existing 50Gi PVC carries the HA config + history database.
        # Adopted by helm-controller via existingClaim; kustomize-managed
        # PVC predates this HR.
        existingClaim: homeassistant-config
        advancedMounts:
          homeassistant:
            app:
              - path: /config
