---
# Publishes Home Assistant MQTT discovery topics for whatever rtl_433
# is currently sending. The container is a vanilla python:3 image that
# downloads the upstream rtl_433_mqtt_hass.py script at start and runs
# it against mosquitto. Single instance, no per-frequency variants.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rtl-mqtt-autodiscovery
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: default
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      rtl-mqtt-autodiscovery:
        annotations:
          reloader.stakater.com/auto: "true"
        strategy: Recreate
        containers:
          app:
            image:
              repository: python
              tag: "3"
            command:
              - /bin/bash
              - /scripts/run.sh
            env:
              MQTT_HOST: mosquitto.home-automation.svc
            envFrom:
              - secretRef:
                  name: rtl-mqtt-autodiscovery-mqtt-creds
            resources:
              requests:
                cpu: 100m
                memory: 64Mi
              limits:
                cpu: 500m
                memory: 512Mi
    configMaps:
      scripts:
        enabled: true
        data:
          run.sh: |
            #!/bin/bash
            set -eu

            # renovate: datasource=github-releases depName=merbanan/rtl_433
            RTL_433_VERSION=25.02

            wget -q "https://raw.githubusercontent.com/merbanan/rtl_433/refs/tags/${RTL_433_VERSION}/examples/rtl_433_mqtt_hass.py"
            pip install --no-cache-dir --prefer-binary paho-mqtt==1.6.1

            exec python3 -u rtl_433_mqtt_hass.py -H "$MQTT_HOST" -u "$MQTT_USERNAME" -P "$MQTT_PASSWORD"
    persistence:
      scripts:
        type: configMap
        name: rtl-mqtt-autodiscovery-scripts
        advancedMounts:
          rtl-mqtt-autodiscovery:
            app:
              - path: /scripts
                readOnly: true
