---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mosquitto
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: default
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  driftDetection:
    mode: enabled
    ignore:
      - paths: ["/spec/replicas"]
  values:
    controllers:
      mosquitto:
        annotations:
          reloader.stakater.com/auto: "true"
        strategy: Recreate
        initContainers:
          # mosquitto's password_file expects mosquitto_passwd-hashed entries;
          # plaintext lines (which is what the ES templates) silently fail authn.
          # Copy the secret-mounted plaintext file into an emptyDir and hash it
          # in place with `mosquitto_passwd -U` so the main container reads a
          # valid hashed file.
          hash-passwords:
            image:
              repository: public.ecr.aws/docker/library/eclipse-mosquitto
              tag: 2.0.22
            command: ["/bin/sh", "-c"]
            args:
              - |
                set -eu
                cp /var/run/password-plain/password.txt /mosquitto/password/password.txt
                chmod 0600 /mosquitto/password/password.txt
                mosquitto_passwd -U /mosquitto/password/password.txt
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
              runAsNonRoot: true
              seccompProfile:
                type: RuntimeDefault
        containers:
          app:
            image:
              repository: public.ecr.aws/docker/library/eclipse-mosquitto
              tag: 2.0.22
            env:
              TZ: America/Chicago
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  tcpSocket: { port: &port 1883 }
                  initialDelaySeconds: 10
                  periodSeconds: 20
                  timeoutSeconds: 3
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  tcpSocket: { port: *port }
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  timeoutSeconds: 3
                  failureThreshold: 3
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 512Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
              runAsNonRoot: true
              seccompProfile:
                type: RuntimeDefault
    defaultPodOptions:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    service:
      app:
        controller: mosquitto
        ports:
          mqtt:
            port: *port
    persistence:
      data:
        enabled: true
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 5Gi
        storageClass: ceph-block
        retain: true
        advancedMounts:
          mosquitto:
            app:
              - path: /mosquitto/data
      # Templated config (from ES). mosquitto.conf is mounted directly to the
      # main container; password.txt is only mounted into the init container
      # as a plaintext source — the init hashes it into the password emptyDir.
      config:
        type: secret
        name: mosquitto-secret
        advancedMounts:
          mosquitto:
            app:
              - path: /mosquitto/config/mosquitto.conf
                subPath: mosquitto.conf
                readOnly: true
            hash-passwords:
              - path: /var/run/password-plain/password.txt
                subPath: password.txt
                readOnly: true
      # Hashed password file lives here. Init container writes; main reads.
      password:
        type: emptyDir
        advancedMounts:
          mosquitto:
            hash-passwords:
              - path: /mosquitto/password
            app:
              - path: /mosquitto/password
                readOnly: true
      # mosquitto_passwd hardcodes /tmp/mosquitto-XXXXXX for its tempfile and
      # ignores TMPDIR, so the init needs a writable /tmp despite
      # readOnlyRootFilesystem.
      tmp:
        type: emptyDir
        advancedMounts:
          mosquitto:
            hash-passwords:
              - path: /tmp
