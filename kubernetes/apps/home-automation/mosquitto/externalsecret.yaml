---
# Produces the mosquitto-secret Secret that the HR mounts at both
# /mosquitto/config/mosquitto.conf and /mosquitto/password/password.txt.
# Templating the whole conf via ES is what lets us keep the SolarAssistant
# bridge credentials out of git.
# yaml-language-server: $schema=https://k8s-schemas.freckle.systems/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mosquitto-secret
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  refreshInterval: 1h
  target:
    name: mosquitto-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        password.txt: |
          {{ .ha_user }}:{{ .ha_pass }}
          {{ .ha_addon_user }}:{{ .ha_addon_pass }}
          {{ .rtl_915_user }}:{{ .rtl_915_pass }}
          {{ .rtl_autodiscovery_user }}:{{ .rtl_autodiscovery_pass }}
          {{ .zwavejs_user }}:{{ .zwavejs_pass }}
        mosquitto.conf: |
          persistence true
          persistence_location /mosquitto/data/

          log_dest stdout

          listener 1883
          protocol mqtt

          allow_anonymous true
          password_file /mosquitto/password/password.txt

          connection SolarAssistant
          remote_username {{ .solar_user }}
          remote_password {{ .solar_pass }}
          address 10.189.10.199
          topic # in
          topic solar_assistant/# out
  data:
    - secretKey: ha_user
      remoteRef:
        key: mqtt-fairy-house-homeassistant
        property: username
    - secretKey: ha_pass
      remoteRef:
        key: mqtt-fairy-house-homeassistant
        property: password
    - secretKey: ha_addon_user
      remoteRef:
        key: mqtt-fairy-house-hass-addons
        property: username
    - secretKey: ha_addon_pass
      remoteRef:
        key: mqtt-fairy-house-hass-addons
        property: password
    - secretKey: rtl_915_user
      remoteRef:
        key: mqtt-fairy-house-rtl915
        property: username
    - secretKey: rtl_915_pass
      remoteRef:
        key: mqtt-fairy-house-rtl915
        property: password
    - secretKey: rtl_autodiscovery_user
      remoteRef:
        key: mqtt-fairy-house-rtl-autodiscovery
        property: username
    - secretKey: rtl_autodiscovery_pass
      remoteRef:
        key: mqtt-fairy-house-rtl-autodiscovery
        property: password
    - secretKey: zwavejs_user
      remoteRef:
        key: mqtt-fairy-house-zwavejs
        property: username
    - secretKey: zwavejs_pass
      remoteRef:
        key: mqtt-fairy-house-zwavejs
        property: password
    - secretKey: solar_user
      remoteRef:
        key: mqtt-solar-bridge
        property: username
    - secretKey: solar_pass
      remoteRef:
        key: mqtt-solar-bridge
        property: password
