---
# Internal (tailnet) ingress for the harvest dashboard. The tailnet Gateway in
# gateway-system terminates TLS — harvest.freckle.services is covered by the
# cluster-svcs-tls cert's `*.${SVCS_DOMAIN}` (= *.freckle.services) SAN, and
# external-dns (cloudflare) publishes the record because that gateway carries
# the `gateway.freckle.systems/dns: cloudflare` label.
#
# Reachable only from the tailnet — that network boundary is the access
# control for now (the page shows personal comp data). Add app-level auth
# before exposing it any wider.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: harvest
spec:
  hostnames:
    - harvest.freckle.services
  parentRefs:
    - name: tailnet
      namespace: gateway-system
  rules:
    - backendRefs:
        - kind: Service
          name: harvest
          port: 8080
