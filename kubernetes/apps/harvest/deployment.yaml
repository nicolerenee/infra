---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: harvest
spec:
  replicas: 1
  # RollingUpdate so deploys never take the page fully offline. State is just
  # the embedded dataset + an in-memory price cache, so any pod is equivalent;
  # a fresh pod re-warms its price cache on startup.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: harvest
  template:
    metadata:
      labels:
        app.kubernetes.io/name: harvest
    spec:
      # Pull from GHCR with the cluster-wide ghcr-pull credential (the same
      # ClusterExternalSecret janet uses). The harvest namespace opts in via
      # the `freckle.systems/ghcr-pull: "true"` label.
      imagePullSecrets:
        - name: ghcr-pull
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: harvest
          # Image tag is rewritten by Flux image-automation (ImagePolicy
          # flux-system:harvest selects the newest main-<ts>-<sha> build).
          image: ghcr.io/nicolerenee/harvest:latest # {"$imagepolicy": "flux-system:harvest"}
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: PORT
              value: "8080"
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 128Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
