---
# Dragonfly instance used as a job queue (pub/sub + streams/lists for
# worker dispatch). 3-replica HA: primary handles writes/pubsub, two
# followers maintain replication. Operator manages failover; Service
# routes to current primary so workers and publishers always hit it.
# Persistence is on so a restart doesn't drop queued jobs — RDB
# snapshot to a Ceph PVC every 15 minutes.
apiVersion: dragonflydb.io/v1alpha1
kind: Dragonfly
metadata:
  name: hedgehog-queue
spec:
  replicas: 3
  authentication:
    passwordFromSecret:
      name: hedgehog-queue-secrets
      key: password
  args:
    - --proactor_threads=2
    - --default_lua_flags=allow-undeclared-keys
    # Static snapshot filename (no {timestamp} macro) so each cron snapshot
    # OVERWRITES the previous one. The dbfilename default is `dump-{timestamp}`,
    # which writes a new timestamped file every run and never prunes — that
    # accumulated 6400+ files and filled the 20Gi PVC, wedging snapshots
    # (No space left) and crash-looping replicas. Overwrite keeps exactly one.
    - --dbfilename=dump
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 1Gi
  snapshot:
    cron: "*/15 * * * *"
    persistentVolumeClaimSpec:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 20Gi
      storageClassName: ceph-block
