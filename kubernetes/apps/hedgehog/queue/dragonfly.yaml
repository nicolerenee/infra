---
# Dragonfly instance used as a job queue (pub/sub + streams/lists for
# worker dispatch). 3-replica HA: primary handles writes/pubsub, two
# followers maintain replication. Operator manages failover; Service
# routes to current primary so workers and publishers always hit it.
# Persistence is on so a restart doesn't drop queued jobs — RDB
# snapshot to a Ceph PVC every 15 minutes.
apiVersion: dragonflydb.io/v1alpha1
kind: Dragonfly
metadata:
  name: hedgehog-queue
spec:
  replicas: 3
  # Pin the Dragonfly version: the operator's default image bumped to v1.39.0,
  # which fails to load v1.37-written RDB snapshots ("Quicklist integrity check
  # failed"), crash-looping the primary. Stay on v1.37.0 until a snapshot-safe
  # upgrade path is validated.
  image: docker.dragonflydb.io/dragonflydb/dragonfly:v1.37.0
  authentication:
    passwordFromSecret:
      name: hedgehog-queue-secrets
      key: password
  args:
    - --proactor_threads=2
    - --default_lua_flags=allow-undeclared-keys
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 1Gi
  snapshot:
    cron: "*/15 * * * *"
    persistentVolumeClaimSpec:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 20Gi
      storageClassName: ceph-block
