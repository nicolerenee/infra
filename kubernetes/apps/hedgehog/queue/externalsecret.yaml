---
# Password Secret consumed by the Dragonfly operator's authentication
# field. Pulled from the existing `hedgehog` 1P item (add a
# HEDGEHOG_QUEUE_PASSWORD field there before this reconciles).
# yaml-language-server: $schema=https://k8s-schemas.freckle.systems/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hedgehog-queue-secrets
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: op-cluster-vault
  target:
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        password: "{{ .HEDGEHOG_QUEUE_PASSWORD }}"
  dataFrom:
    - extract:
        key: hedgehog
