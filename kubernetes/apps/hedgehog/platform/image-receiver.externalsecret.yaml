---
# HMAC token shared between the hedgehog publish workflow and the
# notification-controller. The workflow signs each POST body with this
# token; Flux verifies the X-Signature header before annotating the
# ImageRepository.
# yaml-language-server: $schema=https://k8s-schemas.freckle.systems/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: flux-receiver-hedgehog-token
  namespace: hedgehog
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: op-cluster-vault
  data:
    - secretKey: token
      remoteRef:
        key: flux-receiver-hedgehog
        property: token
