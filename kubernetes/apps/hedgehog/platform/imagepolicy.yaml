---
# Selects the latest hedgehog manifests tag matching `main-<unix-ts>-<sha>`.
# Extracts the timestamp and picks numerically highest (= most recent build).
#
# When the hedgehog repo cuts semver releases (v0.x.y), add a second policy
# beside this one with `policy.semver` and decide which channel the
# OCIRepository tracks (main builds vs releases).
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: hedgehog
spec:
  imageRepositoryRef:
    name: hedgehog
  filterTags:
    pattern: '^main-(?P<ts>[0-9]{8}T[0-9]{6}Z)-[a-f0-9]+$'
    extract: '$ts'
  policy:
    # Fixed-width ISO 8601 compact UTC (YYYYMMDDTHHMMSSZ) is lex-sortable —
    # alphabetical ascending = chronological. Latest = highest.
    alphabetical:
      order: asc
