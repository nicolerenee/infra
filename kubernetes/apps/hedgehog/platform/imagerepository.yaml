---
# Scans the hedgehog manifests OCI registry on a schedule. Lives in the
# `hedgehog` namespace so it can use the same ghcr-login-secret as the
# OCIRepository and workload image pulls.
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImageRepository
metadata:
  name: hedgehog
spec:
  image: ghcr.io/freckleapps/hedgehog-manifests
  interval: 5m
  secretRef:
    name: ghcr-login-secret
  # Allow the ImagePolicy in flux-system to reference this ImageRepository
  # cross-namespace. Flux requires explicit opt-in via accessFrom ACL.
  accessFrom:
    namespaceSelectors:
      - matchLabels:
          kubernetes.io/metadata.name: flux-system
