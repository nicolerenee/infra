---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: hedgehog-db
spec:
  # 3-instance HA: tolerates a single instance loss without breaking
  # writes (minSyncReplicas: 1 needs at least one healthy standby to
  # ack writes, which a 2-instance cluster can't guarantee).
  instances: 3
  # CNPG "standard" image — bundles pgvector, PGAudit, Failover Slots, locales, JIT.
  imageName: ghcr.io/cloudnative-pg/postgresql:18.3-standard-trixie@sha256:9f9f53c9e07e5b2924945e6eaeb9168f7e856786d221839866ac85ccd703b3ba
  primaryUpdateStrategy: unsupervised
  primaryUpdateMethod: switchover
  storage:
    size: 20Gi
    storageClass: ceph-block
  superuserSecret:
    name: hedgehog-db-secrets
  enableSuperuserAccess: true
  postgresql:
    parameters:
      max_connections: "200"
      shared_buffers: 256MB
  nodeMaintenanceWindow:
    inProgress: false
    reusePVC: true
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      memory: 2Gi
  monitoring:
    enablePodMonitor: true

  managed:
    roles:
      - name: hedgehog
        ensure: present
        login: true
        passwordSecret:
          name: hedgehog-app-db-role

  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: ceph-store
        # Bump the version suffix when recovering from a prior cluster.
        serverName: hedgehog-db-v1

  # When recovering from a prior cluster, uncomment and set source/serverName
  # to the previous cluster's serverName.
  # bootstrap:
  #   recovery:
  #     source: &previousCluster hedgehog-db-v0
  # externalClusters:
  #   - name: *previousCluster
  #     plugin:
  #       name: barman-cloud.cloudnative-pg.io
  #       parameters:
  #         barmanObjectName: ceph-store
  #         serverName: *previousCluster
---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: hedgehog-db-backup
spec:
  # CNPG schedule is a 6-field cron, SECONDS-FIRST (sec min hour dom mon dow).
  # A 5-field "0 0 * * *" is read as every-hour and silently produces 24x the
  # base backups. This is every 6h (00/06/12/18:00); PITR granularity comes from
  # WAL archiving, so base-backup cadence only trades restore speed vs. storage.
  schedule: "0 0 */6 * * *"
  backupOwnerReference: self
  cluster:
    name: hedgehog-db
  target: prefer-standby
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
