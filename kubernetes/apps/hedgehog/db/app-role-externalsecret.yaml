---
# Password secret consumed by the CNPG `managed.roles` block on the Cluster.
# CNPG expects `username` and `password` keys; the 1P item uses screaming-case
# field names to match the convention in `hedgehog-db`.
# yaml-language-server: $schema=https://k8s-schemas.freckle.systems/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hedgehog-app-db-role
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: op-cluster-vault
  target:
    creationPolicy: Owner
    template:
      engineVersion: v2
      metadata:
        labels:
          cnpg.io/reload: "true"
      data:
        username: "{{ .HEDGEHOG_DB_USER }}"
        password: "{{ .HEDGEHOG_DB_PASS }}"
  dataFrom:
    - extract:
        key: hedgehog
