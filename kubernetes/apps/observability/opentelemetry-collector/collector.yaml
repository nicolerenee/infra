---
# Per-node DaemonSet collector. Apps point at otel-collector-collector.observability.svc:4317;
# the Service uses internalTrafficPolicy: Local so traffic stays on the same node when possible.
#
# Pipeline:
#   receivers: otlp/grpc:4317, otlp/http:4318
#   processors:
#     - memory_limiter: prevent runaway
#     - k8sattributes: enrich every span with k8s.namespace.name, k8s.pod.name,
#                      k8s.node.name, k8s.deployment.name, k8s.container.name etc.
#     - resource: stamp the cluster name on every span
#     - batch: ship in batches
#   exporters:
#     - otlphttp/vtraces -> http://victoria-traces-server:10428/insert/opentelemetry/v1/traces
#       (swap to a different backend / fan out to multiple here)
#     - otlphttp/vmetrics -> http://vmsingle-vm:8428/opentelemetry/v1/metrics
apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: otel-collector
spec:
  mode: daemonset
  serviceAccount: otel-collector
  image: otel/opentelemetry-collector-contrib:0.156.0
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 512Mi
  env:
    - name: NODE_NAME
      valueFrom:
        fieldRef:
          fieldPath: spec.nodeName
  config:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      memory_limiter:
        check_interval: 1s
        limit_percentage: 80
        spike_limit_percentage: 20

      k8sattributes:
        auth_type: serviceAccount
        passthrough: false
        filter:
          node_from_env_var: NODE_NAME
        extract:
          metadata:
            - k8s.namespace.name
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.pod.start_time
            - k8s.deployment.name
            - k8s.statefulset.name
            - k8s.daemonset.name
            - k8s.job.name
            - k8s.cronjob.name
            - k8s.node.name
            - k8s.container.name
        pod_association:
          - sources:
              - from: resource_attribute
                name: k8s.pod.ip
          - sources:
              - from: resource_attribute
                name: k8s.pod.uid
          - sources:
              - from: connection

      resource:
        attributes:
          # ${CLUSTER_NAME} is substituted by Flux at apply time (from the
          # k8s-cluster-info ConfigMap via the KS post-build-variables label).
          # The OpenTelemetryCollector CRD strips runtime ${env:...} from
          # typed string fields, so we resolve the value before it hits the
          # operator.
          - key: cluster.name
            value: ${CLUSTER_NAME}
            action: upsert
          - key: k8s.cluster.name
            value: ${CLUSTER_NAME}
            action: upsert

      batch:
        send_batch_size: 1024
        timeout: 5s

    exporters:
      otlphttp/vtraces:
        traces_endpoint: http://victoria-traces-server.observability.svc.cluster.local:10428/insert/opentelemetry/v1/traces
        compression: gzip
        timeout: 10s
        retry_on_failure:
          enabled: true
          initial_interval: 1s
          max_interval: 30s
          max_elapsed_time: 300s
        sending_queue:
          enabled: true
          num_consumers: 4
          queue_size: 1000

      otlphttp/vmetrics:
        metrics_endpoint: http://vmsingle-vm.observability.svc.cluster.local:8428/opentelemetry/v1/metrics
        compression: gzip
        timeout: 10s
        retry_on_failure:
          enabled: true
          initial_interval: 1s
          max_interval: 30s
          max_elapsed_time: 300s
        sending_queue:
          enabled: true
          num_consumers: 4
          queue_size: 1000

    service:
      telemetry:
        metrics:
          # Collector >=0.123 removed `metrics.address`; use the readers form.
          readers:
            - pull:
                exporter:
                  prometheus:
                    host: 0.0.0.0
                    port: 8888
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, k8sattributes, resource, batch]
          exporters: [otlphttp/vtraces]
        metrics:
          receivers: [otlp]
          processors: [memory_limiter, k8sattributes, resource, batch]
          exporters: [otlphttp/vmetrics]
---
# ServiceAccount for the collector (referenced by spec.serviceAccount above).
# The operator creates one automatically when serviceAccount is unset, but we
# bind RBAC to a known name here for k8sattributes.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: otel-collector
---
# k8sattributes needs read access to enrich spans with pod/node/workload metadata.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: otel-collector-k8sattributes
rules:
  - apiGroups: [""]
    resources: ["pods", "namespaces", "nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["replicasets", "deployments", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["extensions"]
    resources: ["replicasets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: otel-collector-k8sattributes
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: otel-collector-k8sattributes
subjects:
  - kind: ServiceAccount
    name: otel-collector
    namespace: observability
---
# Service uses internalTrafficPolicy: Local so the cluster Service IP routes
# preferentially to the local node's collector pod (no cross-node hop for trace ingest).
# The operator chart auto-creates a Service named <collector>-collector but
# we override here to set internalTrafficPolicy.
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  labels:
    app.kubernetes.io/name: otel-collector
spec:
  type: ClusterIP
  internalTrafficPolicy: Local
  selector:
    app.kubernetes.io/component: opentelemetry-collector
    app.kubernetes.io/instance: observability.otel-collector
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
      protocol: TCP
    - name: otlp-http
      port: 4318
      targetPort: 4318
      protocol: TCP
