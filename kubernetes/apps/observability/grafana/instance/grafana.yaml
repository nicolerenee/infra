apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: grafana
  labels:
    dashboards: "grafana"
spec:
  config:
    auth:
      disable_login_form: "false"
    auth.generic_oauth:
      allow_assign_grafana_admin: "True"
      allow_sign_up: "True"
      api_url: https://freckle.id/api/oidc/userinfo
      auth_url: https://freckle.id/authorize
      client_id: $${AUTH_CLIENT_ID}
      client_secret: $${AUTH_CLIENT_SECRET}
      enabled: "True"
      groups_attribute_path: groups
      name: Freckle ID
      # pocket-id groups: grafana_admins → GrafanaAdmin (server admin,
      # not just org Admin), grafana_users → Editor, everyone else
      # → Viewer. Admin check first since first match wins.
      role_attribute_path: contains(groups[*], 'grafana_admins') && 'GrafanaAdmin' || contains(groups[*], 'grafana_users') && 'Editor' || 'Viewer'
      scopes: openid,profile,email,groups
      signout_redirect_url: https://freckle.id/api/oidc/end-session
      token_url: https://freckle.id/api/oidc/token
      use_pkce: "True"
    server:
      root_url: https://grafana.${CLUSTER_DOMAIN}

  deployment:
    metadata:
      annotations:
        # Restart grafana when the OIDC client_secret in `grafana-oauth`
        # rotates (now that the secret is tofu-managed and will rotate
        # on each pocket-id client recreate, not a one-and-done value).
        reloader.stakater.com/auto: "true"
    spec:
      template:
        spec:
          containers:
            - name: grafana
              env:
                - name: AUTH_CLIENT_ID
                  valueFrom:
                    secretKeyRef:
                      name: grafana-oauth
                      key: client-id
                - name: AUTH_CLIENT_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: grafana-oauth
                      key: client-secret
