---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mcp-victoriatraces
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: default
  driftDetection:
    mode: enabled
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      mcp-victoriatraces:
        containers:
          app:
            image:
              repository: ghcr.io/victoriametrics-community/mcp-victoriatraces
              tag: v1.5.0
            env:
              VT_INSTANCE_ENTRYPOINT: http://victoria-traces-server:10428
              MCP_SERVER_MODE: http
              MCP_LISTEN_ADDR: :8081
            probes:
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /mcp
                    port: 8081
                  initialDelaySeconds: 5
                  periodSeconds: 30
                  failureThreshold: 3
              readiness: *probe
              startup:
                enabled: false
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 512Mi

    service:
      app:
        controller: mcp-victoriatraces
        ports:
          http:
            port: &port 8081

    route:
      app:
        hostnames: ["{{ .Release.Name }}.${CLUSTER_DOMAIN}"]
        parentRefs:
          - name: tailnet
            namespace: gateway-system
        rules:
          - backendRefs:
              - identifier: app
                port: *port
