---
# yaml-language-server: $schema=https://k8s-schemas.freckle.systems/source.toolkit.fluxcd.io/ocirepository_v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: victoria-traces
spec:
  interval: 30m
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 0.1.7
  url: oci://ghcr.io/victoriametrics/helm-charts/victoria-traces-single
---
# yaml-language-server: $schema=https://k8s-schemas.freckle.systems/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-traces
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: victoria-traces
  driftDetection:
    mode: enabled
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    fullnameOverride: "victoria-traces"

    server:
      enabled: true
      retentionPeriod: 1
      persistentVolume:
        enabled: true
        accessModes:
          - ReadWriteOnce
        size: 10Gi
      vmServiceScrape:
        enabled: true

    dashboards:
      enabled: true
      grafanaOperator:
        enabled: true
