---
apiVersion: k8s.mariadb.com/v1alpha1
kind: User
metadata:
  name: snipeit
spec:
  mariaDbRef:
    name: mariadb-main
    namespace: db

  passwordSecretKeyRef:
    name: snipe-it-mariadb-secret
    key: password

  maxUserConnections: 20

  # Grant all privileges on the snipeit database to this user
  # This will be handled by the Grant resource
---
apiVersion: k8s.mariadb.com/v1alpha1
kind: Grant
metadata:
  name: snipeit
spec:
  mariaDbRef:
    name: mariadb-main
    namespace: db

  privileges:
    - "ALL PRIVILEGES"

  database: "snipeit"
  table: "*"

  username: snipeit

  grantOption: false
