---
# yaml-language-server: $schema=https://k8s-schemas.freckle.systems/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: snipe-it-mariadb
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: snipe-it-mariadb-secret
    template:
      engineVersion: v2
      data:
        password: "{{ .mariadb_password }}"
  dataFrom:
    - extract:
        key: snipe-it-mariadb-${CLUSTER_NAME}
