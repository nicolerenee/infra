---
# yaml-language-server: $schema=https://k8s-schemas.freckle.systems/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mariadb-operator
spec:
  interval: 1h
  dependsOn:
    - name: mariadb-operator-crds
  chart:
    spec:
      chart: mariadb-operator
      version: 26.3.0
      sourceRef:
        kind: HelmRepository
        name: mariadb-operator
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    # Deploy operator cluster-wide to manage MariaDB instances in any namespace
    clusterwide: true
    # Metrics for monitoring
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
