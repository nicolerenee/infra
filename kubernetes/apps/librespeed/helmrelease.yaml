---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: librespeed
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: default
  interval: 1h
  values:
    controllers:
      librespeed:
        containers:
          app:
            image:
              repository: ghcr.io/librespeed/speedtest
              tag: 6.1.0@sha256:b6b0890047e833158370d59ed5ef289b3e67a58f4a363cd37ef5c09d170d8543
            env:
              MODE: dual
              TITLE: "SpeedTest - ${CLUSTER_NAME}"
              TAGLINE: ""
              USE_NEW_DESIGN: "true"
              DISTANCE: mi
              DISABLE_IPINFO: "true"
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 128Mi
    defaultPodOptions:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
        runAsGroup: 0
    configMaps:
      servers:
        data:
          servers.json: |
            [
              {
                "name": "Fairy (Dallas, TX)",
                "server": "https://fairy-k8s01-speedtest.${TAILNET_DNS_NAME}/",
                "dlURL": "garbage.php",
                "ulURL": "empty.php",
                "pingURL": "empty.php",
                "getIpURL": "getIP.php"
              },
              {
                "name": "Atlantis (Denver, CO)",
                "server": "https://atlantis-k8s01-speedtest.${TAILNET_DNS_NAME}/",
                "dlURL": "garbage.php",
                "ulURL": "empty.php",
                "pingURL": "empty.php",
                "getIpURL": "getIP.php"
              },
              {
                "name": "Tortuga (Montreal, QC)",
                "server": "https://tortuga-k8s01-speedtest.${TAILNET_DNS_NAME}/",
                "dlURL": "garbage.php",
                "ulURL": "empty.php",
                "pingURL": "empty.php",
                "getIpURL": "getIP.php"
              }
            ]
    persistence:
      servers:
        type: configMap
        name: librespeed
        globalMounts:
          - path: /servers.json
            subPath: servers.json
            readOnly: true
    service:
      app:
        ports:
          http:
            port: 8080
    ingress:
      app:
        className: tailscale
        annotations:
          tailscale.com/proxy-group: ingress-proxy
          tailscale.com/tags: "tag:speedtest"
        hosts:
          - host: "${CLUSTER_NAME}-speedtest"
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: app
                  port: http
        tls:
          - hosts:
              - "${CLUSTER_NAME}-speedtest"
      global:
        className: tailscale
        annotations:
          tailscale.com/proxy-group: ingress-proxy
          tailscale.com/tags: "tag:speedtest"
        hosts:
          - host: speedtest
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: app
                  port: http
        tls:
          - hosts:
              - speedtest
