---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: envoy-gateway
spec:
  chartRef:
    kind: OCIRepository
    name: envoy-gateway
  driftDetection:
    ignore:
      - paths: [/spec/replicas]
  install:
    # The envoy-gateway chart bundles experimental-channel gateway-api
    # CRDs, but we install the standard channel via the gateway-api KS.
    # The standard-channel safe-upgrades ValidatingAdmissionPolicy then
    # blocks the chart's CRD upgrade. Skip CRDs in the chart entirely.
    crds: Skip
  upgrade:
    crds: Skip
  interval: 1h
  values:
    global:
      imageRegistry: mirror.gcr.io
    config:
      envoyGateway:
        extensionApis:
          enableEnvoyPatchPolicy: true
        provider:
          type: Kubernetes
          kubernetes:
            deploy:
              type: GatewayNamespace
