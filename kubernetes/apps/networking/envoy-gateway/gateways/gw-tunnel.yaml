---
# Cloudflare-tunneled gateway. cloudflared runs in-cluster and forwards
# inbound tunnel traffic to this gateway's ClusterIP. Uses the
# envoy-clusterip GatewayClass so the Service is ClusterIP-only — no
# LB IP allocated since we don't need an external IP.
# yaml-language-server: $schema=https://k8s-schemas.freckle.systems/gateway.networking.k8s.io/gateway_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  annotations:
    # external-dns reads this as the CNAME target for every HTTPRoute
    # attached to this Gateway. Without it, external-dns would publish
    # the ClusterIPs from .status.addresses, which Cloudflare's edge
    # can't reach. The cf-tun-gw bootstrap CNAME is owned by tofu and
    # resolves to the tunnel's UUID at cfargotunnel.com.
    external-dns.alpha.kubernetes.io/target: ${CLUSTER_NAME}-cf-tun-gw.freckle.systems
  labels:
    # external-dns-cloudflare-tunnel matches this label to discover
    # which HTTPRoutes to register DNS records for.
    gateway.freckle.systems/dns: cloudflare-tunnel
  name: tunnel
spec:
  gatewayClassName: envoy-clusterip
  infrastructure:
    annotations: {}
    labels: {}
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same
    - name: https
      protocol: HTTPS
      port: 443
      allowedRoutes:
        namespaces:
          from: All
      tls:
        certificateRefs:
          - kind: Secret
            name: media-tls
          - kind: Secret
            name: cluster-svcs-tls
          - kind: Secret
            name: cluster-systems-tls
