---
# cloudflared local config. Catch-all routes everything to the envoy
# tunnel gateway in-cluster; per-hostname routing happens in envoy via
# HTTPRoute resources.
#
# Strict TLS verify on the cloudflared → envoy hop. The envoy tunnel
# gateway presents cluster-systems-tls (SAN covers
# ${CLUSTER_NAME}-cf-tun-gw.freckle.systems). Substituted at apply time
# via Flux postBuild variables.
ingress:
  - service: https://tunnel.gateway-system.svc.cluster.local:443
    originRequest:
      originServerName: ${CLUSTER_NAME}-cf-tun-gw.freckle.systems
      http2Origin: true
