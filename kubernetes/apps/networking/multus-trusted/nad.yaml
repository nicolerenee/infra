---
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: multus-trusted
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "name": "multus-trusted",
      "plugins": [
        {
          "type": "macvlan",
          "master": "bond0.300",
          "mode": "bridge",
          "ipam": {
            "type": "static"
          }
        },
        {
          "type": "tuning",
          "capabilities": { "mac": true },
          "sysctl": {
            "net.ipv6.conf.IFNAME.accept_ra_rt_info_max_plen": "64"
          }
        }
      ]
    }
