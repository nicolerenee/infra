---
# yaml-language-server: $schema=https://k8s-schemas.freckle.systems/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: external-dns-cloudflare-token
spec:
  secretStoreRef:
    kind: SecretStore
    name: gcp-sm
  data:
    - secretKey: api_token
      remoteRef:
        key: ${CLUSTER_NAME}-external-dns-cloudflare-token
