apiVersion: tailscale.com/v1alpha1
kind: ProxyClass
metadata:
  name: tailscale-tun
spec:
  metrics:
    enable: true
    serviceMonitor:
      enable: true
  statefulSet:
    pod:
      nodeSelector:
        beta.kubernetes.io/os: "linux"
      tailscaleContainer:
        resources:
          limits:
            devic.es/tun: "1"
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
            add:
              - NET_ADMIN
              - NET_RAW
