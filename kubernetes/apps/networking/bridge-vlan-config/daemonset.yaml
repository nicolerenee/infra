---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: bridge-vlan-config
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: bridge-vlan-config
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bridge-vlan-config
    spec:
      hostNetwork: true
      hostPID: true
      nodeSelector:
        infra.freckle.systems/vlan-bridge: "true"
      tolerations:
        - operator: Exists
      containers:
        - name: vlan-config
          image: alpine:3.23
          securityContext:
            privileged: true
          command:
            - /bin/sh
            - -c
            - |
              apk add --no-cache iproute2 bridge-utils

              # Configure VLAN membership on bridge ports
              # bridge1 VLAN filtering is enabled via Talos BridgeConfig patch
              apply_vlans() {
                # eno3: PVID 1 untagged for native traffic, VLAN 300 tagged for pods
                bridge vlan add dev eno3 vid 1 pvid untagged master
                bridge vlan add dev eno3 vid 300 master

                # bridge1 self: participate in VLAN 1
                bridge vlan add dev bridge1 vid 1 pvid untagged self
              }

              apply_vlans
              echo "Bridge VLAN config applied:"
              bridge vlan show

              # Re-apply periodically in case of reset
              while true; do
                sleep 300
                if ! bridge vlan show dev eno3 | grep -q "300"; then
                  echo "Re-applying VLAN config..."
                  apply_vlans
                fi
              done
          volumeMounts:
            - name: sys
              mountPath: /sys
      volumes:
        - name: sys
          hostPath:
            path: /sys
