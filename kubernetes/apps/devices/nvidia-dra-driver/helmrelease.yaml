---
# yaml-language-server: $schema=https://k8s-schemas.freckle.systems/source.toolkit.fluxcd.io/helmrepository_v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: nvidia
spec:
  interval: 1h
  url: https://helm.ngc.nvidia.com/nvidia
---
# yaml-language-server: $schema=https://k8s-schemas.freckle.systems/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nvidia-dra-driver-gpu
spec:
  chart:
    spec:
      chart: nvidia-dra-driver-gpu
      version: 25.12.0
      sourceRef:
        kind: HelmRepository
        name: nvidia
  interval: 1h
  install:
    crds: CreateReplace
    remediation:
      retries: -1
  upgrade:
    crds: CreateReplace
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    # Talos mounts drivers at /usr/local/glibc/usr/lib
    nvidiaDriverRoot: /
    gpuResourcesEnabledOverride: true
    kubeletPlugin:
      nodeSelector:
        nvidia.com/dra-kubelet-plugin: "true"
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
