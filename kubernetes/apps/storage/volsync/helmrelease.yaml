---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: volsync
spec:
  interval: 1h
  chart:
    spec:
      chart: volsync
      version: 0.15.0
      sourceRef:
        kind: HelmRepository
        name: backube
        namespace: volsync-system
  install:
    remediation:
      retries: -1
    crds: CreateReplace
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
    crds: CreateReplace
  driftDetection:
    mode: enabled
  values:
    manageCRDs: true
    metrics:
      # Metrics endpoint is cluster-internal only (no Ingress). Disable
      # kube-rbac-proxy auth so the volsync ServiceMonitor (which doesn't
      # plumb a bearer token) can be scraped by vmagent.
      disableAuth: true
    service:
      ipFamilyPolicy: PreferDualStack
      ipFamilies:
        - IPv4
        - IPv6
