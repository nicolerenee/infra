---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: external-secrets
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/instance: external-secrets
      app.kubernetes.io/name: external-secrets
  egress:
    - toEntities:
        - kube-apiserver
    - toEndpoints:
        - matchLabels:
            app: onepassword-connect
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    # GCP Secret Manager + STS (for Workload Identity Federation token
    # exchange). DNS resolution lands on the cluster-wide DNS interception
    # CCNP, which authorizes FQDN-based egress here.
    - toFQDNs:
        - matchPattern: "*.googleapis.com"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
  ingress:
    - fromEndpoints:
        - matchLabels:
            app.kubernetes.io/component: monitoring
            app.kubernetes.io/name: vmagent
            app.kubernetes.io/instance: vm
            k8s:io.kubernetes.pod.namespace: observability
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
          rules:
            http:
              - method: "GET"
                path: "/metrics"
