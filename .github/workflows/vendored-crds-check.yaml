---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Vendored CRDs Check

on:
  pull_request:
    branches: ["main"]
    paths:
      - "kubernetes/apps/networking/gateway-api/**"
      - "scripts/vendor-gateway-api-crds.sh"
      - ".github/workflows/vendored-crds-check.yaml"

jobs:
  gateway-api:
    name: gateway-api matches pinned tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Verify vendored CRDs match the pinned tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./scripts/vendor-gateway-api-crds.sh --check
