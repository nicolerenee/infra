---
name: Schemas Extract

on:
  workflow_call:
    inputs:
      cluster:
        required: true
        type: string
      runner:
        description: "The runner to perform the schema extraction on"
        required: true
        type: string

env:
  UV_SYSTEM_PYTHON: "1"

jobs:
  extract:
    name: Schemas - Extract
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install kubectl
        uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d # v5.1.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: false

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: 3.14.x

      - name: Install Python Dependencies
        run: uv pip install pyyaml

      - name: Run crd-extractor
        run: |
          curl -fsSLO https://raw.githubusercontent.com/datreeio/CRDs-catalog/refs/heads/main/Utilities/openapi2jsonschema.py
          curl -fsSL https://raw.githubusercontent.com/datreeio/CRDs-catalog/refs/heads/main/Utilities/crd-extractor.sh | bash

      - name: Upload Schemas Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: schemas-${{ inputs.cluster }}
          path: /home/runner/.datree/crdSchemas
          retention-days: 1
