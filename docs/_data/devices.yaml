# Device inventory — single source of truth for docs/reference/inventory.md
#
# Schema:
#   sites:   map of site code → display name
#   racks:   map of "site-rack" → display label
#   devices: list of device entries
#
# Device fields:
#   name       (required)  canonical hostname
#   site       (required)  site code (must exist in sites map)
#   rack       (optional)  rack ID within the site (must exist in racks map as "site-rack")
#   role       (required)  short human-readable role
#   model      (required)  model name
#   model_doc  (optional)  relative path from docs/reference/ to the model's doc page
#   status     (optional)  active (default) | planned | decommissioned
#   asset_tag  (optional)  asset tag ID — when set, device name links to asset tag service

sites:
  fairy: Fairy
  atlantis: Atlantis

racks:
  fairy-mdf:
    label: MDF
    anchor: mdf
  fairy-r02:
    label: r02
    anchor: r02

