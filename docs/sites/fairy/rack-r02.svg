  <!-- ============================================================ -->

  <!-- U32: fairy-r02-tor01 Netgear XS724EMv2 (1U) -->
  <rect x="352" y="41" width="256" height="24" rx="3" fill="#d97706"/>
  <text x="480" y="53" font-size="10" fill="white" text-anchor="middle">fairy-r02-tor01 (XS724EMv2)</text>

  <!-- U31: fairy-r02-msw01 Cisco C1300-24T-4G (1U) -->
  <rect x="352" y="67" width="256" height="24" rx="3" fill="#d97706"/>
  <text x="480" y="79" font-size="10" fill="white" text-anchor="middle">fairy-r02-msw01 (C1300-24T-4G)</text>

  <!-- U30-27: Empty (4U) -->

  <!-- U26-25: AC Infinity exhaust (2U) -->
  <rect x="352" y="197" width="256" height="50" rx="3" fill="#94a3b8"/>
  <text x="480" y="222" font-size="10" fill="white" text-anchor="middle">AC Infinity Exhaust</text>

  <!-- U24-23: Empty (2U) -->

  <!-- U22-21: AC Infinity exhaust (2U) -->
  <rect x="352" y="301" width="256" height="50" rx="3" fill="#94a3b8"/>
  <text x="480" y="326" font-size="10" fill="white" text-anchor="middle">AC Infinity Exhaust</text>

  <!-- U20-19: fairy-r02-cn06 rear (2U) -->
  <rect x="352" y="353" width="256" height="50" rx="3" fill="#3b82f6"/>
  <text x="480" y="378" font-size="11" fill="white" text-anchor="middle">fairy-r02-cn06</text>

  <!-- U18-17: fairy-r02-cn05 rear (2U) -->
  <rect x="352" y="405" width="256" height="50" rx="3" fill="#3b82f6"/>
  <text x="480" y="430" font-size="11" fill="white" text-anchor="middle">fairy-r02-cn05</text>

  <!-- U16-15: fairy-r02-cn04 rear (2U) -->
  <rect x="352" y="457" width="256" height="50" rx="3" fill="#3b82f6"/>
  <text x="480" y="482" font-size="11" fill="white" text-anchor="middle">fairy-r02-cn04</text>

  <!-- U14-13: fairy-r02-cn03 rear (2U) -->
  <rect x="352" y="509" width="256" height="50" rx="3" fill="#3b82f6"/>
  <text x="480" y="534" font-size="11" fill="white" text-anchor="middle">fairy-r02-cn03</text>

  <!-- U12-11: fairy-r02-cn02 rear (2U) -->
  <rect x="352" y="561" width="256" height="50" rx="3" fill="#3b82f6"/>
  <text x="480" y="586" font-size="11" fill="white" text-anchor="middle">fairy-r02-cn02</text>

  <!-- U10-9: fairy-r02-cn01 rear (2U) -->
  <rect x="352" y="613" width="256" height="50" rx="3" fill="#3b82f6"/>
  <text x="480" y="638" font-size="11" fill="white" text-anchor="middle">fairy-r02-cn01</text>

  <!-- U8-7: Empty (2U) -->

  <!-- U6-5: fairy-store01 rear (2U) -->
  <rect x="352" y="717" width="256" height="50" rx="3" fill="#059669"/>
  <text x="480" y="736" font-size="11" fill="white" text-anchor="middle">fairy-store01</text>
  <text x="480" y="750" font-size="8" fill="rgba(255,255,255,0.75)" text-anchor="middle">TrueNAS Mini-R</text>

  <!-- U4-3: fairy-nvr01 rear (2U) -->
  <rect x="352" y="769" width="256" height="50" rx="3" fill="#64748b"/>
  <text x="480" y="788" font-size="11" fill="white" text-anchor="middle">fairy-nvr01</text>
  <text x="480" y="802" font-size="8" fill="rgba(255,255,255,0.75)" text-anchor="middle">UNVR Pro</text>

  <!-- U2-1: fairy-r02-ups01 rear (2U) -->
  <rect x="352" y="821" width="256" height="50" rx="3" fill="#b45309"/>
  <text x="480" y="840" font-size="11" fill="white" text-anchor="middle">fairy-r02-ups01</text>
  <text x="480" y="854" font-size="8" fill="rgba(255,255,255,0.75)" text-anchor="middle">UPS</text>

  <!-- ============================================================ -->
  <!-- 0U PDUs (mounted on side rails of rear)                       -->
  <!-- ============================================================ -->

  <!-- Side rail outlines -->
  <rect x="333" y="40" width="16" height="832" fill="none" class="side-rail" stroke-width="1" rx="2"/>
  <rect x="611" y="40" width="16" height="832" fill="none" class="side-rail" stroke-width="1" rx="2"/>

  <!-- Side rail labels -->
  <text x="341" y="34" font-size="7" class="side-rail-label" text-anchor="middle">0U</text>
  <text x="619" y="34" font-size="7" class="side-rail-label" text-anchor="middle">0U</text>

  <!-- fairy-r02-pdu03: left side, ~U29-U20 -->
  <rect x="334" y="119" width="14" height="258" rx="2" fill="#b45309"/>
  <text x="341" y="248" font-size="8" fill="white" text-anchor="middle" transform="rotate(-90, 343, 248)">fairy-r02-pdu03</text>

  <!-- fairy-r02-pdu04: right side, ~U29-U20 -->
  <rect x="612" y="119" width="14" height="258" rx="2" fill="#b45309"/>
  <text x="619" y="248" font-size="8" fill="white" text-anchor="middle" transform="rotate(-90, 621, 248)">fairy-r02-pdu04</text>

  <!-- fairy-r02-pdu01: left side, ~U16-U7 -->
