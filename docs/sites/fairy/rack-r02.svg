<!--
  Rack r02 Diagram — Fairy Site

  Grid system:
    U_HEIGHT = 26px
    RACK_TOP = 40px
    y(U) = RACK_TOP + (32 - U) * U_HEIGHT

  Device rect positioning:
    x: 42 (front) or 352 (back), width: 256
    y: y(top_U) + 1
    height: num_U * 26 - 2

  To add/move a device, calculate y(U) and update the rect + text positions.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 930" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif">
  <style>
    .bg { fill: white; }
    .title { fill: #1f2937; }
    .rack-outline { stroke: #d1d5db; fill: url(#ugrid); }
    .grid-line { stroke: #e5e7eb; }
    .u-label { fill: #9ca3af; }
    .blank { fill: #f3f4f6; }
    .blank-stroke { fill: #f3f4f6; stroke: #d1d5db; }
    .blank-text { fill: #9ca3af; }
    .blank-subtext { fill: #b0b8c4; }
    .passthrough { fill: #e2e8f0; }
    .passthrough-text { fill: #64748b; }
    .side-rail { stroke: #d1d5db; }
    .side-rail-label { fill: #9ca3af; }
    .legend-swatch-blank { fill: #f3f4f6; stroke: #d1d5db; }
    .legend-text { fill: #6b7280; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #1e1e2e; }
      .title { fill: #cdd6f4; }
      .rack-outline { stroke: #585b70; }
      .grid-line { stroke: #45475a; }
      .u-label { fill: #a6adc8; }
      .blank { fill: #313244; }
      .blank-stroke { fill: #313244; stroke: #585b70; }
      .blank-text { fill: #a6adc8; }
      .blank-subtext { fill: #7f849c; }
      .passthrough { fill: #45475a; }
      .passthrough-text { fill: #a6adc8; }
      .side-rail { stroke: #585b70; }
      .side-rail-label { fill: #a6adc8; }
      .legend-swatch-blank { fill: #313244; stroke: #585b70; }
      .legend-text { fill: #a6adc8; }
    }
  </style>
  <defs>
    <pattern id="ugrid" x="0" y="40" width="10" height="26" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="10" y2="0" class="grid-line" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="660" height="930" class="bg" rx="4"/>

  <!-- Titles -->
  <text x="170" y="25" font-size="15" font-weight="600" class="title" text-anchor="middle">Front</text>
  <text x="480" y="25" font-size="15" font-weight="600" class="title" text-anchor="middle">Rear</text>

  <!-- Rack outlines with U grid -->
  <rect x="40" y="40" width="260" height="832" class="rack-outline" stroke-width="1.5" rx="2"/>
  <rect x="350" y="40" width="260" height="832" class="rack-outline" stroke-width="1.5" rx="2"/>

  <!-- U Labels -->
  <g font-size="9" class="u-label" text-anchor="end">
    <text x="36" y="53">32</text>
    <text x="36" y="79">31</text>
    <text x="36" y="105">30</text>
    <text x="36" y="131">29</text>
    <text x="36" y="157">28</text>
    <text x="36" y="183">27</text>
    <text x="36" y="209">26</text>
    <text x="36" y="235">25</text>
    <text x="36" y="261">24</text>
    <text x="36" y="287">23</text>
    <text x="36" y="313">22</text>
    <text x="36" y="339">21</text>
    <text x="36" y="365">20</text>
    <text x="36" y="391">19</text>
    <text x="36" y="417">18</text>
    <text x="36" y="443">17</text>
    <text x="36" y="469">16</text>
    <text x="36" y="495">15</text>
    <text x="36" y="521">14</text>
    <text x="36" y="547">13</text>
    <text x="36" y="573">12</text>
    <text x="36" y="599">11</text>
    <text x="36" y="625">10</text>
    <text x="36" y="651">9</text>
    <text x="36" y="677">8</text>
    <text x="36" y="703">7</text>
    <text x="36" y="729">6</text>
    <text x="36" y="755">5</text>
    <text x="36" y="781">4</text>
    <text x="36" y="807">3</text>
    <text x="36" y="833">2</text>
    <text x="36" y="859">1</text>
  </g>

  <!-- ============================================================ -->
  <!-- FRONT VIEW                                                    -->
  <!-- ============================================================ -->

  <!-- U32-28: Blanking Panels (5U) -->
  <rect x="42" y="41" width="256" height="128" rx="3" class="blank"/>
  <text x="170" y="105" font-size="10" class="blank-text" text-anchor="middle">Blanking Panels</text>

  <!-- U27-25: Future dgx05-08 (3U) -->
  <rect x="42" y="171" width="256" height="76" rx="3" class="blank-stroke" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="170" y="203" font-size="10" class="blank-text" text-anchor="middle">Future: fairy-r02-dgx05–08</text>
  <text x="170" y="217" font-size="8" class="blank-subtext" text-anchor="middle">Blanking Panels</text>

  <!-- U24: fairy-r02-fsw01 CRS804-4DDQ (1U) -->
  <rect x="42" y="249" width="256" height="24" rx="3" fill="#7c3aed"/>
  <text x="170" y="261" font-size="10" fill="white" text-anchor="middle">fairy-r02-fsw01 (CRS804-4DDQ)</text>

  <!-- U23-21: DGX trays (each tray is ~1.33U)
       dgx01/02 tray:  all of U21 + bottom 1/3 of U22
       dgx03/blank:    top 2/3 of U22 + bottom 2/3 of U23
       cable passthrough: top 1/3 of U23 -->
  <rect x="42" y="275" width="256" height="8" rx="2" class="passthrough"/>
  <text x="170" y="280" font-size="6" class="passthrough-text" text-anchor="middle">passthrough</text>

  <rect x="42" y="284" width="256" height="32" rx="3" fill="#a78bfa"/>
  <text x="170" y="300" font-size="10" fill="white" text-anchor="middle">fairy-r02-dgx03 / blank tray</text>

  <rect x="42" y="317" width="256" height="32" rx="3" fill="#a78bfa"/>
  <text x="170" y="333" font-size="10" fill="white" text-anchor="middle">fairy-r02-dgx01/02 tray</text>

  <!-- U20-19: fairy-r02-cn06 (2U) -->
  <rect x="42" y="353" width="256" height="50" rx="3" fill="#3b82f6"/>
  <text x="170" y="378" font-size="11" fill="white" text-anchor="middle">fairy-r02-cn06</text>

  <!-- U18-17: fairy-r02-cn05 (2U) -->
  <rect x="42" y="405" width="256" height="50" rx="3" fill="#3b82f6"/>
  <text x="170" y="430" font-size="11" fill="white" text-anchor="middle">fairy-r02-cn05</text>

  <!-- U16-15: fairy-r02-cn04 (2U) -->
  <rect x="42" y="457" width="256" height="50" rx="3" fill="#3b82f6"/>
  <text x="170" y="482" font-size="11" fill="white" text-anchor="middle">fairy-r02-cn04</text>

  <!-- U14-13: fairy-r02-cn03 (2U) -->
  <rect x="42" y="509" width="256" height="50" rx="3" fill="#3b82f6"/>
  <text x="170" y="534" font-size="11" fill="white" text-anchor="middle">fairy-r02-cn03</text>

  <!-- U12-11: fairy-r02-cn02 (2U) -->
  <rect x="42" y="561" width="256" height="50" rx="3" fill="#3b82f6"/>
  <text x="170" y="586" font-size="11" fill="white" text-anchor="middle">fairy-r02-cn02</text>

  <!-- U10-9: fairy-r02-cn01 (2U) -->
  <rect x="42" y="613" width="256" height="50" rx="3" fill="#3b82f6"/>
  <text x="170" y="638" font-size="11" fill="white" text-anchor="middle">fairy-r02-cn01</text>

  <!-- U8-7: Reserved for future storage (2U) -->
  <rect x="42" y="665" width="256" height="50" rx="3" class="blank-stroke" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="170" y="685" font-size="10" class="blank-text" text-anchor="middle">Reserved</text>
  <text x="170" y="699" font-size="8" class="blank-subtext" text-anchor="middle">Future storage</text>

  <!-- U6-5: fairy-store01 TrueNAS Mini-R (2U) -->
  <rect x="42" y="717" width="256" height="50" rx="3" fill="#059669"/>
  <text x="170" y="736" font-size="11" fill="white" text-anchor="middle">fairy-store01</text>
  <text x="170" y="750" font-size="8" fill="rgba(255,255,255,0.75)" text-anchor="middle">TrueNAS Mini-R</text>

  <!-- U4-3: fairy-nvr01 UNVR Pro (2U) -->
  <rect x="42" y="769" width="256" height="50" rx="3" fill="#64748b"/>
  <text x="170" y="788" font-size="11" fill="white" text-anchor="middle">fairy-nvr01</text>
  <text x="170" y="802" font-size="8" fill="rgba(255,255,255,0.75)" text-anchor="middle">UNVR Pro</text>

  <!-- U2-1: fairy-r02-ups01 (2U) -->
  <rect x="42" y="821" width="256" height="50" rx="3" fill="#b45309"/>
  <text x="170" y="840" font-size="11" fill="white" text-anchor="middle">fairy-r02-ups01</text>
  <text x="170" y="854" font-size="8" fill="rgba(255,255,255,0.75)" text-anchor="middle">UPS</text>

  <!-- ============================================================ -->
