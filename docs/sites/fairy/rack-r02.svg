  <g transform="translate(40, 888)">
    <rect x="0" y="0" width="12" height="12" rx="2" fill="#3b82f6"/>
    <text x="16" y="10" font-size="9" class="legend-text">Compute</text>

    <rect x="80" y="0" width="12" height="12" rx="2" fill="#7c3aed"/>
