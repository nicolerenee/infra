---
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"

vars:
  GCP_PROJECT: freckle-secrets-84392

tasks:
  list:
    desc: "List secrets in the project with their cluster/namespace labels."
    cmds:
      - gcloud secrets list --project={{.GCP_PROJECT}} --format="table(name,labels.cluster,labels.namespace,createTime)"

  gen:
    desc: "Generate a random alphanumeric value (default 48 chars) and push a new version of NAME."
    summary: |
      Generates a cryptographically-random alphanumeric string and pushes
      it as a new version of the named secret. The value is streamed
      directly to gcloud — never written to disk.

      Required:
        NAME=<secret-id>
      Optional:
        LENGTH=<int>   default 48
    requires:
      vars: [NAME]
    vars:
      LENGTH: '{{.LENGTH | default "48"}}'
    cmds:
      - |
        VALUE=$(LC_ALL=C tr -dc 'A-Za-z0-9' < /dev/urandom | head -c {{.LENGTH}})
        printf "%s" "$VALUE" | gcloud secrets versions add {{.NAME}} \
          --project={{.GCP_PROJECT}} --data-file=-
        echo "✔ Pushed {{.LENGTH}}-char alphanumeric value to {{.NAME}}"

  set:
    desc: "Read a value from stdin and push a new version of NAME. Use heredoc or pipe to provide content."
    summary: |
      Reads value bytes from stdin and pushes them as a new version of the
      named secret. Suitable for multi-line/binary content.

      Examples:
        task secrets:set NAME=my-secret <<< "myvalue"
        task secrets:set NAME=my-secret < /path/to/value
        printf 'KEY=value\n' | task secrets:set NAME=my-secret
    requires:
      vars: [NAME]
    cmds:
      - gcloud secrets versions add {{.NAME}} --project={{.GCP_PROJECT}} --data-file=-

  get:
    desc: "Fetch the latest version of NAME to stdout."
    requires:
      vars: [NAME]
    cmds:
      - gcloud secrets versions access latest --secret={{.NAME}} --project={{.GCP_PROJECT}}

  versions:
    desc: "List versions of NAME."
    requires:
      vars: [NAME]
    cmds:
      - gcloud secrets versions list {{.NAME}} --project={{.GCP_PROJECT}}
