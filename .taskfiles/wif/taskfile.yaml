---
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"

vars:
  IAC_PROJECT: freckle-iac-438712
  OIDC_BUCKET: freckle-iac-438712-oidc

tasks:
  bootstrap:
    desc: "Upload a cluster's JWKS + OIDC discovery doc to the WIF hosting bucket. Run before adding the cluster to tofu."
    summary: |
      Pulls /openid/v1/jwks and /.well-known/openid-configuration from the
      named cluster, rewrites the discovery doc's issuer/jwks_uri to point
      at the GCS-hosted path, then uploads both to the OIDC bucket so the
      WIF provider's --issuer-uri resolves.

      Required vars:
        CLUSTER  — k8s context name (e.g., fairy-k8s01)
    requires:
      vars: [CLUSTER]
    vars:
      CONTEXT: "admin@{{.CLUSTER}}"
      ISSUER_URI: "https://storage.googleapis.com/{{.OIDC_BUCKET}}/{{.CLUSTER}}"
      TMP: "/tmp/wif-{{.CLUSTER}}"
    cmds:
      - mkdir -p {{.TMP}}
      - kubectl --context={{.CONTEXT}} get --raw /openid/v1/jwks > {{.TMP}}/jwks.json
      - |
        kubectl --context={{.CONTEXT}} get --raw /.well-known/openid-configuration \
          | jq '.issuer = "{{.ISSUER_URI}}" | .jwks_uri = "{{.ISSUER_URI}}/openid/v1/jwks"' \
          > {{.TMP}}/openid-configuration.json
      - gcloud storage cp {{.TMP}}/jwks.json gs://{{.OIDC_BUCKET}}/{{.CLUSTER}}/openid/v1/jwks
      - gcloud storage cp {{.TMP}}/openid-configuration.json gs://{{.OIDC_BUCKET}}/{{.CLUSTER}}/.well-known/openid-configuration
      - rm -rf {{.TMP}}
      - 'echo "✔ {{.CLUSTER}} JWKS published. Add to tofu/locals.tf clusters{} and run: cd tofu && tofu apply"'

  verify:
    desc: "Smoke-test that a cluster's OIDC config + JWKS are reachable from the public internet."
    requires:
      vars: [CLUSTER]
    cmds:
      - 'curl -sf https://storage.googleapis.com/{{.OIDC_BUCKET}}/{{.CLUSTER}}/.well-known/openid-configuration | jq .issuer'
      - 'curl -sf https://storage.googleapis.com/{{.OIDC_BUCKET}}/{{.CLUSTER}}/openid/v1/jwks | jq ".keys | length"'
