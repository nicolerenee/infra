---
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"

vars:
  TOFU_DIR: "{{.ROOT_DIR}}/tofu"
  CLUSTERS_FILE: "{{.ROOT_DIR}}/tofu/clusters.auto.tfvars.json"

tasks:
  bootstrap:
    desc: "Fetch a cluster's OIDC issuer + JWKS and merge into tofu/clusters.auto.tfvars.json."
    summary: |
      Pulls /.well-known/openid-configuration and /openid/v1/jwks from the
      named cluster's apiserver and writes them into the per-cluster entry
      in tofu/clusters.auto.tfvars.json. Tofu then registers the WIF
      provider with inline JWKS — no public bucket or DRS bypass needed.

      Required vars:
        CLUSTER  — k8s context name (e.g., fairy-k8s01)

      JWKS contents are public keys and safe to commit. Re-run this when
      the cluster's SA signing key rotates (rare on talos).
    requires:
      vars: [CLUSTER]
    vars:
      CONTEXT: "admin@{{.CLUSTER}}"
    cmds:
      - mkdir -p {{.TOFU_DIR}}
      - |
        ISSUER=$(kubectl --context={{.CONTEXT}} get --raw /.well-known/openid-configuration | jq -r .issuer)
        JWKS=$(kubectl --context={{.CONTEXT}} get --raw /openid/v1/jwks | jq -c .)
        if [ -z "$ISSUER" ] || [ -z "$JWKS" ]; then
          echo "Failed to extract OIDC config or JWKS from {{.CLUSTER}}" >&2
          exit 1
        fi
        if [ ! -f {{.CLUSTERS_FILE}} ]; then
          echo '{"clusters": {}}' > {{.CLUSTERS_FILE}}
        fi
        jq --arg name "{{.CLUSTER}}" --arg iss "$ISSUER" --arg jwks "$JWKS" \
          '.clusters[$name] = {issuer_uri: $iss, jwks_json: $jwks}' \
          {{.CLUSTERS_FILE}} > {{.CLUSTERS_FILE}}.tmp
        mv {{.CLUSTERS_FILE}}.tmp {{.CLUSTERS_FILE}}
      - 'echo "✔ {{.CLUSTER}} OIDC data written. Run: cd tofu && tofu apply"'

  show:
    desc: "Show recorded OIDC config for CLUSTER."
    requires:
      vars: [CLUSTER]
    cmds:
      - jq '.clusters["{{.CLUSTER}}"]' {{.CLUSTERS_FILE}}

  list:
    desc: "List clusters currently registered for WIF."
    cmds:
      - jq -r '.clusters | keys[]' {{.CLUSTERS_FILE}} 2>/dev/null || echo "(none)"
